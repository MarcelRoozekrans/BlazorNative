# ─────────────────────────────────────────────────────────────────────────────
# BnHost — Phase 5.2 (M5 DoD #2): the Swift/UIKit shell's Xcode project, declared
# for XcodeGen so the project is a small readable spec instead of a hand-rolled,
# merge-hostile .pbxproj. `xcodegen generate` (run in ios.yml before xcodebuild)
# materialises BnHost.xcodeproj from this file. XcodeGen is installed on the macOS
# runner via `brew install xcodegen` — the only build-surface tool this lane adds.
#
# Two targets:
#   BnHost       (iOS app) — the Swift shell (BnFrameAdapter/BnWidgetMapper/
#                BnRuntime) + the minimal host (AppDelegate/HostViewController).
#                Links the NativeAOT static archive vendor/libBlazorNative.Runtime.a
#                (copied there by ios.yml from the iossimulator-arm64 publish) with
#                the 5.0 spike's proven flag set (recorded in the Phase 5.2
#                conclusion: docs/plans/2026-07-12-phase-5.2-conclusion.md).
#   BnHostTests  (hosted unit-test bundle) — the DoD #2 render proof; TEST_HOST is
#                BnHost, so it runs inside the app with the linked runtime and
#                asserts the real UIView tree (@testable import BnHost).
# ─────────────────────────────────────────────────────────────────────────────
name: BnHost

options:
  bundleIdPrefix: io.blazornative
  deploymentTarget:
    iOS: "13.0"
  createIntermediateGroups: true

# ── Phase 6.3 Gate 3: KINGFISHER, via SPM ────────────────────────────────────
# The `image` NodeType's bytes. Kingfisher is the iOS twin of Android's Coil
# (design decision 1) and is the FIRST SwiftPM dependency this repo has taken —
# `xcodebuild` resolves it during the build, which is the only network the iOS
# lane needs beyond the Yoga tarball and brew. **The TESTS never touch the public
# internet** (non-negotiable #5): they fetch from an in-process loopback fixture
# server on :8099.
#
# It is declared on the **BnHost** target ONLY. The XCTest bundle does not import
# Kingfisher — it drives the shell's own facade (`BnImageLoader`) through
# `@testable import BnHost`, so exactly ONE file in this repo imports Kingfisher
# and the test bundle does not re-link it (a hosted bundle that linked the same
# product alongside its BUNDLE_LOADER is how duplicate-symbol warnings start).
#
# **It does not disturb the Yoga static-lib link** (the 5.2 recipe): SPM adds its
# product to the target's own link phase; OTHER_LDFLAGS below — bootstrapperdll.o,
# -force_load libBlazorNative.Runtime.a, libBnRuntimeSupport.a, libyoga.a — is
# untouched, and Kingfisher is pure Swift (no C++, so `-lc++` still covers Yoga
# alone). Kingfisher NEVER sees Yoga's headers; it does not need to, and the 6.0
# non-negotiable ("Yoga's headers must never be visible to Swift") is unaffected —
# the image code calls Yoga only through the plain-C `bn_yoga_*` surface, exactly
# as every other Swift file does.
#
# The `from:` below is the pin, and it is the ONE home for the version — this
# comment names no number on purpose. `KingfisherManager.retrieveImage` is the API
# the shell is written against and it survived the major bump; a further major bump
# is a deliberate change, not a resolver's choice.
#
# (This comment read "Pinned to 7.x" until Phase 8.4. It was true when written at
# 6.3, then Renovate bumped the dependency and the prose did not follow — so the
# file stated 7 and meant 8. That is the whole reason the number lives in exactly
# one place here now.)
packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: 8.10.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    # The static archive is simulator-arm64 only (that is the CI target); do not
    # let a stray x86_64 slice request break the link.
    ONLY_ACTIVE_ARCH: YES
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  BnHost:
    type: application
    platform: iOS
    sources:
      - path: BnHost
    dependencies:
      # Phase 6.3 — see the `packages:` block above. The ONLY target that links it.
      - package: Kingfisher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.blazornative.bnhost
        INFOPLIST_FILE: BnHost/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_TESTABILITY: YES
        SWIFT_OBJC_BRIDGING_HEADER: BnHost/BlazorNativeRuntimeC.h
        # Phase 6.0 Yoga spike / Phase 6.1 layout engine: the app links Yoga's static
        # lib (built from source by ios.yml) ALONGSIDE the runtime .a. libyoga.a is
        # appended to OTHER_LDFLAGS below (C++, so the existing -lc++ covers it).
        #
        # Yoga's headers are visible to exactly TWO files — BnYogaProbe.mm (the 6.0
        # spike) and BnYogaLayout.mm (the 6.1 engine) — both Objective-C++, i.e.
        # ordinary Clang compiles that HEADER_SEARCH_PATHS reaches. They are deliberately
        # NOT visible to Swift: the Swift explicit-module dependency SCANNER processes
        # the bridging header with a path-less search that honours neither
        # HEADER_SEARCH_PATHS nor `-Xcc -I` (via OTHER_SWIFT_FLAGS), so an
        # `#include <yoga/Yoga.h>` reachable from it fails with "file not found" during
        # scanning. So Swift sees only plain C: BnYogaProbe.h and BnYogaLayout.h
        # (SHELL-owned headers — deliberately NOT the runtime C-ABI mirror) declare the
        # bn_yoga_* surface, the .mm files implement it, and the bridging header includes
        # them. Same plain-C discipline the shell already uses for the NativeAOT runtime.
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/vendor/yoga-include
        # Yoga 3.x is a C++20 codebase — its headers do not compile at Xcode's default
        # standard, so the .mm that includes them needs c++20.
        CLANG_CXX_LANGUAGE_STANDARD: c++20
        # Link the NativeAOT static runtime. A NativeLib=Static .a carries ONLY
        # the compiled managed->native app code — NOT the NativeAOT runtime
        # bootstrapper/GC (_Rh*) or the platform native support libs
        # (_AppleCryptoNative_*, System.Native, ...), which NativeAOT bundles
        # itself only when it emits a .dylib. For a static embed the app must link
        # them too. ios.yml merges the runtime pack's native/*.a + *.o into one
        # on-demand support archive (libBnRuntimeSupport.a) alongside the app .a.
        #   - vendor/bootstrapperdll.o is linked as a DIRECT object (always
        #     included) so its __attribute__((constructor)) runtime-init runs at
        #     app launch → RuntimeInstance is set up before blazornative_init. As
        #     an archive member it would be on-demand and never pulled (its
        #     constructor is not a "referenced symbol") → SIGSEGV in the runtime's
        #     ThreadStore::AttachCurrentThread. This is the load-bearing fix.
        #   - -force_load on the app archive: pulls the exports + module cctors.
        #   - the support archive stays ON-DEMAND — the linker pulls the
        #     library-appropriate runtime objects (via _Rh*) without dragging in
        #     the exe bootstrapper or the Network-framework transport.
        #   - the framework/lib set is the 5.0 spike's proven list
        #     (recorded in docs/plans/2026-07-12-phase-5.2-conclusion.md); Security
        #     covers AppleCrypto.
        # BnHost-target-only (NOT global) so the hosted test bundle, which links
        # against the app via BUNDLE_LOADER, does not re-link the runtime.
        OTHER_LDFLAGS:
          - $(SRCROOT)/vendor/bootstrapperdll.o
          - -force_load
          - $(SRCROOT)/vendor/libBlazorNative.Runtime.a
          - $(SRCROOT)/vendor/libBnRuntimeSupport.a
          # Phase 6.0 Yoga spike: the C++ flexbox engine, linked alongside the
          # runtime archives (coexistence proof). -lc++ (below) covers its C++ runtime.
          - $(SRCROOT)/vendor/libyoga.a
          - -lc++
          - -lz
          - -licucore
          - -lobjc
          - -framework
          - Foundation
          - -framework
          - Security
          - -framework
          - CoreFoundation

  BnHostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BnHostTests
    dependencies:
      - target: BnHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.blazornative.bnhost.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/BnHost.app/BnHost
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  BnHost:
    build:
      targets:
        BnHost: all
        BnHostTests: [test]
    test:
      targets:
        - BnHostTests
      gatherCoverageData: false
