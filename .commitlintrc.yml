# ─────────────────────────────────────────────────────────────────────────────
# BlazorNative — the commit contract (Phase 8.6, decisions 5 and 6).
#
# THIS FILE IS THE ONE AUTHORITY. commitlint.yml pipes the PR TITLE through it
# and nothing else re-states these enums. That is deliberate:
# `amannn/action-semantic-pull-request` was rejected precisely because its
# `types:`/`scopes:` inputs would be a SECOND copy of these lists — 8.1 normative
# rule 2's exact sin, and the one this repo deleted a roster to avoid.
#
# ─── WHY THE PR TITLE AND NOT THE COMMITS ───────────────────────────────────
#
# This repo squash-merges. Under squash, the branch's commit subjects are
# DISCARDED — they never reach main and release-please never sees them. Linting
# them would enforce a contract on text that is thrown away, and would red PRs
# for honest WIP commits. So the PR title is the subject, and it is the only
# thing linted.
#
# ✅ AND THAT IS ONLY SOUND IF THE PR TITLE ACTUALLY WINS — IT NOW DOES. The
#   repository setting this contract rests on is SET (2026-07-17, by the owner,
#   the first step of Phase 8.6's implementation sequence). Verified in the API
#   response, not assumed:
#
#       squash_merge_commit_title   = PR_TITLE          ← the contract is real
#       squash_merge_commit_message = COMMIT_MESSAGES
#
#   SO THIS FILE IS LOAD-BEARING, NOT DECORATIVE. The PR title becomes main's
#   commit subject — the exact text release-please parses — and the branch's
#   commit WHY bodies concatenate into main's body, which is where this repo's
#   prose goes and where release-please reads `Release-As:` and `BREAKING CHANGE:`
#   footers from.
#
# ─── ⚠⚠ THE BODIES ARE PARSED, SO PROSE IN A BODY CAN *BE* A FOOTER ─────────
#   (Phase 8.6 Gate 2. Found by a real --dry-run on this repo, not by reading.)
#
#   The paragraph directly above is the whole hazard and it took a dry-run to
#   see it. "The branch's commit subjects are DISCARDED" is TRUE OF SUBJECTS AND
#   FALSE OF BODIES: the bodies concatenate into main's body, release-please
#   parses that body, and A FOOTER TOKEN AT COLUMN 0 OF ANY LINE IS A FOOTER —
#   it does not matter that the sentence around it is prose explaining the
#   mechanism. THIS FILE'S OWN WHY-BODY STYLE IS THE RISK: long bodies that
#   discuss the release machinery are exactly the bodies that spell its tokens.
#
#   IT ALREADY HAPPENED, on this branch, in the commit that installed this
#   contract. 004179f's body hard-wrapped at 80 columns and pushed the
#   breaking-change token onto a new line, at column 0, followed by the word
#   "footers." — SO THE LINE WRAP DECLARED A BREAKING CHANGE. Measured on the
#   real repo:
#
#       npx release-please release-pr --dry-run
#         -> title: chore(...): release 1.0.0-preview.2
#            ### ⚠ BREAKING CHANGES
#            * **release:** footers.
#
#   A consumer's changelog and the GitHub Release body would both have carried
#   it. The prose became the thing it described — the FOURTH time in this one
#   phase (an XML comment that could not contain the annotation's delimiters, a
#   paragraph that could not quote the error message about them, prose that
#   became an annotation the updater would edit, and now a sentence that became
#   a footer). THE LESSON KEEPS ARRIVING IN A NEW COSTUME: NAME THE THING, DO
#   NOT SPELL IT — in a commit BODY. Write "the breaking-change footer", never
#   the token itself at the start of a line.
#
#   ⚠ AND THE VERSION ONE IS WORSE, because it is not a changelog blemish.
#   Measured against release-please 17's own parser:
#
#     · `BREAKING CHANGE: <text>` at column 0, ANYWHERE in the body
#         -> breaking=true + the note. Blast radius: A CHANGELOG SECTION.
#     · `Release-As: <semver>` at column 0 in the body's LAST PARAGRAPH
#         -> a RELEASE AS note -> Version.parse(<semver>) -> THAT BECOMES THE
#            RELEASED VERSION. Blast radius: THE VERSION ITSELF.
#            (Mid-body, with prose after it, extracts nothing — the footer must
#            end the message. That is the only reason 004179f, which spells this
#            token too, did not also propose a hand-picked version.)
#
#   So this file's closing claim — "NEVER A WRONG VERSION" — is exact about the
#   SUBJECT and must not be read as covering the BODY. The subject's TYPE cannot
#   move the version at 1.0.0-preview.N. A body's release-as footer sets it
#   outright, at any rung, and it short-circuits everything: the strategy scans
#   for that note FIRST, before any breaking/feature counting. That is rung 3
#   working as designed (8.6 decision 2) — and it is why a WHY body that
#   documents rung 3 BY SPELLING IT, and happens to end near it, releases that
#   version. Nothing warns.
#
#   ✅ SOMETHING LINTS THIS NOW — `footer-check`, in .github/workflows/commitlint.yml
#   (Phase 8.6, Gate 3). The sentence that used to sit here said "nothing lints
#   this… a body-level check is ledgered, not taken". IT IS TAKEN. Decision 5
#   rejected linting the branch's SUBJECTS, which are thrown away; it never
#   refused reading the BODIES, which are not. The rule:
#
#       A PR's commit BODIES may declare a release footer only if the PR's
#       TITLE declares the same thing.
#
#   It does not claim to know what you meant — it compares the two texts you
#   wrote and reds when they disagree. See scripts/footer-check.ps1.
#
#   ⚠ THE PROSE IN *THIS FILE* IS SAFE AND MUST NOT BE "FIXED" — but the reason
#   it used to give was WRONG, and the wrong reason is worth more than the right
#   one here. It said: "a `.yml` comment line starts with `#`, so the tokens
#   above are at column 2". MEASURED against the real parser
#   (conventional-commits-parser 6.4.0, release-please's own options):
#
#       `  `BREAKING CHANGE: x.   -> A NOTE.   COLUMN 2 SAVES NOTHING.
#       `\t`BREAKING CHANGE: x.   -> A NOTE.   nor a tab, nor 8 spaces
#       `* `BREAKING CHANGE: x.   -> A NOTE.   nor a list bullet
#       `# `BREAKING CHANGE: x.   -> (none)    THE `#` IS WHAT SAVES IT
#
#   So this file is safe for TWO reasons, and only one of them was stated: it is
#   not a commit message at all (the load-bearing one — only commit MESSAGES are
#   parsed), and its lines begin with `#`, which blocks the note even in text
#   that IS parsed. The indentation was never doing any work. Spelling the
#   tokens here is how the warning stays legible; the `#` is why it costs nothing.
#
#   WHAT IT USED TO BE, AND WHY THE SETTING WAS THE FIRST STEP RATHER THAN A
#   FOOTNOTE: `COMMIT_OR_PR_TITLE`. That means IF THE PR HAS EXACTLY ONE COMMIT,
#   THAT COMMIT'S SUBJECT BECOMES MAIN'S SUBJECT AND THE PR TITLE IS IGNORED —
#   only multi-commit PRs used the title. A single-commit PR titled
#   `feat(runtime): …` whose commit said `wip` landed `wip` on main, PASSING THIS
#   LINT, and reached release-please as an unparseable subject. The lint would
#   have been sound-looking and unsound, for most PRs. It was sequenced first so
#   this contract was never that.
#
#   ⚠ IT IS A REPOSITORY SETTING, NOT A FILE IN THIS TREE — so nothing in this
#   repo pins it and no test can red if it is changed back. If `wip` ever reaches
#   main from a single-commit PR, THIS IS THE FIRST THING TO CHECK:
#
#       gh api repos/MarcelRoozekrans/BlazorNative \
#         --jq '{t: .squash_merge_commit_title, m: .squash_merge_commit_message}'
#
#   and the restore is:
#
#       gh api -X PATCH repos/MarcelRoozekrans/BlazorNative \
#         -f squash_merge_commit_title=PR_TITLE \
#         -f squash_merge_commit_message=COMMIT_MESSAGES
#
# ─── THE HOUSE STYLE MOVES, IT DOES NOT DIE ─────────────────────────────────
#
# The finding-in-the-headline — `Phase 8.4 — the docs site: the generator said
# "10 succeeded, 0 failed" and shipped zero components` — stops being a SUBJECT
# and becomes the first line of the PR description / commit BODY. The subject
# becomes `feat(docs): the Docusaurus docs site`. The ~40 phase conclusions in
# docs/plans remain the real record; the generated CHANGELOG.md is a consumer's
# index, added BESIDE the record and not instead of it.
#
# ─── ⚠ WHAT THIS FILE DOES *NOT* DO, so nobody mistakes it ──────────────────
#
# THE SCOPE-ENUM IS SEVERITY 1 — A WARNING. commitlint exits non-zero only on
# severity 2. So an UNLISTED SCOPE PASSES. Combined with commitlint.yml being
# advisory (not a fourth required check), THE SCOPE-ENUM DOES NOT ENFORCE
# ANYTHING — IT DOCUMENTS. That is deliberate (the enum will drift as the repo
# grows, a hard red on scope would block a legitimate PR at the worst possible
# moment, and config-conventional does not require a scope at all) and it mirrors
# the reference exactly, which is what the owner asked for. But "we have a
# scope-enum" must not be read as "scopes are enforced". They are not.
#
# The honest consequence of the whole arrangement, stated rather than hidden: a
# mis-titled PR CAN merge, and release-please will silently ignore it — no
# changelog line, no bump contribution. THAT FAILURE IS A MISSING CHANGELOG
# ENTRY, NEVER A WRONG VERSION: at 1.0.0-preview.N the commit type cannot move
# the version at all (measured — see .github/workflows/release-please.yml).
# ─────────────────────────────────────────────────────────────────────────────
extends:
  - "@commitlint/config-conventional"

rules:
  # Mirrored from the reference verbatim, severity 2.
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert

  # ⚠ SEVERITY 1 = WARNING. An unlisted scope PASSES. See the header.
  #
  # CONSUMER-FACING, and that is the decision. The reference's enum is AREAS
  # (core, dataset, adapters, benchmarks, validation, ci, deps) — ours cannot be
  # a copy, because their areas are not our areas. A consumer's changelog wants
  # COMPONENTS, not phases: `fix(phase-7.5): the dispatch table's ROW ORDER is
  # normative` means everything in this repo and nothing on nuget.org.
  #
  # `phase-N` IS DELIBERATELY ABSENT — BUT ABSENT IS NOT EXCLUDED, AND THIS LIST
  # EXCLUDES NOTHING. At severity 1 `feat(phase-8.6):` PASSES (with a warning) —
  # verified by running it, not assumed, and the ⚠ eight lines up says the same
  # thing about every unlisted scope. So the absence is a STATEMENT OF WHAT THE
  # SCOPE IS FOR, not a gate: the scope answers WHAT, never WHEN. docs/plans
  # answers WHEN, and it always did. A `phase-N` scope would reach a consumer's
  # changelog meaning nothing to them — so this enum does not offer one. If
  # somebody writes one anyway it lands, warned. THE ENUM DOCUMENTS THE
  # CONSUMER-FACING SET; IT DOES NOT DEFEND IT.
  #
  # The six package scopes are lowercase short names, not package ids — a scope
  # is a changelog heading, and `feat(BlazorNative.Components):` reads like a
  # stack trace.
  scope-enum:
    - 1
    - always
    - - core           # BlazorNative.Core
      - renderer       # BlazorNative.Renderer
      - http           # BlazorNative.Http
      - components     # BlazorNative.Components
      - runtime        # BlazorNative.Runtime
      - analyzers      # BlazorNative.Analyzers
      - templates      # dotnet new blazornative
      - docs           # the Docusaurus site + the guides
      - android        # the JNI shell
      - ios            # the Apple shell
      - ci             # the lanes
      - deps           # Renovate's own scope
      - release        # the release machinery itself

  # Mirrored from the reference verbatim, severity 2.
  subject-case:
    - 2
    - never
    - - sentence-case
      - start-case
      - pascal-case
      - upper-case

  # 100, named explicitly by the owner. Mirrored from the reference verbatim.
  header-max-length:
    - 2
    - always
    - 100
