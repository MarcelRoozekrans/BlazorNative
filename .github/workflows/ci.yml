          dotnet test BlazorNative.sln -c Release --no-build --nologo -v minimal 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "dotnet test failed (exit $LASTEXITCODE)" }
          # -AllMatches + iterating every match, not just $_.Matches[0]: `dotnet test`
          # runs projects in parallel and their summary lines can land on ONE physical
          # line with no separator ("...Duration: 319 msPassed! - Failed: 0, Passed: 147,
          # ..."). Select-String returns only the FIRST match per line by default, so a
          # concatenated line silently dropped a whole project's counts and tripped this
          # baseline guard on unrelated PRs.
          $summaries = @(Select-String -Path $log -Pattern 'Failed:\s*(\d+),\s*Passed:\s*(\d+),\s*Skipped:\s*(\d+),\s*Total:\s*(\d+)' -AllMatches)
          $results = @($summaries | ForEach-Object { $_.Matches })
          if ($results.Count -eq 0) { throw "Could not parse any test-project summary lines — output format drift?" }
          $failed  = ($results | ForEach-Object { [int]$_.Groups[1].Value } | Measure-Object -Sum).Sum
          $passed  = ($results | ForEach-Object { [int]$_.Groups[2].Value } | Measure-Object -Sum).Sum
          $skipped = ($results | ForEach-Object { [int]$_.Groups[3].Value } | Measure-Object -Sum).Sum
          Write-Host "dotnet test totals across $($results.Count) projects: passed=$passed skipped=$skipped failed=$failed"
          if ($failed -ne 0 -or $passed -ne 553 -or $skipped -ne 0) {
            throw ".NET test baseline drift: expected 553 passed / 0 skipped / 0 failed, got $passed passed / $skipped skipped / $failed failed. Baseline changes must be deliberate — update ci.yml alongside the change."
          }

      # ── NativeAOT publishes + nine-export verification ────────────────────
      # Phase 8.0: the publish head is samples/BlazorNative.SampleApp (the app
      # owns PublishAot; Runtime is a plain packable library). The exports are
      # emitted from Runtime via UnmanagedEntryPointsAssembly and the native
      # output is canonicalized to the frozen BlazorNative.Runtime.* names by
      # the sample csproj's AfterTargets=Publish target — every path below
      # re-points a DIRECTORY, never a file name.
      - name: Publish win-x64 (assert exactly 4 IL2072 warnings)
        run: |
          $log = Join-Path $env:RUNNER_TEMP "publish-win-x64.log"
          dotnet publish samples/BlazorNative.SampleApp -c Release -r win-x64 -tl:off -nologo 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "win-x64 publish failed (exit $LASTEXITCODE)" }
          $il2072 = @(Select-String -Path $log -Pattern 'warning IL2072')
          Write-Host "IL2072 count: $($il2072.Count)"
          if ($il2072.Count -ne 4) {
            $il2072 | ForEach-Object { Write-Host $_.Line }
            throw "win-x64 publish IL2072 drift: expected exactly 4 accepted trim warnings, got $($il2072.Count)"
          }

      - name: Verify win-x64 exports (dumpbin via vswhere)
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found at $vswhere" }
          $dumpbin = & $vswhere -latest -products * -find "**\Hostx64\x64\dumpbin.exe" | Select-Object -First 1
          if (-not $dumpbin) { throw "dumpbin.exe not found via vswhere" }
          $dll = "samples\BlazorNative.SampleApp\bin\Release\net10.0\win-x64\publish\BlazorNative.Runtime.dll"
          $out = & $dumpbin /exports $dll
          $expected = @(
            'blazornative_dispatch_event', 'blazornative_fetch_complete',
            'blazornative_host_event', 'blazornative_init', 'blazornative_mount',
            'blazornative_register_bridge', 'blazornative_register_frame_callback',
            'blazornative_shutdown', 'blazornative_version'
          )
          $actual = @($out | Select-String -Pattern '\bblazornative_\w+' | ForEach-Object { $_.Matches.Value } | Sort-Object -Unique)
          Write-Host "Exports found ($($actual.Count)): $($actual -join ', ')"
          $diff = Compare-Object $expected $actual
          if ($diff) {
            $diff | Format-Table | Out-String | Write-Host
            throw "win-x64 export surface drift: expected exactly the 9 blazornative_* exports"
          }

          # Phase 8.0 (Gate 1 review I-2): the pages must SURVIVE publish. The
          # failure mode this pins is ILC silently trimming the whole SampleApp
          # module (0 IL2072, rc-1 only at first mount) — seen live when the
          # publish head moved and TrimmerRootAssembly was not yet in place.
          # Name-strings in the native image are the direct evidence.
          $bytes = [System.IO.File]::ReadAllBytes($dll)
          $text  = [System.Text.Encoding]::ASCII.GetString($bytes)
          foreach ($page in @('BnDemo', 'BnImagePolishDemo', 'BnFormDemo')) {
            if ($text -notmatch [regex]::Escape($page)) {
              throw "Page name '$page' absent from the published native image — the SampleApp module was trimmed (is TrimmerRootAssembly still in the sample csproj?)"
            }
          }
          Write-Host "Page-presence probe: BnDemo, BnImagePolishDemo, BnFormDemo all present in the native image."

      - name: Publish linux-bionic-x64 (assert exactly 4 IL2072 warnings)
        run: |
          $log = Join-Path $env:RUNNER_TEMP "publish-bionic-x64.log"
          dotnet publish samples/BlazorNative.SampleApp -c Release -r linux-bionic-x64 -tl:off -nologo 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "linux-bionic-x64 publish failed (exit $LASTEXITCODE)" }
          $il2072 = @(Select-String -Path $log -Pattern 'warning IL2072')
          Write-Host "IL2072 count: $($il2072.Count)"
          if ($il2072.Count -ne 4) {
            $il2072 | ForEach-Object { Write-Host $_.Line }
            throw "linux-bionic-x64 publish IL2072 drift: expected exactly 4 accepted trim warnings, got $($il2072.Count)"
          }

      - name: Verify linux-bionic-x64 exports (llvm-readelf from pinned NDK)
        run: |
          $readelf = "$env:ANDROID_NDK_ROOT\toolchains\llvm\prebuilt\windows-x86_64\bin\llvm-readelf.exe"
          if (-not (Test-Path $readelf)) { throw "llvm-readelf.exe not found at $readelf" }
          $so = "samples\BlazorNative.SampleApp\bin\Release\net10.0\linux-bionic-x64\publish\BlazorNative.Runtime.so"
          $out = & $readelf --dyn-syms $so
          $expected = @(
            'blazornative_dispatch_event', 'blazornative_fetch_complete',
            'blazornative_host_event', 'blazornative_init', 'blazornative_mount',
            'blazornative_register_bridge', 'blazornative_register_frame_callback',
            'blazornative_shutdown', 'blazornative_version'
          )
          $actual = @($out | Select-String -Pattern '\bblazornative_\w+' | ForEach-Object { $_.Matches.Value } | Sort-Object -Unique)
          Write-Host "Dynamic symbols found ($($actual.Count)): $($actual -join ', ')"
          $diff = Compare-Object $expected $actual
          if ($diff) {
            $diff | Format-Table | Out-String | Write-Host
            throw "linux-bionic-x64 export surface drift: expected exactly the 9 blazornative_* exports"
          }

      - name: Publish linux-bionic-arm64 (assert exactly 4 IL2072 warnings)
        run: |
          $log = Join-Path $env:RUNNER_TEMP "publish-bionic-arm64.log"
          dotnet publish samples/BlazorNative.SampleApp -c Release -r linux-bionic-arm64 -tl:off -nologo 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "linux-bionic-arm64 publish failed (exit $LASTEXITCODE)" }
          $il2072 = @(Select-String -Path $log -Pattern 'warning IL2072')
          Write-Host "IL2072 count: $($il2072.Count)"
          if ($il2072.Count -ne 4) {
            $il2072 | ForEach-Object { Write-Host $_.Line }
            throw "linux-bionic-arm64 publish IL2072 drift: expected exactly 4 accepted trim warnings, got $($il2072.Count)"
          }

      - name: Verify linux-bionic-arm64 exports (llvm-readelf from pinned NDK)
        run: |
          $readelf = "$env:ANDROID_NDK_ROOT\toolchains\llvm\prebuilt\windows-x86_64\bin\llvm-readelf.exe"
          if (-not (Test-Path $readelf)) { throw "llvm-readelf.exe not found at $readelf" }
          $so = "samples\BlazorNative.SampleApp\bin\Release\net10.0\linux-bionic-arm64\publish\BlazorNative.Runtime.so"
          $out = & $readelf --dyn-syms $so
          $expected = @(
            'blazornative_dispatch_event', 'blazornative_fetch_complete',
            'blazornative_host_event', 'blazornative_init', 'blazornative_mount',
            'blazornative_register_bridge', 'blazornative_register_frame_callback',
            'blazornative_shutdown', 'blazornative_version'
          )
          $actual = @($out | Select-String -Pattern '\bblazornative_\w+' | ForEach-Object { $_.Matches.Value } | Sort-Object -Unique)
          Write-Host "Dynamic symbols found ($($actual.Count)): $($actual -join ', ')"
          $diff = Compare-Object $expected $actual
          if ($diff) {
            $diff | Format-Table | Out-String | Write-Host
            throw "linux-bionic-arm64 export surface drift: expected exactly the 9 blazornative_* exports"
          }

      # ── JVM tests against the fresh win-x64 publish ────────────────────────
      # testDebugUnitTest → preBuild → copyRuntimeSo → verifyNativeAssets needs
      # BOTH bionic .so publish outputs, hence this step runs after them; the
      # unit tests themselves load the win-x64 dll via jna.library.path.
      # ── Phase 6.3 Gate 2 REVIEW: the JVM baseline moves for the first time since
      #    6.1 (79 → 83, +4) — and WHERE it moves is the finding.
      #
      # ImageRequestGuardTest ×4. The shell's stale-completion guard asks TWO questions
      # (has this node's `src` been written since the request was issued? is the view the
      # callback captured still the view that node id names?) and its KDoc called the
      # second one "not belt-and-braces theatre" — while NOTHING checked it. Deleting the
      # identity half left the instrumented suite fully green at 107, because the case it
      # exists for CANNOT BE STAGED ON A DEVICE by any demo page: it needs a node id to be
      # REUSED after a reset (/image → back → /image), so that a stale callback carrying
      # generation 1 meets a BRAND-NEW node that is also on generation 1 — the generations
      # MATCH, and only the view's identity separates them. Every demo mounts once.
      #
      # So the decision was extracted into a pure `internal fun isLiveImageRequest(...)`
      # (its own file, no Android types in the signature) and pinned HERE, off the device,
      # where the four states can simply be written down: same-generation+same-view (live);
      # superseded generation; purged node; and THE RESET COLLISION. The last one is also
      # the reasoning WidgetMapper.clearIfMine depends on (Gate 2 review, C1) — a
      # generation-only eviction lets the stale callback drop the LIVE request's
      # Disposable, leaving a request nothing can cancel, whose completion on iOS runs
      # against a FREED YGNodeRef. MUTATION: revert the guard to a generation-only check
      # and exactly the reset-collision test reddens.
      #
      # ── Phase 7.3 Gate 2: 83 → 90, +7 — both counts are the gate's OWN findings.
      #
      #  +1 NativeFrameAdapterTest.nodeTypes_vocabulary_is_pinned_content_and_length —
      #     THE GAP GATE 1 RECORDED BY NAME: Swift's BnDriftTests pins its nodeTypes
      #     array's exact content, Kotlin pinned byte offsets and ONE synthetic decode
      #     (3 → "button") — nothing pinned length or content, so a shell that missed a
      #     vocabulary extension decoded every new create to the "?" fallback and only a
      #     device golden could see it. Now the JVM lane reddens instead: checkbox=8,
      #     switch=9, slider=10, exact content, exact order (index IS the wire id).
      #     MUTATION: drop the three new entries → this test, on this lane, nothing else
      #     on the JVM side.
      #  +6 ItemsJsonTest — the STRICT items-array parser (the picker's item list). The
      #     Gate 1 review's correction is the reason this parser EXISTS as its own file:
      #     FlatJson.parse is object-only AND LENIENT (skips whitespace, accepts \b, \/,
      #     uppercase hex — escapes the items grammar does not define), so "reuse the
      #     existing parser" would have made the two shells' acceptance sets drift on
      #     inputs the .NET writer never emits. The acceptance set is EXACTLY what
      #     BnItemsJson.Write produces; the rejection matrix transcribes BnItemsJsonTests'
      #     normative malformed vectors ([ "a"], ["a",], ["a"]x, ['a'], ["\b"], the long
      #     \u spelling of a short escape, unterminated, bare-string/object roots) plus
      #     the boundary rows (U+001F escapes, U+007F rides raw; uppercase hex,
      #     non-control \u, raw controls, whole-string consumption all reject). Pure
      #     Kotlin in the shared source set — testable HERE, off the device, like
      #     isLiveImageRequest before it.
      #
      # ── Phase 7.4 Gate 2: 90 → 92, +2 — the new wire vocabulary's DECODE, at
      #    the offset level.
      #
      #  +2 NativeFrameAdapterTest.read_decodes_modal_wire_id_11 /
      #     read_decodes_activityindicator_wire_id_12 — the "3 → button" synthetic
      #     decode's twin, per new id. The content/length pin (extended IN PLACE to
      #     thirteen entries: modal = 11, activityindicator = 12) answers "is the
      #     array right?"; these answer "does a CreateNode carrying 11 actually
      #     decode as a `modal` create?" — the question WidgetMapper's
      #     `when (p.nodeType)` hangs off. Written red-first: with the entries
      #     absent, both ids fell onto the index-guard "?" fallback
      #     ("expected: <modal> but was: <?>"), which on a device is a TextView
      #     where an overlay should be — the exact silent decode the 7.3 pin was
      #     added to catch, reddening on this lane instead.
      # ── Phase 7.5 Gate 2: 92 → 104, +12 — the polish features' pure decisions,
      #    pinned before any emulator boots (the isLiveImageRequest shared-source-set
      #    precedent, twice).
      #
      #  +6 ImageContentModeTableTest — contentModeFor's strict acceptance set: the
      #     four lowercase wire words one row per test (a swapped cover/contain pair
      #     reddens BY NAME — the design's own JVM mutation, run), null-restores-
      #     CONTAIN (the Enabled-null precedent), and the diagnose-don't-apply row
      #     ('Contain'/'COVER'/' contain'/''/'fit'/'repeat' all map to nothing).
      #  +6 ImageErrorDispatchTest — imageErrorDispatchAction, the error-dispatch
      #     decision COMPOSING isLiveImageRequest by name (one guard, two consumers:
      #     superseded / purged / reset-collision each never dispatch), unbound never
      #     dispatches, and THE DEFER ROW: a failure terminating inside applyBatch
      #     DEFERS to a fresh main-queue turn — deferred, never dropped. On the JVM
      #     lane because Android cannot stage it (Coil's memory cache proves only the
      #     synchronous SUCCESS; a 404 is never cached) — iOS stages it live
      #     (URL(string:) → nil), same table, two shells.
      # ── Phase 7.5 Gate 2 REVIEW I-1 (applied after Gate 3): 104 → 105, +1 — the
      #    DEFER arm re-decides at FIRE time.
      #
      #  +1 ImageErrorDispatchTest.the_deferred_turn_re_asks_the_decision_with_fire_
      #     time_facts — decision-time DEFER (mid-batch, live, attached), generation
      #     bumped BEHIND the failure in the same batch, fire-time re-ask → DROP.
      #     The row exists because the old Android DEFER arm posted a decision-time
      #     capture (`mainHandler.post { dispatchError(handlerId!!, url) }`): a
      #     remove-later frame would dispatch for a PURGED node, a supersede-later
      #     frame would deliver the OLD src's error into live user code. LATENT here
      #     (Coil cannot fail synchronously mid-batch), PROVEN LIVE on iOS
      #     (URL(string:) → nil; BnImagePolishMapperTests pins both frames
      #     end-to-end) — so the fix (WidgetMapper.decideAndDispatchError posts
      #     ITSELF, the Swift shape) is pinned on this lane, not a faked device test.
      # ── Phase 7.5 Gate 3 REVIEW I-1: 105 → 106, +1 — the ROW ORDER of the
      #    dispatch table becomes normative: liveness → applyingBatch → handlerAttached.
      #
      #  +1 ImageErrorDispatchTest.a_mid_batch_failure_with_no_handler_yet_DEFERS_
      #     and_fire_time_decides — mid-batch + handler NOT attached → DEFER (the
      #     old table said DROP); fire-time + attached → DISPATCH_NOW; fire-time +
      #     still unbound → DROP. The rows exist because the old order consulted
      #     handlerAttached BEFORE applyingBatch and so reached a PERMANENT verdict
      #     against MID-BATCH state: at mount the wire order is src (seq 24) →
      #     attachEvent "error" (seq 27) in ONE batch, so iOS's synchronous nil-URL
      #     failure decided DROP three patches before the attach it was racing —
      #     OnError never fired for <BnImage Src="<unparseable>" OnError="..."> at
      #     mount, while Android (whose failure lands post-batch) dispatched. That
      #     is the parity break; design decision 2 says an unparseable non-empty
      #     URL DISPATCHES. The fire-time re-decision (decideAndDispatchError posts
      #     ITSELF — the Gate 2 I-1 machinery, both shells) reads the SETTLED
      #     handler state, so the swap costs nothing: never-attached still drops,
      #     at the one moment the answer is true. Both tables swapped as literal
      #     twins; iOS pins the mount batch end-to-end (ios.yml, 152 → 153).
      - name: JVM tests (Gradle testDebugUnitTest — assert 106 passed / 0 failed)
        working-directory: src/BlazorNative.Jni
        run: |
          .\gradlew.bat --no-daemon testDebugUnitTest
          if ($LASTEXITCODE -ne 0) { throw "gradlew testDebugUnitTest failed (exit $LASTEXITCODE)" }
          $xmls = @(Get-ChildItem build\test-results\testDebugUnitTest\*.xml -ErrorAction SilentlyContinue)
          if ($xmls.Count -eq 0) { throw "No JUnit XML results found under build\test-results\testDebugUnitTest" }
          $tests = 0; $failures = 0; $errors = 0; $skipped = 0
          foreach ($x in $xmls) {
            $suite = ([xml](Get-Content $x -Raw)).testsuite
            $tests += [int]$suite.tests; $failures += [int]$suite.failures
            $errors += [int]$suite.errors; $skipped += [int]$suite.skipped
          }
          Write-Host "JVM test totals across $($xmls.Count) suites: tests=$tests failures=$failures errors=$errors skipped=$skipped"
          if ($tests -ne 106 -or $failures -ne 0 -or $errors -ne 0 -or $skipped -ne 0) {
            throw "JVM test baseline drift: expected 106 passed / 0 failed / 0 skipped, got tests=$tests failures=$failures errors=$errors skipped=$skipped"
          }

      # the instrumented-sources compile gate moved to its own required job
      # `android-build` (see below) — a red check now names the Android shell directly.

      # ── Consumer smoke (Phase 4.5 Gate 2 — the M4 DoD #7 proof) ────────────
      # Packs the five packages, restores samples/ConsumerSmoke from the local
      # feed only (+nuget.org transitives) into a clean temp cache, asserts
      # the analyzers package is live (BN0011 trip build + zero-BN clean
      # build), then mounts a Bn* component and asserts the patch set.
      - name: Consumer smoke (packages-only mount + analyzer trip)
        run: |
          .\scripts\consumer-smoke.ps1
          if ($LASTEXITCODE -ne 0) { throw "consumer-smoke.ps1 failed (exit $LASTEXITCODE)" }

      # ── Artifacts (consumed by the Gate 3 instrumented workflow) ───────────
      - name: Stage jniLibs layout (x86_64 from bionic-x64)
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "jniLibs-staging\x86_64"
          New-Item -ItemType Directory -Force $dest | Out-Null
          Copy-Item "samples\BlazorNative.SampleApp\bin\Release\net10.0\linux-bionic-x64\publish\BlazorNative.Runtime.so" (Join-Path $dest "libBlazorNative.Runtime.so")

      - name: Upload artifact — win-x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: BlazorNative.Runtime-win-x64
          path: samples/BlazorNative.SampleApp/bin/Release/net10.0/win-x64/publish/BlazorNative.Runtime.dll
          if-no-files-found: error

      - name: Upload artifact — linux-bionic-x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: BlazorNative.Runtime-linux-bionic-x64
          path: samples/BlazorNative.SampleApp/bin/Release/net10.0/linux-bionic-x64/publish/BlazorNative.Runtime.so
          if-no-files-found: error

      - name: Upload artifact — linux-bionic-arm64 binary
        uses: actions/upload-artifact@v7
        with:
          name: BlazorNative.Runtime-linux-bionic-arm64
          path: samples/BlazorNative.SampleApp/bin/Release/net10.0/linux-bionic-arm64/publish/BlazorNative.Runtime.so
          if-no-files-found: error

      - name: Upload artifact — jniLibs staging layout
        uses: actions/upload-artifact@v7
        with:
          name: jniLibs-staging
          path: ${{ runner.temp }}/jniLibs-staging
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # android-build — THE ANDROID SHELL MUST COMPILE, AND A REQUIRED CHECK MUST
  # NAME IT.
  #
  # ── WHY THIS JOB EXISTS ────────────────────────────────────────────────────
  # The AGP 9 migration stopped feeding `java.srcDirs` to the Kotlin compiler, so
  # `src/androidMain/kotlin` (the ENTIRE Android shell: MainActivity, WidgetMapper,
  # YogaLayout) went uncompiled. The app still "built" (nothing references
  # MainActivity at compile time — only the manifest names it) and the JVM tests
  # still passed (they touch src/main/kotlin only), so the ONLY lane that could see
  # it was `android-instrumented` — dispatch/nightly, which does NOT gate PRs. It
  # landed on `main` green and sat there. PR #81 closed the hole by compiling the
  # instrumented sources inside `build-test`.
  #
  # That gate now lives HERE, in its own job, mirroring `ios-build`. The reason is
  # LEGIBILITY, not behaviour: when the compile lived inside `build-test`, an Android
  # shell that stopped compiling reddened a check named `build-test` — the same check
  # that fails for a .NET build error, a broken .NET test, or a JVM unit-test failure.
  # You could not tell from the check list WHICH shell broke. A red `android-build`
  # names the Android shell directly, exactly as a red `ios-build` names the iOS one.
  #
  # ── WHY IT STOPS AT COMPILE, AND WHY THAT IS NOT TIMIDITY ──────────────────
  # A device is needed to RUN the instrumented tests, not to COMPILE them — the same
  # sentence `ios-build`'s `build-for-testing` is justified by. `compileDebugAndroidTestKotlin`
  # is a pure compile: it resolves and type-checks `src/androidMain/kotlin` AND the
  # instrumented `androidTest` source set (so a whole source set silently vanishing,
  # the AGP 9 incident, fails HERE) without booting an emulator and without running a
  # single test. Device EXECUTION stays in `android-instrumented.yml` and stays
  # ADVISORY, on purpose: emulator-on-CI has real flake modes (boot timeouts, adb
  # drops) that a required check must not import. Compiling has none of them.
  #
  # ── WHY IT IS SELF-CONTAINED (no `needs`), MIRRORING ios-build ─────────────
  # This job produces its OWN runtime — it does not depend on `build-test`. That
  # is not a style choice; a `needs`-gated job cannot be a trustworthy REQUIRED
  # check:
  #   · GitHub does not surface a `needs`-gated job as a check until its dependency
  #     finishes, so it is INVISIBLE on the PR checks list while `build-test` runs
  #     and only appears afterward — you cannot see at a glance that the Android
  #     shell is being gated at all.
  #   · Worse, as a required check it is a TRAP: if `build-test` ever fails or is
  #     skipped, this job never runs, never reports, and the PR wedges permanently
  #     on "Expected — waiting for android-build".
  # `ios-build` (below) is the template: no `needs`, it does its own
  # `dotnet publish -r iossimulator-arm64` and then links. This job mirrors that —
  # it self-publishes the bionic `.so` and then compiles.
  #
  # `compileDebugAndroidTestKotlin`'s task graph runs `... → copyRuntimeSo →
  # verifyNativeAssets`, which only insists `BlazorNative.Runtime.so` EXISTS at the
  # expected path — the compile neither links nor loads it. So the job needs the
  # `.so` present, not downloaded. It self-publishes linux-bionic-x64 the PROVEN
  # way this repo publishes it — windows-latest with the pinned NDK, exactly as
  # `build-test` and android-instrumented.yml's `publish-so` do — and points the
  # verify/copy chain at that publish tree with `-PciSoDir` (which also narrows
  # `abiFilters` to the x86_64 slice, so no arm64 publish is needed for a compile).
  # No export/IL2072 assertions here: `build-test` already gates those on every PR;
  # this job's one job is to prove the Android shell COMPILES. (`build-test` still
  # uploads its `.so` artifacts for the android-instrumented emulator lane — those
  # are untouched.)
  # ═══════════════════════════════════════════════════════════════════════════
  android-build:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET SDK (global.json — 10.0.3xx band)
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Setup JDK 21 (Temurin — Gradle daemon + sdkmanager)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # ── NDK (the bionic publish links with the pinned NDK's clang) ─────────
      # Mirrors build-test / publish-so verbatim: resolve the root, use the
      # preinstalled NDK if it is the pin, else restore-from-cache or sdkmanager.
      - name: Resolve toolchain paths (NDK root)
        run: |
          if (-not $env:ANDROID_HOME) { throw "ANDROID_HOME is not set on the runner image" }
          "ANDROID_NDK_ROOT=$env:ANDROID_HOME\ndk\$env:NDK_PIN" | Out-File $env:GITHUB_ENV -Append

      - name: Check for pinned NDK on the runner image
        id: check-ndk
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          $present = (Test-Path $props) -and
            ((Get-Content $props -Raw) -match ('(?m)^\s*Pkg\.Revision\s*=\s*' + [regex]::Escape($env:NDK_PIN) + '\s*$'))
          "present=$present" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "NDK $env:NDK_PIN preinstalled: $present"

      - name: Cache NDK ${{ env.NDK_PIN }}
        if: steps.check-ndk.outputs.present != 'True'
        uses: actions/cache@v6
        with:
          path: ${{ env.ANDROID_NDK_ROOT }}
          key: ndk-${{ runner.os }}-${{ env.NDK_PIN }}

      - name: Install NDK ${{ env.NDK_PIN }} (sdkmanager, on cache miss)
        if: steps.check-ndk.outputs.present != 'True'
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          if (Test-Path $props) { Write-Host "NDK restored from cache — skipping sdkmanager"; exit 0 }
          $sdkmanager = Join-Path $env:ANDROID_HOME "cmdline-tools\latest\bin\sdkmanager.bat"
          if (-not (Test-Path $sdkmanager)) { throw "sdkmanager not found at $sdkmanager" }
          "y" | & $sdkmanager --install "ndk;$env:NDK_PIN"
          if ($LASTEXITCODE -ne 0) { throw "sdkmanager failed to install ndk;$env:NDK_PIN (exit $LASTEXITCODE)" }

      - name: Verify NDK revision pin
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          if (-not (Test-Path $props)) { throw "NDK $env:NDK_PIN missing at $env:ANDROID_NDK_ROOT" }
          $pattern = '(?m)^\s*Pkg\.Revision\s*=\s*' + [regex]::Escape($env:NDK_PIN) + '\s*$'
          if ((Get-Content $props -Raw) -notmatch $pattern) {
            throw "NDK at $env:ANDROID_NDK_ROOT is not revision $env:NDK_PIN (source.properties mismatch)"
          }
          Write-Host "NDK revision $env:NDK_PIN verified at $env:ANDROID_NDK_ROOT"

      # ── Caches ────────────────────────────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src/BlazorNative.Jni/**/*.gradle.kts', 'src/BlazorNative.Jni/gradle/wrapper/gradle-wrapper.properties', 'src/BlazorNative.Jni/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Self-publish the bionic .so the compile needs present ───────────────
      # The x86_64 slice only — `-PciSoDir` below narrows abiFilters to it, so no
      # arm64 publish is needed. Lands at
      # samples/BlazorNative.SampleApp/bin/Release/net10.0/linux-bionic-x64/publish/
      # (the Phase 8.0 publish head; the canonicalization target names the .so
      # BlazorNative.Runtime.so), which is exactly where
      # verifyNativeAssets/copyRuntimeSo look. No IL2072/export assertions:
      # build-test owns those on every PR.
      - name: Publish linux-bionic-x64 (the .so compileDebugAndroidTestKotlin needs present)
        run: |
          dotnet publish samples/BlazorNative.SampleApp -c Release -r linux-bionic-x64 -tl:off -nologo
          if ($LASTEXITCODE -ne 0) { throw "linux-bionic-x64 publish failed (exit $LASTEXITCODE)" }

      # ── THE GATE ────────────────────────────────────────────────────────────
      # `compileDebugAndroidTestKotlin` compiles the Android shell (src/androidMain/kotlin)
      # AND the instrumented androidTest source set. No emulator is booted and no test
      # is run — the source sets simply have to resolve. `-PciSoDir` points the
      # verify/copy chain at the self-published bionic .so above.
      - name: Compile the Android shell + instrumented sources (no device)
        working-directory: src/BlazorNative.Jni
        run: |
          $soDir = Resolve-Path "..\..\samples\BlazorNative.SampleApp\bin\Release\net10.0\linux-bionic-x64\publish"
          .\gradlew.bat --no-daemon compileDebugAndroidTestKotlin "-PciSoDir=$soDir"
          if ($LASTEXITCODE -ne 0) {
            Write-Host ""
            Write-Host "══════════════════════════════════════════════════════════════════════"
            Write-Host "THE ANDROID SHELL DOES NOT COMPILE, AND THIS IS A REQUIRED CHECK."
            Write-Host ""
            Write-Host "A device is needed to RUN the instrumented tests, not to COMPILE them —"
            Write-Host "which is the whole reason this job exists. compileDebugAndroidTestKotlin"
            Write-Host "type-checks src/androidMain/kotlin (MainActivity, WidgetMapper, YogaLayout)"
            Write-Host "and the instrumented androidTest source set without booting an emulator."
            Write-Host ""
            Write-Host "That a whole source set can silently vanish is not hypothetical. The AGP 9"
            Write-Host "migration stopped feeding java.srcDirs to the Kotlin compiler, so the ENTIRE"
            Write-Host "Android shell went uncompiled — the app still ""built"", the JVM tests still"
            Write-Host "passed, and the ONLY lane that could see it (android-instrumented) is"
            Write-Host "nightly/dispatch and does not gate PRs. It merged to main green and sat"
            Write-Host "there. PR #81 is the precedent this gate carries forward."
            Write-Host ""
            Write-Host "Fix the compile error above. Do not weaken this gate."
            Write-Host "══════════════════════════════════════════════════════════════════════"
            throw "compileDebugAndroidTestKotlin failed (exit $LASTEXITCODE)"
          }

  # ═══════════════════════════════════════════════════════════════════════════
  # ios-build — THE iOS SHELL MUST COMPILE, AND A REQUIRED CHECK MUST SAY SO.
  #
  # ── WHY THIS JOB EXISTS ────────────────────────────────────────────────────
  # The AGP 9 migration proved that an assertion can be green and STRUCTURALLY
  # UNREACHABLE. `android-instrumented` asserted 111 passing tests while
  # `src/androidMain/kotlin` — MainActivity, WidgetMapper, YogaLayout, the ENTIRE
  # Android shell — was not being compiled at all, because that lane is
  # nightly/dispatch and does not gate PRs. It landed on `main` green and sat
  # there. PR #81 closed it by compiling the instrumented sources in build-test;
  # that gate now has its own required job, `android-build` (above).
  #
  # **The iOS shell was in the same hole, and structurally deeper** (M6 final
  # audit, finding F1):
  #   · `build-test` runs on windows-latest. It contains no Apple toolchain, so
  #     NO REQUIRED CHECK COMPILED A SINGLE LINE OF SWIFT OR OBJECTIVE-C++.
  #   · `ios.yml` — the shell's only compilation — is advisory, and (until this
  #     change) had no `push` trigger and a `paths:` filter, so a PR touching only
  #     `tests/**` or `scripts/**` did not even RUN it.
  #   · Demonstrated live during the audit: Renovate merged PR #82 — Kingfisher
  #     **v8**, a MAJOR bump of the iOS image library Phase 6.3 depends on — and
  #     nothing REQUIRED the iOS lane to pass. It happened to touch an Apple path,
  #     so the lane ran and was green. Nothing made that so.
  #
  # ── WHY IT STOPS AT `build-for-testing`, AND WHY THAT IS NOT TIMIDITY ──────
  # A device is needed to RUN the tests, not to COMPILE them — the same sentence
  # `compileDebugAndroidTestKotlin` is justified by. `xcodebuild build-for-testing`
  # compiles every Swift and Objective-C++ file in BOTH targets and LINKS the app
  # AND the XCTest bundle (so a missing `blazornative_*` export, a broken Yoga
  # C-ABI signature, or a Kingfisher API that vanished in a major bump all fail
  # HERE) — without booting a simulator and without running a test.
  #
  # Simulator EXECUTION stays in `ios.yml` and stays ADVISORY, on purpose: it has
  # real flake modes (sim boot, test-host launch) that a required check must not
  # import. Compiling has none of them. This job is the honest intersection: the
  # part that cannot flake, made required.
  # ═══════════════════════════════════════════════════════════════════════════
  ios-build:
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET SDK (global.json — 10.0.3xx band)
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      # macos-latest drifts (Xcode, SDK, clang). Record it — assert nothing — so a
      # link failure that is really an image bump is diagnosable from one run.
      #
      # The Xcode build number is ALSO an output, because it is half of the Yoga
      # cache key: a new Xcode is a new clang, and a libyoga.a compiled under the old
      # one must not be silently reused. (`${{ env.ImageOS }}` cannot do this job —
      # the `env` context holds only workflow-declared variables, so a runner-set
      # variable evaluates to the empty string and the key degrades to a constant.)
      - name: Record toolchain (dotnet + Xcode + clang + sim SDK)
        id: toolchain
        run: |
          set -euo pipefail
          mkdir -p ios-build-out
          {
            echo "=== dotnet ==="; dotnet --version
            echo "=== runner ==="; uname -a; sw_vers || true
            echo "=== Xcode ==="; xcode-select -p; xcodebuild -version || true
            echo "=== sim SDK ==="; xcrun --sdk iphonesimulator --show-sdk-version || true
            echo "=== clang ==="; xcrun -sdk iphonesimulator clang --version || true
          } 2>&1 | tee ios-build-out/toolchain.txt
          xcode=$(xcodebuild -version | tr '\n' '-' | tr -cd '[:alnum:].-')
          [ -n "$xcode" ] || { echo "could not read the Xcode version" >&2; exit 1; }
          echo "xcode=$xcode" >> "$GITHUB_OUTPUT"
          echo "Xcode fingerprint (Yoga cache key): $xcode"

      # ── Caches ──────────────────────────────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Yoga is ~60 C++20 translation units compiled one at a time — the single
      # slowest step in the lane and a pure function of (version, toolchain). Keyed
      # on the pinned version AND the Xcode build, because a new Xcode is a new clang
      # and the .a it produced under the old one must not be reused silently. No
      # `restore-keys`: a partial-match restore is exactly the silent reuse this key
      # exists to prevent.
      - name: Cache libyoga.a (v${{ env.YOGA_VERSION }})
        id: yoga-cache
        uses: actions/cache@v6
        with:
          path: |
            src/BlazorNative.Apple/vendor/libyoga.a
            src/BlazorNative.Apple/vendor/yoga-include
          key: yoga-${{ runner.os }}-${{ steps.toolchain.outputs.xcode }}-${{ env.YOGA_VERSION }}

      - name: Cache SwiftPM (Kingfisher)
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/SPM
          key: spm-${{ runner.os }}-${{ hashFiles('src/BlazorNative.Apple/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # ── Publish the static NativeAOT archive ────────────────────────────────
      - name: Publish iossimulator-arm64 (NativeLib=Static; assert exactly 4 IL2072)
        run: |
          set -o pipefail
          # PublishAot is NOT passed on the CLI (the Phase 5.2 rule): it lives in the
          # publish head's own PropertyGroup (samples/BlazorNative.SampleApp since
          # Phase 8.0), local and non-propagating. A CLI -p:PublishAot becomes a
          # GLOBAL property and propagates to the P2P refs
          # (Runtime/Core/Renderer/Http/Components), which lack the runtime-pack
          # bypass → NETSDK1203. Same invocation as ios.yml's and as ci.yml's three
          # publishes.
          dotnet publish samples/BlazorNative.SampleApp -c Release -r iossimulator-arm64 \
            -tl:off -nologo 2>&1 | tee ios-build-out/publish.log
          il2072=$(grep -c 'warning IL2072' ios-build-out/publish.log || true)
          echo "IL2072 count: $il2072"
          if [ "$il2072" -ne 4 ]; then
            grep 'warning IL2072' ios-build-out/publish.log || true
            echo "iossimulator-arm64 publish IL2072 drift: expected exactly 4, got $il2072" >&2
            exit 1
          fi

      # ── Assemble the STATIC-EMBED link inputs (the 5.2 recipe) ──────────────
      # No `nm` export assertion here: ios.yml owns that, and this job LINKS the app,
      # which is a strictly stronger statement — a missing blazornative_* export is an
      # undefined symbol at the -force_load below, and the job goes red naming it.
      - name: Stage the link inputs (runtime .a + bootstrapperdll.o + support archive)
        run: |
          set -euo pipefail
          tree_root="samples/BlazorNative.SampleApp/bin/Release/net10.0/iossimulator-arm64"
          archive="$tree_root/publish/BlazorNative.Runtime.a"
          [ -f "$archive" ] || archive="$tree_root/native/BlazorNative.Runtime.a"
          if [ ! -f "$archive" ]; then
            echo "No BlazorNative.Runtime.a under $tree_root (publish/ or native/)" >&2
            find samples/BlazorNative.SampleApp/bin -type f -name '*.a' 2>/dev/null | sort >&2 || true
            exit 1
          fi
          mkdir -p src/BlazorNative.Apple/vendor
          cp "$archive" src/BlazorNative.Apple/vendor/libBlazorNative.Runtime.a

          # Phase 7.4: assert the export surface ON THE ARCHIVE, with VISIBILITY.
          # The post-link gate below proved blazornative_init can vanish from the
          # linked dylib's global table while `nm -gU` on the .a still lists all
          # nine exports — because nm -gU also lists private-external (N_PEXT)
          # globals, which ld64 LOCALIZES in the output (no -exported_symbols_list
          # is passed; a default-visibility global in a force_loaded member MUST
          # surface as a dylib export, a private-external one MUST NOT). So "the
          # nine symbols are in the .a" (ios.yml's check) does not prove the app
          # will export them. `nm -m` names the verdict per symbol ("external"
          # vs "private external"); assert it HERE so an ILC visibility flip
          # fails at its source with the discriminating evidence, not two
          # minutes later at the far end of an xcodebuild.
          vendored=src/BlazorNative.Apple/vendor/libBlazorNative.Runtime.a
          echo "=== nm -m: blazornative_* in the staged archive ===" | tee ios-build-out/archive-visibility.txt
          nm -m "$vendored" 2>&1 | grep -E ' _?blazornative_[a-z_]+$' | tee -a ios-build-out/archive-visibility.txt || true
          expected="blazornative_dispatch_event blazornative_fetch_complete blazornative_host_event blazornative_init blazornative_mount blazornative_register_bridge blazornative_register_frame_callback blazornative_shutdown blazornative_version"
          actual=$(nm -gU "$vendored" 2>/dev/null | grep -Eo '_?blazornative_[a-z_]+' | sed 's/^_//' | sort -u)
          missing=""
          for s in $expected; do echo "$actual" | grep -qx "$s" || missing="$missing $s"; done
          if [ -n "$missing" ]; then
            echo "Export surface drift in BlazorNative.Runtime.a: missing$missing" >&2
            exit 1
          fi
          hidden=$(nm -m "$vendored" 2>/dev/null | grep -E ' _?blazornative_[a-z_]+$' | grep -c 'private external' || true)
          if [ "$hidden" -ne 0 ]; then
            echo "$hidden of the 9 blazornative_* exports are PRIVATE EXTERNAL in the archive — ld64 will localize them and the linked app will not export them. This is an ILC emission change (toolchain or publish-property drift), not a link problem; see archive-visibility.txt in the artifact." >&2
            exit 1
          fi
          echo "SYMBOLS: all 9 blazornative_* present and externally visible in the staged archive."

          pack_native=$(find "$HOME/.nuget/packages/microsoft.netcore.app.runtime.nativeaot.iossimulator-arm64" \
            -type d -path '*runtimes/iossimulator-arm64/native' 2>/dev/null | sort | tail -1)
          if [ -z "$pack_native" ] || [ ! -d "$pack_native" ]; then
            echo "NativeAOT iossimulator runtime pack native dir not found" >&2; exit 1
          fi
          # libbootstrapperdll.o is DIRECT-linked (not merged): its
          # __attribute__((constructor)) must land in the app's init_array. As an
          # archive member it would be on-demand and never pulled → RuntimeInstance
          # stays NULL. This is the 5.2 load-bearing fix; do not "tidy" it into the
          # merge below.
          if [ ! -f "$pack_native/libbootstrapperdll.o" ]; then
            echo "libbootstrapperdll.o missing under $pack_native" >&2; exit 1
          fi
          cp "$pack_native/libbootstrapperdll.o" src/BlazorNative.Apple/vendor/bootstrapperdll.o

          # …and the rest, merged into ONE on-demand support archive, minus the
          # non-default GC/eventpipe variants (the app is ILC-compiled for
          # WorkstationGC with eventpipe/standalonegc DISABLED; the -enabled members
          # define the same symbols and would be ambiguously pulled).
          support=()
          for f in "$pack_native"/*.a; do
            case "$(basename "$f")" in
              libRuntime.ServerGC.a|libeventpipe-enabled.a|libstandalonegc-enabled.a) continue;;
            esac
            support+=("$f")
          done
          if [ "${#support[@]}" -eq 0 ]; then echo "No support .a under $pack_native" >&2; exit 1; fi
          xcrun libtool -static -o src/BlazorNative.Apple/vendor/libBnRuntimeSupport.a "${support[@]}"
          ls -la src/BlazorNative.Apple/vendor | tee ios-build-out/vendor.txt

      # ── Yoga from source (cache miss only) ──────────────────────────────────
      # The same recipe as ios.yml's, at the same pinned version — and the pin is
      # asserted equal to ios.yml's and to build.gradle.kts's in build-test's first
      # step, so the required compile lane and the advisory behaviour lane can never
      # be talking about different engines.
      - name: "Yoga: build libyoga.a (v${{ env.YOGA_VERSION }}) for iossimulator-arm64"
        if: steps.yoga-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/facebook/yoga/archive/refs/tags/v${YOGA_VERSION}.tar.gz" -o yoga-src.tgz
          tar xzf yoga-src.tgz
          yroot="yoga-${YOGA_VERSION}"
          [ -f "$yroot/yoga/Yoga.h" ] || { echo "Yoga.h not found under $yroot/yoga" >&2; exit 1; }
          sdk=$(xcrun --sdk iphonesimulator --show-sdk-path)
          mkdir -p yoga-obj src/BlazorNative.Apple/vendor
          count=0
          while IFS= read -r cpp; do
            obj="yoga-obj/$(echo "$cpp" | tr '/.' '__').o"
            xcrun -sdk iphonesimulator clang++ -arch arm64 -isysroot "$sdk" \
              -mios-simulator-version-min=13.0 -std=c++20 -O2 -fPIC \
              -I"$yroot" -c "$cpp" -o "$obj"
            count=$((count+1))
          done < <(find "$yroot/yoga" -name '*.cpp' | sort)
          echo "Compiled $count Yoga translation units"
          [ "$count" -gt 0 ] || { echo "no Yoga .cpp compiled" >&2; exit 1; }
          xcrun libtool -static -o src/BlazorNative.Apple/vendor/libyoga.a yoga-obj/*.o
          mkdir -p src/BlazorNative.Apple/vendor/yoga-include
          cp -R "$yroot/yoga" src/BlazorNative.Apple/vendor/yoga-include/yoga
          # Drop Yoga's bundled module.modulemap — with it present Clang's
          # explicit-module scanner tries to build a `yoga` MODULE and cannot resolve
          # the module's own headers. Removing it forces plain TEXTUAL includes via
          # HEADER_SEARCH_PATHS (the proven path; project.yml documents it).
          rm -f src/BlazorNative.Apple/vendor/yoga-include/yoga/module.modulemap

      - name: Verify libyoga.a is present and carries the Yoga C-API (cache or build)
        run: |
          set -euo pipefail
          lib=src/BlazorNative.Apple/vendor/libyoga.a
          [ -f "$lib" ] || { echo "libyoga.a is missing — the cache restored an empty tree" >&2; exit 1; }
          [ -f src/BlazorNative.Apple/vendor/yoga-include/yoga/Yoga.h ] \
            || { echo "vendor/yoga-include/yoga/Yoga.h is missing — BnYogaLayout.mm cannot compile" >&2; exit 1; }
          # Asserted, not observed — and it matters MORE on a cache hit than on a
          # build: a truncated/empty cached archive would otherwise only surface at
          # link time, far from its cause.
          ysyms=$(nm -gU "$lib" 2>/dev/null | grep -Eo '_?YGNode[A-Za-z]+' | sed 's/^_//' | sort -u || true)
          missing=()
          for s in YGNodeNew YGNodeCalculateLayout YGNodeSetMeasureFunc; do
            echo "$ysyms" | grep -qx "$s" || missing+=("$s")
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "libyoga.a is missing Yoga C-API symbols: ${missing[*]}" >&2; exit 1
          fi
          echo "SYMBOLS: the Yoga C-API entry points are present in libyoga.a."

      # ── Generate the Xcode project ──────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate BnHost.xcodeproj
        working-directory: src/BlazorNative.Apple
        run: xcodegen generate --spec project.yml 2>&1 | tee ../../ios-build-out/xcodegen.log

      # ── THE GATE ────────────────────────────────────────────────────────────
      # `build-for-testing` compiles BnHost (Swift + the two .mm files) AND
      # BnHostTests, resolves Kingfisher through SwiftPM, and LINKS both products
      # against the NativeAOT archive, the merged support archive and libyoga.a.
      #
      # `generic/platform=iOS Simulator` resolves a destination WITHOUT booting one.
      # ARCHS=arm64 is explicit because a *generic* simulator destination would
      # otherwise build every valid slice, and the three vendored archives
      # (runtime, support, yoga) are simulator-arm64 ONLY — an x86_64 slice would
      # fail to link for a reason that has nothing to do with the code under test.
      - name: xcodebuild build-for-testing (Swift + ObjC++ compile AND link — no simulator)
        working-directory: src/BlazorNative.Apple
        run: |
          set -o pipefail
          if ! xcodebuild build-for-testing \
                 -project BnHost.xcodeproj \
                 -scheme BnHost \
                 -destination 'generic/platform=iOS Simulator' \
                 -derivedDataPath "$RUNNER_TEMP/DerivedData" \
                 -clonedSourcePackagesDirPath "$RUNNER_TEMP/SPM" \
                 ARCHS=arm64 \
                 CODE_SIGNING_ALLOWED=NO \
                 2>&1 | tee ../../ios-build-out/xcodebuild-build-for-testing.log; then
            cat <<'WHY' >&2

          ══════════════════════════════════════════════════════════════════════
          THE iOS SHELL DOES NOT COMPILE, AND THIS IS A REQUIRED CHECK.

          A device is needed to RUN the iOS tests, not to COMPILE them — which is
          the whole reason this job exists. `build-test` runs on Windows and has
          no Apple toolchain; `ios.yml` is ADVISORY and does not gate a merge. So
          without this gate the Swift/Objective-C++ shell can stop compiling
          entirely and land on `main` green.

          That is not hypothetical. The AGP 9 migration did exactly this to the
          ANDROID shell: `android-instrumented` asserted 111 passing tests while
          `src/androidMain/kotlin` was not being compiled at all, because that
          lane does not gate PRs either. It merged, and it sat there.

          Fix the compile error above. Do not weaken this gate.
          ══════════════════════════════════════════════════════════════════════
          WHY
            exit 1
          fi

      # ── Prove it LINKED, rather than trusting a zero exit code ──────────────
      # `xcodebuild` exiting 0 is not the assertion. A scheme change that quietly
      # stopped building the TEST target would leave this job green over an
      # uncompiled test suite — and the test target is the half that matters here,
      # because BnHostTests/*.swift is where the 72 assertions (and the frame-table
      # declaration the required .NET drift test parses) actually live.
      #
      # The three artefacts, and what each one rules out:
      #   · BnHostTests.xctest — the test bundle LINKED. It is a PlugIn INSIDE the
      #     app (BnHost.app/PlugIns/), not a sibling of it, so it is found by name
      #     rather than by depth.
      #   · the .xctestrun — the run plan. This is precisely what `build-for-testing`
      #     exists to emit, i.e. "a device could now run this without building it".
      #   · blazornative_init, defined in the app's Mach-O. Scanned across BOTH
      #     BnHost and BnHost.debug.dylib: Xcode's debug builds SPLIT the app into a
      #     stub executable plus a debug dylib that carries the code (and therefore
      #     the force_loaded NativeAOT archive), so pinning the symbol to the
      #     executable alone would assert nothing about where it really landed.
      - name: Assert the app, the XCTest bundle and the run plan were all produced
        run: |
          set -uo pipefail
          dd="$RUNNER_TEMP/DerivedData/Build/Products"
          app=$(find "$dd" -name 'BnHost.app' -type d | head -1)
          bundle=$(find "$dd" -name 'BnHostTests.xctest' -type d | head -1)
          xctestrun=$(find "$dd" -maxdepth 1 -name '*.xctestrun' | head -1)
          echo "app       : ${app:-<none>}"
          echo "xctest    : ${bundle:-<none>}"
          echo "xctestrun : ${xctestrun:-<none>}"
          if [ -z "$app" ] || [ -z "$bundle" ] || [ -z "$xctestrun" ]; then
            find "$dd" -maxdepth 4 2>/dev/null | head -60 >&2 || true
            echo "build-for-testing exited 0 but did not produce all three artefacts. The XCTest bundle and its run plan are the half that matters: BnHostTests/*.swift is the ONLY place the 72 assertions live, so a scheme change that quietly stopped building the test target would leave this gate green over an uncompiled test suite." >&2
            exit 1
          fi

          # blazornative_init must be DEFINED in the app's own Mach-O — the proof the
          # NativeAOT archive was force_loaded and not merely referenced.
          #
          # NOT `grep -q`, under pain of a raced gate (PR #99's failure): this step
          # runs under pipefail, and `grep -q` exits at the FIRST match, closing the
          # pipe while nm is still writing its ~280 KB symbol listing. nm then dies
          # of SIGPIPE (141), pipefail hands the pipeline nm's status, and the `if`
          # reads a SUCCESSFUL match as failure. Whether nm's tail write lands after
          # grep's exit is fixed by the symbol table's size and the match's position,
          # so the race is per-binary DETERMINISTIC: main passed every run while the
          # 7.4 branch — same link, same toolchain, entrypoints verifiably external
          # in nlist AND export trie — failed every run, purely because its symbol
          # table grew. Plain grep with stdout dropped reads to EOF; no early close,
          # no SIGPIPE, and the pipeline's status is grep's verdict alone.
          found=""
          for bin in "$app/BnHost" "$app/BnHost.debug.dylib"; do
            [ -f "$bin" ] || continue
            if nm -gU "$bin" 2>/dev/null | grep 'blazornative_init' >/dev/null; then
              found="$bin"
              break
            fi
          done
          if [ -z "$found" ]; then
            echo "=== Mach-O binaries in the app bundle ===" >&2
            ls -la "$app" >&2 || true
            # Phase 7.4: discriminating evidence, captured in the artifact. The
            # symbol being ABSENT (archive not force_loaded) and the symbol being
            # PRESENT BUT LOCAL (localized by ld64) fail this same grep but have
            # opposite fixes — nm -m names which one happened per entrypoint, and
            # dyld_info -exports gives the EXPORT TRIE (what dyld/dlsym actually
            # see), which is authoritative even when the nlist symbol table is not.
            # (Round 1 established: the staged archive has all 9 external
            # [no dead strip]; the resp files carry only -add_ast_path, no
            # -exported_symbols_list.)
            {
              for bin in "$app/BnHost" "$app/BnHost.debug.dylib"; do
                [ -f "$bin" ] || continue
                b=$(basename "$bin")
                echo "=== $b: nm -m, the 9 entrypoints exactly ==="
                nm -m "$bin" 2>&1 | grep -E ' _?blazornative_[a-z_]+$' || echo "(none of the 9 entrypoints in the nlist)"
                echo "=== $b: export trie (dyld_info -exports) ==="
                xcrun dyld_info -exports "$bin" 2>&1 | grep -iE 'blazornative' || echo "(no blazornative in the export trie)"
                echo "=== $b: nlist totals: all=$(nm "$bin" 2>/dev/null | wc -l | tr -d ' ') global-defined=$(nm -gU "$bin" 2>/dev/null | wc -l | tr -d ' ') ==="
              done
            } 2>&1 | tee ios-build-out/link-failure-evidence.txt >&2 || true
            echo "No binary in BnHost.app DEFINES blazornative_init (globally). Either the NativeAOT static archive was not force_loaded, or its exports were emitted private-external and ld64 localized them — link-failure-evidence.txt in the artifact says which. Both would SIGSEGV/dlsym-fail at launch rather than fail to build, which is why it is asserted here." >&2
            exit 1
          fi
          echo "LINKED: BnHost.app + BnHostTests.xctest + the run plan; blazornative_init is defined in $(basename "$found")."

      - name: Upload — ios-build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-out
          path: ios-build-out
          if-no-files-found: warn
