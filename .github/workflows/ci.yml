# ─────────────────────────────────────────────────────────────────────────────
# BlazorNative PR CI (Phase 4.0 Gate 2) — the safety net every later M4 phase
# rides on. TWO jobs, and BOTH are required checks:
#
#   build-test (windows-latest) — the local verification procedure verbatim
#   (setup.ps1 §1–7 documents the toolchain pins):
#     build (analyzers ride it) → .NET tests (324 passed / 0 skipped) →
#     three NativeAOT publishes (win-x64, linux-bionic-x64, linux-bionic-arm64;
#     each publish must show exactly the 4 accepted IL2072 trim warnings) →
#     nine-export verification (dumpbin via vswhere / llvm-readelf from the
#     pinned NDK) → Gradle testDebugUnitTest against the fresh win-x64 dll
#     (83 passed / 0 failed) → the instrumented sources COMPILE →
#     consumer smoke (five packages from the local feed mount a Bn* component
#     + analyzer trip; Phase 4.5, M4 DoD #7) → artifacts for the instrumented
#     (Gate 3) job.
#
#   ios-build (macos-latest) — THE iOS SHELL MUST COMPILE. Publish +
#     `xcodebuild build-for-testing`: Swift + Objective-C++ compiled, the app
#     and the XCTest bundle LINKED. No simulator is booted and no test is run.
#     See the job's own header for why this exists and why it stops here.
#
# Baselines are asserted, not observed: count drift fails the job loudly.
# ─────────────────────────────────────────────────────────────────────────────
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NDK_PIN: 26.3.11579264
  # Yoga is ONE engine used by TWO shells, and now by THREE files: Android's
  # Gradle pin, ios.yml's YOGA_VERSION, and this one — the version the `ios-build`
  # job below compiles from source. A third copy is a third thing that can drift,
  # so it is asserted against the other two in build-test's very first step (see
  # "Assert Yoga version parity"). It lives here rather than being grepped out of
  # ios.yml at run time because a `cache:` key must be resolvable BEFORE any step
  # runs — and an uncacheable Yoga build is ~90s on every PR.
  YOGA_VERSION: 3.2.1

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v7

      # ── Cross-shell pins (Phase 6.0) ───────────────────────────────────────
      # Yoga is ONE engine used by TWO shells: Android pulls the prebuilt Maven
      # artifact (build.gradle.kts), iOS builds the same release from source
      # (ios.yml's YOGA_VERSION). Identical frames on both platforms is the whole
      # reason for choosing Yoga — two different engine versions would erode that
      # silently, and neither shell's own lane can see the other's pin. So the pin
      # is asserted HERE, in the REQUIRED lane, where it can never rot. Bumping
      # Yoga means bumping ALL THREE files in one commit. (Baselines are asserted,
      # not observed — the same house rule as the export/test-count checks below.)
      #
      # THREE files, since the `ios-build` job below: this workflow's own
      # YOGA_VERSION is the version the REQUIRED compile lane builds from source,
      # and it must be the one the ADVISORY simulator lane runs against — otherwise
      # "the iOS shell compiles" and "the iOS shell lays out correctly" would be
      # statements about two different engines. `$env:YOGA_VERSION` IS ci.yml's pin
      # (it is what ios-build consumes), so it is read straight from the environment
      # rather than regexed back out of the file it came from.
      - name: Assert Yoga version parity (Android Gradle pin == iOS lane pin == this lane's pin)
        run: |
          $gradle = Get-Content "src\BlazorNative.Jni\build.gradle.kts" -Raw
          $ios    = Get-Content ".github\workflows\ios.yml" -Raw
          $gm = [regex]::Match($gradle, '(?m)^\s*implementation\("com\.facebook\.yoga:yoga:([^"]+)"\)')
          $im = [regex]::Match($ios, '(?m)^\s*YOGA_VERSION:\s*([0-9][^\s#]*)')
          if (-not $gm.Success) { throw "Could not find the com.facebook.yoga:yoga pin in build.gradle.kts — did the declaration move?" }
          if (-not $im.Success) { throw "Could not find YOGA_VERSION in .github/workflows/ios.yml — did the env pin move?" }
          $android = $gm.Groups[1].Value.Trim()
          $apple   = $im.Groups[1].Value.Trim()
          $here    = "$env:YOGA_VERSION".Trim()
          if (-not $here) { throw "ci.yml's own YOGA_VERSION is empty — the ios-build job would compile an unpinned Yoga." }
          Write-Host "Yoga pins: android(build.gradle.kts)=$android  ios(ios.yml)=$apple  ci(ios-build)=$here"
          if ($android -ne $apple -or $android -ne $here) {
            throw "Yoga version drift: Android pins $android, the iOS simulator lane builds $apple, the required ios-build lane builds $here. One engine, three files — bump them together."
          }

      # ── Toolchain ──────────────────────────────────────────────────────────
      - name: Setup .NET SDK (global.json — 10.0.3xx band)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup JDK 21 (Temurin — Gradle daemon + sdkmanager)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve toolchain paths (NDK root + vswhere on PATH)
        run: |
          if (-not $env:ANDROID_HOME) { throw "ANDROID_HOME is not set on the runner image" }
          "ANDROID_NDK_ROOT=$env:ANDROID_HOME\ndk\$env:NDK_PIN" | Out-File $env:GITHUB_ENV -Append
          # The ILCompiler win-x64 link step invokes vswhere.exe by bare name.
          "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer" | Out-File $env:GITHUB_PATH -Append

      - name: Check for pinned NDK on the runner image
        id: check-ndk
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          $present = (Test-Path $props) -and
            ((Get-Content $props -Raw) -match ('(?m)^\s*Pkg\.Revision\s*=\s*' + [regex]::Escape($env:NDK_PIN) + '\s*$'))
          "present=$present" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "NDK $env:NDK_PIN preinstalled: $present"

      - name: Cache NDK ${{ env.NDK_PIN }}
        if: steps.check-ndk.outputs.present != 'True'
        uses: actions/cache@v6
        with:
          path: ${{ env.ANDROID_NDK_ROOT }}
          key: ndk-${{ runner.os }}-${{ env.NDK_PIN }}

      - name: Install NDK ${{ env.NDK_PIN }} (sdkmanager, on cache miss)
        if: steps.check-ndk.outputs.present != 'True'
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          if (Test-Path $props) { Write-Host "NDK restored from cache — skipping sdkmanager"; exit 0 }
          $sdkmanager = Join-Path $env:ANDROID_HOME "cmdline-tools\latest\bin\sdkmanager.bat"
          if (-not (Test-Path $sdkmanager)) { throw "sdkmanager not found at $sdkmanager" }
          "y" | & $sdkmanager --install "ndk;$env:NDK_PIN"
          if ($LASTEXITCODE -ne 0) { throw "sdkmanager failed to install ndk;$env:NDK_PIN (exit $LASTEXITCODE)" }

      - name: Verify NDK revision pin
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          if (-not (Test-Path $props)) { throw "NDK $env:NDK_PIN missing at $env:ANDROID_NDK_ROOT" }
          $pattern = '(?m)^\s*Pkg\.Revision\s*=\s*' + [regex]::Escape($env:NDK_PIN) + '\s*$'
          if ((Get-Content $props -Raw) -notmatch $pattern) {
            throw "NDK at $env:ANDROID_NDK_ROOT is not revision $env:NDK_PIN (source.properties mismatch)"
          }
          Write-Host "NDK revision $env:NDK_PIN verified at $env:ANDROID_NDK_ROOT"

      # ── Caches (no lockfiles in the repo — keyed on project-file hashes) ───
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src/BlazorNative.Jni/**/*.gradle.kts', 'src/BlazorNative.Jni/gradle/wrapper/gradle-wrapper.properties', 'src/BlazorNative.Jni/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Build + .NET tests ─────────────────────────────────────────────────
      - name: Build (Release — analyzers ride the build)
        run: |
          dotnet build BlazorNative.sln -c Release -tl:off -nologo
          if ($LASTEXITCODE -ne 0) { throw "dotnet build failed (exit $LASTEXITCODE)" }

      # 230 → 287 (Phase 6.1 Gate 1, +57): the flex surface arrives on the .NET
      # side.
      #
      # Renderer.Tests 60 → 100 (+40). The SetStyle allow-list gained the flex
      # names (15 theory cases, one each) plus the null-reset regression pair (a
      # removed STYLE must leave on the style wire; a removed prop must not), and
      # the Gate 1 review added StyleAttributePartitionTests (23): the allow-list
      # is the SHELLS' ROUTING TABLE, so its union/disjointness (Yoga-layout vs
      # view-visual), its ordinal case rule, and the names deliberately NOT on it
      # (alignContent/rowGap/columnGap/display/flex — no producer) are pinned.
      #
      # Runtime.Tests 147 → 164 (+17): BnView flex-param pins (incl. the
      # un-styled invariant and the invariant-culture float), BnRow/BnColumn
      # preset pins — both DECLARATION (reflective) and FORWARDING (the presets,
      # fed the full param dictionary, must emit BnView's whole wire table; a
      # deleted forwarding line reddens THIS one, review finding C1) — the
      # null-through-the-preset round trip, the Flex*-prefix type-name pin, and
      # the 2 BnLayoutDemo goldens Gates 2/3 derive their frame expectations from.
      #
      # 287 -> 289 (Phase 6.1 Gate 2 review, +2): ShellStyleTableDriftTests. The
      # shells carry HAND-WRITTEN mirrors of the SetStyle layout allow-list
      # (YogaLayout.kt's YOGA_STYLES today; BnYogaLayout.mm's name table from Gate
      # 3), and a name that exists in .NET but is missing from a shell does NOT fail
      # loudly — the shell's router drops it into the visual branch, logs "not yet
      # supported" and SILENTLY discards the style. So the mirror is pinned the way
      # this repo pins every cross-language contract (the patch struct, the export
      # count, the Yoga version): a drift test, parsing the Kotlin literal out of the
      # checkout and asserting set-equality + disjointness. It lives in the REQUIRED
      # build-test lane because that is the only one where .NET, Kotlin and (soon) the
      # .mm are all checkout-visible — neither shell lane can see the other's source.
      #
      # 289 -> 292 (Phase 6.1 Gate 3, +3): the THIRD mirror lands, and the same file
      # pins it — BnYogaLayout.mm's `kYogaStyles` gets its own set-equality and
      # disjointness arms, plus a direct Kotlin-vs-.mm equality (the sentence DoD #2
      # actually rests on: a name one shell honours and the other drops makes the two
      # frame tables disagree, and the failure reads as "the engine is broken").
      #
      # 292 -> 294 (Phase 6.1 Gate 3 review, +2): the same file pins the DISPATCH
      # behind the tables. A name being ON a table only says the shell ROUTES it to
      # Yoga; whether a SETTER exists at the other end is a separate fact, and a name
      # with no arm behaves EXACTLY like a rejected value (the .mm's if/else chain
      # falls through to 0; Kotlin's `when` lands on `else -> logIgnore`). So six iOS
      # arms were only ever asserted rc == 0 — which a missing arm returns too.
      #   +1 AppleParserTestsRoutedNames_AreExactlyTheRenderersYogaHalf — iOS is pinned
      #      at RUNTIME (BnYogaStyleParserTests feeds every routed name a legal value
      #      and demands rc == 1); this pins that test's own hand-written name list, so
      #      the pin cannot quietly stop covering a name.
      #   +1 AndroidSetStyleDispatch_HasAnArmForEveryYogaStyle — Kotlin's setStyle
      #      returns Unit (no rc to demand), so its dispatch is pinned at the SOURCE:
      #      every routed name must appear as a `when` literal in setStyle's body.
      #
      # Nothing Kotlin-side moved on the JVM rung: the JVM baseline below stays 79.
      # (The Android instrumented suite is 52 -> 71 — its own lane asserts that; the
      # iOS XCTest suite is 14 -> 29 — ios.yml asserts that.)
      #
      # 294 -> 302 (Phase 6.2 Gate 1, +8): the `scroll` NodeType stops being a stub.
      # ALL EIGHT are Runtime.Tests (164 -> 172); Renderer.Tests (107) and
      # Analyzers.Tests (23) do not move, because there is NO ABI/wire change —
      # MapElementToNodeType has mapped "scroll"/"overflow" to NodeType 6 since
      # Phase 2.5, so 6.2 Gate 1 is a Components-side addition and nothing in the
      # renderer's allow-list, patch set or export surface is touched (still 9
      # exports on 3 RIDs, still 4 accepted IL2072s).
      #
      # The +8, by provenance:
      #   +5  BnComponentTests — BnScroll's surface: the scroll NodeType + its
      #       children's placement; the un-styled invariant; DECLARATION (the item
      #       surface, and NOT the container-layout family — 6.2 decision 1);
      #       FORWARDING (the item styles reach the wire, no container style does);
      #       and the RAW-ELEMENT HATCH (a hand-written `scroll` element STILL puts
      #       flexDirection/gap/padding on the wire — which is precisely why the
      #       shells must ignore-and-log those six names on a scroll node, 6.2
      #       decision 2. If that test ever goes red, the shells' rule is dead code).
      #   +3  BnScrollDemoTests — the "/scroll" patch golden (creates, insert
      #       indices, the whole style table AND its count), the back-nav round
      #       trip, and the CONTRACT'S ARITHMETIC (RowCount × RowHeightDp == 800;
      #       800 - ViewportHeightDp == 600 — the content size is computed by the
      #       contract, not restated in prose that Gates 2/3 then transcribe).
      #   +4  BnComponentTests — BnScroll: the `scroll` NodeType + its children
      #       parenting to it ON THE WIRE (the content node the shells interpose is
      #       SYNTHETIC — never a patch); the un-styled invariant on the new element;
      #       and the 6.1 DECLARATION/FORWARDING pair, both of which are needed. The
      #       reflective one pins that the surface is BnView's minus Direction
      #       (vertical-only, design decision 2); the BEHAVIOURAL one — fed BnView's
      #       full param dictionary, BnScroll must emit BnView's whole SetStyle table
      #       and no flexDirection — is what BITES. Mutation-verified: deleting the
      #       flexShrink line reddens the behavioural test and leaves the reflective
      #       one green, which is exactly the hole 6.1's Gate 1 review found.
      #   +2  BnScrollDemoTests — THE GOLDEN Gates 2/3 derive their frame and
      #       content-size expectations from ("/scroll": a 300x200 viewport over ten
      #       80-high rows -> the synthetic content node computes to 800, scrollable
      #       range 600), plus the route/back-nav pin. Its create count (19, not 20)
      #       is itself the pin that the content node never leaks onto the wire.
      #
      # The 6.1 goldens do not move: BnDemo, BnSettingsPage and BnLayoutDemo keep
      # their tables byte-for-byte (non-negotiable #4 — scroll must not perturb an
      # un-scrolled tree), and the JVM baseline below stays 79 (nothing Kotlin-side
      # moves until Gate 2).
      #
      # 302 -> 304 (Phase 6.2 Gate 2 REVIEW, +2): the SCROLL-NODE IGNORE LIST becomes
      # a PINNED TWO-SHELL CONTRACT instead of a KDoc comment. Both are
      # Renderer.Tests/ShellStyleTableDriftTests (107 -> 109) — the same parser and the
      # same lane that already pin the three YOGA_STYLES mirrors, because build-test is
      # the ONE required lane where .NET, Kotlin and the .mm are all checkout-visible.
      #   +1 AndroidScrollIgnoredStyles_AreAllRoutedToYoga — every name on
      #      SCROLL_IGNORED_CONTAINER_STYLES must ALSO be on YOGA_STYLES. Not ceremony:
      #      the ignore rule lives in YogaLayout.setStyle, which is only reached when
      #      owns() routes the name to Yoga. A name on the ignore list but OFF the
      #      routing table never reaches the rule at all — it falls into WidgetMapper's
      #      VISUAL branch and is dropped with a "not yet supported" log, i.e. the exact
      #      silent-drop this file exists to prevent, arrived at from the other side.
      #   +1 TheTwoShellsScrollIgnoreLists_AreIdenticalToEachOther — the six names are
      #      normative for BOTH shells (design decision 6) and Gate 3 is about to
      #      hand-copy them into the .mm with nothing checking them. A shell that misses
      #      `justifyContent` offsets the content node to y = -300 (free space on a
      #      scrolling viewport is NEGATIVE) and PERMANENTLY HIDES the top of the page —
      #      silently, on ONE platform, with every frame in the parity table still
      #      correct. GATED until Gate 3 lands: build-test is a REQUIRED check, so a
      #      test red until the iOS shell exists would block every push on the branch
      #      (including Gate 3's own). Until BnWidgetMapper.swift has a UIScrollView it
      #      asserts the ABSENCE of both and names exactly what iOS owes; the moment the
      #      viewport lands, the gate opens and it becomes a hard set-equality pin that
      #      reddens in the commit that ships a viewport without the list.
      #
      # 304 -> 316 (Phase 6.3 Gate 1, +12): the `image` NodeType stops being a stub —
      # the LAST stubbed leaf gains a producer. Renderer.Tests 109 -> 110,
      # Runtime.Tests 172 -> 183, Analyzers.Tests unchanged at 23. There is NO ABI/wire
      # change: MapElementToNodeType has mapped `img` to NodeType 5 since Phase 2.5, and
      # `src` rides the EXISTING UpdateProp wire (still 9 exports on 3 RIDs, still 4
      # accepted IL2072s, still the 72-byte bridge).
      #
      # The +10, by provenance:
      #   +1  Renderer.Tests/StyleAttributePartitionTests — `src` IS A PROP, NOT A STYLE
      #       (6.3 non-negotiable #1). The one name a 6.3 implementer is most likely to
      #       add to the partition by reflex: it arrives on an element and it looks
      #       declarative. But after 6.1 that list is a ROUTING TABLE with exactly two
      #       destinations — the Yoga node (layout) or the View/UIView (paint) — and a
      #       URL is NEITHER, so a shell would have to grow a third arm inside a two-arm
      #       contract, in two hand-written parsers. Pinned out of both halves, and
      #       pinned onto the prop wire.
      #   +4  BnComponentTests — BnImage's surface: the `image` NodeType + `src` on the
      #       UpdateProp wire (the assertion is on the patch KIND — a `src` that drifted
      #       onto the style wire would still carry the right URL, so a value-only test
      #       would not see it); the un-styled invariant on the new element; and the
      #       6.1 DECLARATION/FORWARDING pair, both of which are needed. The reflective
      #       one pins the surface (BnScroll's, minus ChildContent — an image is a LEAF —
      #       plus Src, and NOT Placeholder/OnError/ContentMode: design decision 3, each
      #       changes MEASUREMENT); the BEHAVIOURAL one is what BITES (6.1's Gate 1
      #       review proved a reflective test does not: two deleted forwarding lines left
      #       the suite green).
      #   +4  BnImageDemoTests — the "/image" patch golden Gates 2/3 derive their frame
      #       expectations from: the three cases (fixed 200x120 -> never measured;
      #       intrinsic -> 0x0 then the natural size; a 404 -> 0x0 forever), each with a
      #       20dp band beneath it whose y is the ONLY honest witness of a reflow. Plus
      #       the contract's arithmetic (120 + 20 = 140 -> sections at 140/160/180), the
      #       Align=FlexStart pin (a column's cross axis is WIDTH and Yoga's default is
      #       STRETCH — under the default the intrinsic image would be stretched to 300
      #       and its measured width would never be seen), and the route/back-nav pin.
      #       Its counts pin the delta: 13 creates, 23 styles, and EXACTLY 3 props, all
      #       of them `src`.
      #   +1  BnScrollDemoTests — TheImageCannotMoveTheFrameTable. 6.3 non-negotiable #2
      #       as an ASSERTION rather than a promise: the row's height is DEFINITE (a
      #       child cannot grow it) and the image's size is DEFINITE (Yoga never calls
      #       its measure func, so the bytes — or a failure — cannot move a frame even in
      #       principle). Two independent reasons, either one sufficient.
      #       GATE 1 REVIEW: it asserts the second reason ON THE WIRE now, not on two
      #       compile-time constants. It used to check `RowImageWidthDp > 0 &&
      #       RowImageHeightDp > 0` and CLAIM to be the guard that reddens if the image
      #       goes intrinsic. It was not one: delete the `Width` parameter from
      #       BnScrollDemo.BuildRowImage and the image is intrinsic ON THE WIRE while the
      #       constant still reads 40 — the test stayed green. It now mounts, resolves the
      #       image node and pins its style table as EXACTLY {width:40, height:40}
      #       (present => definite => Yoga never measures it), and the mutation reddens it:
      #         expected: {height=40, width=40}   actual: {height=40}
      #
      # …and +2 MORE from the Gate 1 review, both closing a silence rather than adding a
      # number (Runtime.Tests 181 -> 183):
      #   +1  BnComponentTests/BnImage_SrcGoesNull_EmitsUpdatePropNullOnThePropWire —
      #       `Src` -> null IS a wire event and the renderer EMITS IT TODAY (a
      #       RemoveAttribute on a non-style name -> UpdateProp(nodeId, "src", null), the
      #       BnButton.Enabled precedent). It had no spec and no test, so two shells would
      #       have guessed at it differently — or NPE'd on a null value. The honest
      #       answer is a SECOND REFLOW DIRECTION the parity contract never mentioned:
      #       cancel, CLEAR the image, markDirty, re-solve -> the node collapses to 0x0
      #       and its siblings move back UP. Now normative in the design's contract table
      #       and in BnImage.cs's header; the SHELL half is a Gate 2/3 mapper test (no
      #       demo page flips a Src at run time, and adding one would rewrite this phase's
      #       frame tables — said out loud rather than left to be inferred).
      #   +1  NavigationTests/EveryRoute_ResolvesToAComponentTheMountRegistryKnows — there
      #       are now FIVE demo pages and TWO hand-maintained registries
      #       (NativeNavigationManager.s_routes and HostSession's mount registry) with
      #       nothing asserting they agree. A route whose component name is a typo is
      #       accepted by NavigateToAsync (the ROUTE exists), reaches SwapRoot, and throws
      #       there — a runtime crash on a device, inside a click handler, for a mistake a
      #       set test catches at build time. Routes ⊆ registry (the registry legitimately
      #       holds UNROUTED probe entries), plus the five routed names by name.
      #
      # THE 6.2 FRAME TABLE DID NOT MOVE, and that is the assertion that matters most.
      # BnScrollDemo gains ONE image inside an existing 80dp row, at a fixed 40x40: its
      # golden's COUNTS move by exactly that one node (19 -> 20 creates, 33 -> 35 styles,
      # and the page gains its first UpdateProp), but every FRAME is unchanged — the same
      # ten rows at y = 80*i, the same 800dp content node, the same 600 scroll range.
      # TheContentSizeIsTheContractsArithmetic is untouched and still green. BnDemo,
      # BnSettingsPage and BnLayoutDemo keep their goldens byte-for-byte. The JVM baseline
      # below stays 79 (nothing Kotlin-side moves until Gate 2).
      #
      # 316 -> 318 (Phase 6.3 Gate 2 REVIEW, +2): THE SPEC BLOCKER — the parity rule Gate 2
      # INVENTED lived only in a Kotlin comment. Both are Runtime.Tests/BnImageDemoTests
      # (183 -> 185); Renderer.Tests (110) and Analyzers.Tests (23) do not move.
      #
      # The contract said only "the image's natural pixel size in dp/pt", which is exactly
      # the ambiguity Gate 2 had to resolve — and it resolved it (ONE FILE PIXEL IS ONE
      # dp/pt: read the decoded bitmap's own pixel count, never the density-scaled
      # intrinsicWidth) without amending the sentence. Meanwhile `Wi x Hi` was declared
      # "SYMBOLIC and Gate-supplied", so Gate 3 could pick a DIFFERENT fixture, reach for
      # KINGFISHER'S OWN DOCUMENTED IDIOM for crisp images (.scaleFactor(UIScreen.main
      # .scale)) — which divides the reported size by the screen scale, 160/3 ~ 53.3pt
      # against Android's 160dp — and be ENTIRELY GREEN. Each shell stays internally
      # consistent; only the two frame tables side by side disagree, and NO SINGLE-DEVICE
      # TEST IN EITHER SUITE CAN SEE IT. Verification bar #1 ("the same frames on both
      # devices") was enforced by nobody.
      #
      # So the rule is now a NORMATIVE ROW of the parity contract with both platform
      # corollaries spelled out (Android: bitmap.width, never intrinsicWidth; iOS: rely on
      # UIImage(data:).scale == 1, and do NOT set Kingfisher's scaleFactor or any
      # downsampling processor), it is in BnImageDemo.cs's header, and the fixture's pixel
      # size is `internal const` in BnImageDemo.cs so BOTH SHELLS ASSERT THE SAME NUMBERS:
      #   +1 TheFixtureContract_IsAFactOfTheConstants_NotOfACheckedInPng — 0 < Wi <= 300,
      #      Hi > 0, and the FIXED fixture is neither (200,120) (its declared size — else
      #      "it measures 200x120" is a coincidence, not a proof that a declared size
      #      short-circuits measurement) nor (40,40) (BnScrollDemo's row image).
      #   +1 TheAndroidFixtureServer_ServesExactlyBnImageDemosNaturalPixelSizes — THE DRIFT
      #      PIN. A device-side test cannot read a .cs file, so ImageFixtureServer.kt
      #      transcribes the four integers; this parses them back out and asserts equality.
      #      It lives here for the reason ShellStyleTableDriftTests does: build-test is the
      #      ONE required lane where the shells' sources are checkout-visible. GATE 3 ADDS
      #      THE iOS TWIN alongside it. (Each shell ALSO asserts against its DECODED
      #      bitmap — that, and only that, is what pins "no downsampling"; a shell
      #      asserting its own transcription asserts nothing.)
      #
      # The JVM baseline below moves too (79 -> 83) and the instrumented lane 107 -> 109 —
      # see their own provenance blocks.
      #
      # 318 -> 319 (Phase 6.3 Gate 3, +1): THE OTHER HALF OF THE DRIFT PIN. Gate 2's block
      # above says "GATE 3 ADDS THE iOS TWIN alongside it", and this is it:
      #   +1 BnImageDemoTests.TheIosFixtureServer_ServesExactlyBnImageDemosNaturalPixelSizes
      #      (Runtime.Tests 185 -> 186) — the same four integers parsed out of
      #      src/BlazorNative.Apple/BnHostTests/BnImageFixtureServer.swift and asserted equal
      #      to BnImageDemo.cs's constants. Only the PAIRING of the two pins makes the three
      #      transcriptions one number, and nothing else in the repo enforces verification
      #      bar #1 ("the same frames on both devices"): each shell asserts its OWN fixture's
      #      decoded size, so each stays green while the two measure different images. It also
      #      catches the iOS-specific trap the Android pin cannot see — a Swift fixture emitted
      #      at the SCREEN's scale (UIGraphicsImageRendererFormat.scale defaults to it) is a
      #      480x270 file for a 160x90 request, and the iOS suite would assert 480 against its
      #      own decoded bytes and be entirely green, at three times Android's number.
      # Renderer.Tests (110) and Analyzers.Tests (23) do not move. The iOS XCTest baseline
      # moves 50 -> 70 (ios.yml has its own provenance block); Android is untouched.
      #
      # 319 -> 324 (M6 FINAL AUDIT, finding F2, +5): THE LAST HAND-TRANSCRIBED CROSS-SHELL
      # CONTRACT GETS PINNED. All five are Renderer.Tests/ShellFrameTableDriftTests
      # (110 -> 115); Runtime.Tests (186) and Analyzers.Tests (23) do not move, and NO DEMO'S
      # FRAMES CHANGE — the device baselines stay 111 / 72.
      #
      # The audit's verdict on DoD #2 was PASS with a gap: the two shells' frame tables agree,
      # number for number, **by careful transcription and by nothing else**. There was no shared
      # constant, no generated table, no cross-suite diff — and "identical frames on both
      # platforms" is M6's whole architectural claim (DoD #2, #4 and #5 are all that one
      # sentence). One shell's `90` becoming `100` while the other's stayed would have left BOTH
      # device suites green, BOTH platforms internally consistent, and the claim quietly false.
      # It was the one contract of this shape the repo had NOT pinned — the style routing tables,
      # the fixture pixel sizes, the 72-byte bridge struct and the Yoga version all are.
      #
      # The literals could not be parsed where they lay (two of the three pages built their
      # frames from EXPRESSIONS over per-class constants — `ROW_H * i` vs `rowH * CGFloat(i)`,
      # `hi + BAND_H` vs `hi + bandH` — and there was no key pairing a Kotlin assertion with its
      # Swift twin but CALL ORDER). A regex over that is a drift test nobody would trust, and a
      # parse target that is not the assertion can drift away from the assertion — the very bug,
      # reintroduced by its own fix. So each shell now DECLARES its tables once, machine-readably
      # (BnDemoFrameTables.kt / BnDemoFrameTables.swift), and THE DEVICE TESTS CONSUME THAT
      # DECLARATION. There is nowhere left to write a frame number the drift test cannot see.
      #   +1 TheFrameTables_AreExactlyTheExpectedFive_OnBothShells — a page whose table exists on
      #      ONE shell is a page whose frames nothing compares.
      #   +1 EachFrameTable_NamesTheSameNodes_OnBothShells — a node one shell pins and the other
      #      does not is a frame asserted on one platform.
      #   +1 EachFrameTable_IsIdenticalNumberForNumber_OnBothShells — THE PIN. `wi`/`hi` (the
      #      fixture's natural pixel size, which NEITHER shell may write down) are compared as
      #      SYMBOLS, so it proves both shells say `hi + 20` without learning what `hi` is; sums
      #      compare by VALUE, so `160 + hi` == `hi + 160` and there is no spurious red to teach
      #      anyone to ignore it. MUTATION-VERIFIED: Kotlin's wrap-3 width 90 -> 100 with iOS
      #      untouched reddens by name (`Kotlin: (0, 40, 100, 40) / Swift: (0, 40, 90, 40)`), as
      #      does replacing the `hi` symbol with a literal on one shell alone.
      #   +1 EachFrameTable_HasItsPinnedRowCount_OnBothShells — baselines are asserted, not
      #      observed: this is what stops a red drift test from being "fixed" by deleting the row
      #      that reddened it FROM BOTH SHELLS.
      #   +1 EveryFrameTable_IsConsumedByADeviceTest_OnBothShells — a DECLARED table that no
      #      device test READS is a contract nothing asserts, and it passes all four tests above.
      #      The AGP 9 incident in miniature: an assertion can be green and STRUCTURALLY
      #      UNREACHABLE, which is the lesson this whole audit-fix is built around.
      - name: .NET tests (assert 324 passed / 0 skipped)
        run: |
          $log = Join-Path $env:RUNNER_TEMP "dotnet-test.log"
          dotnet test BlazorNative.sln -c Release --no-build --nologo -v minimal 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "dotnet test failed (exit $LASTEXITCODE)" }
          # -AllMatches + iterating every match, not just $_.Matches[0]: `dotnet test`
          # runs projects in parallel and their summary lines can land on ONE physical
          # line with no separator ("...Duration: 319 msPassed! - Failed: 0, Passed: 147,
          # ..."). Select-String returns only the FIRST match per line by default, so a
          # concatenated line silently dropped a whole project's counts and tripped this
          # baseline guard on unrelated PRs.
          $summaries = @(Select-String -Path $log -Pattern 'Failed:\s*(\d+),\s*Passed:\s*(\d+),\s*Skipped:\s*(\d+),\s*Total:\s*(\d+)' -AllMatches)
          $results = @($summaries | ForEach-Object { $_.Matches })
          if ($results.Count -eq 0) { throw "Could not parse any test-project summary lines — output format drift?" }
          $failed  = ($results | ForEach-Object { [int]$_.Groups[1].Value } | Measure-Object -Sum).Sum
          $passed  = ($results | ForEach-Object { [int]$_.Groups[2].Value } | Measure-Object -Sum).Sum
          $skipped = ($results | ForEach-Object { [int]$_.Groups[3].Value } | Measure-Object -Sum).Sum
          Write-Host "dotnet test totals across $($results.Count) projects: passed=$passed skipped=$skipped failed=$failed"
          if ($failed -ne 0 -or $passed -ne 324 -or $skipped -ne 0) {
            throw ".NET test baseline drift: expected 324 passed / 0 skipped / 0 failed, got $passed passed / $skipped skipped / $failed failed. Baseline changes must be deliberate — update ci.yml alongside the change."
          }

      # ── NativeAOT publishes + nine-export verification ────────────────────
      - name: Publish win-x64 (assert exactly 4 IL2072 warnings)
        run: |
          $log = Join-Path $env:RUNNER_TEMP "publish-win-x64.log"
          dotnet publish src/BlazorNative.Runtime -c Release -r win-x64 -tl:off -nologo 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "win-x64 publish failed (exit $LASTEXITCODE)" }
          $il2072 = @(Select-String -Path $log -Pattern 'warning IL2072')
          Write-Host "IL2072 count: $($il2072.Count)"
          if ($il2072.Count -ne 4) {
            $il2072 | ForEach-Object { Write-Host $_.Line }
            throw "win-x64 publish IL2072 drift: expected exactly 4 accepted trim warnings, got $($il2072.Count)"
          }

      - name: Verify win-x64 exports (dumpbin via vswhere)
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found at $vswhere" }
          $dumpbin = & $vswhere -latest -products * -find "**\Hostx64\x64\dumpbin.exe" | Select-Object -First 1
          if (-not $dumpbin) { throw "dumpbin.exe not found via vswhere" }
          $dll = "src\BlazorNative.Runtime\bin\Release\net10.0\win-x64\publish\BlazorNative.Runtime.dll"
          $out = & $dumpbin /exports $dll
          $expected = @(
            'blazornative_dispatch_event', 'blazornative_fetch_complete',
            'blazornative_host_event', 'blazornative_init', 'blazornative_mount',
            'blazornative_register_bridge', 'blazornative_register_frame_callback',
            'blazornative_shutdown', 'blazornative_version'
          )
          $actual = @($out | Select-String -Pattern '\bblazornative_\w+' | ForEach-Object { $_.Matches.Value } | Sort-Object -Unique)
          Write-Host "Exports found ($($actual.Count)): $($actual -join ', ')"
          $diff = Compare-Object $expected $actual
          if ($diff) {
            $diff | Format-Table | Out-String | Write-Host
            throw "win-x64 export surface drift: expected exactly the 9 blazornative_* exports"
          }

      - name: Publish linux-bionic-x64 (assert exactly 4 IL2072 warnings)
        run: |
          $log = Join-Path $env:RUNNER_TEMP "publish-bionic-x64.log"
          dotnet publish src/BlazorNative.Runtime -c Release -r linux-bionic-x64 -tl:off -nologo 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "linux-bionic-x64 publish failed (exit $LASTEXITCODE)" }
          $il2072 = @(Select-String -Path $log -Pattern 'warning IL2072')
          Write-Host "IL2072 count: $($il2072.Count)"
          if ($il2072.Count -ne 4) {
            $il2072 | ForEach-Object { Write-Host $_.Line }
            throw "linux-bionic-x64 publish IL2072 drift: expected exactly 4 accepted trim warnings, got $($il2072.Count)"
          }

      - name: Verify linux-bionic-x64 exports (llvm-readelf from pinned NDK)
        run: |
          $readelf = "$env:ANDROID_NDK_ROOT\toolchains\llvm\prebuilt\windows-x86_64\bin\llvm-readelf.exe"
          if (-not (Test-Path $readelf)) { throw "llvm-readelf.exe not found at $readelf" }
          $so = "src\BlazorNative.Runtime\bin\Release\net10.0\linux-bionic-x64\publish\BlazorNative.Runtime.so"
          $out = & $readelf --dyn-syms $so
          $expected = @(
            'blazornative_dispatch_event', 'blazornative_fetch_complete',
            'blazornative_host_event', 'blazornative_init', 'blazornative_mount',
            'blazornative_register_bridge', 'blazornative_register_frame_callback',
            'blazornative_shutdown', 'blazornative_version'
          )
          $actual = @($out | Select-String -Pattern '\bblazornative_\w+' | ForEach-Object { $_.Matches.Value } | Sort-Object -Unique)
          Write-Host "Dynamic symbols found ($($actual.Count)): $($actual -join ', ')"
          $diff = Compare-Object $expected $actual
          if ($diff) {
            $diff | Format-Table | Out-String | Write-Host
            throw "linux-bionic-x64 export surface drift: expected exactly the 9 blazornative_* exports"
          }

      - name: Publish linux-bionic-arm64 (assert exactly 4 IL2072 warnings)
        run: |
          $log = Join-Path $env:RUNNER_TEMP "publish-bionic-arm64.log"
          dotnet publish src/BlazorNative.Runtime -c Release -r linux-bionic-arm64 -tl:off -nologo 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "linux-bionic-arm64 publish failed (exit $LASTEXITCODE)" }
          $il2072 = @(Select-String -Path $log -Pattern 'warning IL2072')
          Write-Host "IL2072 count: $($il2072.Count)"
          if ($il2072.Count -ne 4) {
            $il2072 | ForEach-Object { Write-Host $_.Line }
            throw "linux-bionic-arm64 publish IL2072 drift: expected exactly 4 accepted trim warnings, got $($il2072.Count)"
          }

      - name: Verify linux-bionic-arm64 exports (llvm-readelf from pinned NDK)
        run: |
          $readelf = "$env:ANDROID_NDK_ROOT\toolchains\llvm\prebuilt\windows-x86_64\bin\llvm-readelf.exe"
          if (-not (Test-Path $readelf)) { throw "llvm-readelf.exe not found at $readelf" }
          $so = "src\BlazorNative.Runtime\bin\Release\net10.0\linux-bionic-arm64\publish\BlazorNative.Runtime.so"
          $out = & $readelf --dyn-syms $so
          $expected = @(
            'blazornative_dispatch_event', 'blazornative_fetch_complete',
            'blazornative_host_event', 'blazornative_init', 'blazornative_mount',
            'blazornative_register_bridge', 'blazornative_register_frame_callback',
            'blazornative_shutdown', 'blazornative_version'
          )
          $actual = @($out | Select-String -Pattern '\bblazornative_\w+' | ForEach-Object { $_.Matches.Value } | Sort-Object -Unique)
          Write-Host "Dynamic symbols found ($($actual.Count)): $($actual -join ', ')"
          $diff = Compare-Object $expected $actual
          if ($diff) {
            $diff | Format-Table | Out-String | Write-Host
            throw "linux-bionic-arm64 export surface drift: expected exactly the 9 blazornative_* exports"
          }

      # ── JVM tests against the fresh win-x64 publish ────────────────────────
      # testDebugUnitTest → preBuild → copyRuntimeSo → verifyNativeAssets needs
      # BOTH bionic .so publish outputs, hence this step runs after them; the
      # unit tests themselves load the win-x64 dll via jna.library.path.
      # ── Phase 6.3 Gate 2 REVIEW: the JVM baseline moves for the first time since
      #    6.1 (79 → 83, +4) — and WHERE it moves is the finding.
      #
      # ImageRequestGuardTest ×4. The shell's stale-completion guard asks TWO questions
      # (has this node's `src` been written since the request was issued? is the view the
      # callback captured still the view that node id names?) and its KDoc called the
      # second one "not belt-and-braces theatre" — while NOTHING checked it. Deleting the
      # identity half left the instrumented suite fully green at 107, because the case it
      # exists for CANNOT BE STAGED ON A DEVICE by any demo page: it needs a node id to be
      # REUSED after a reset (/image → back → /image), so that a stale callback carrying
      # generation 1 meets a BRAND-NEW node that is also on generation 1 — the generations
      # MATCH, and only the view's identity separates them. Every demo mounts once.
      #
      # So the decision was extracted into a pure `internal fun isLiveImageRequest(...)`
      # (its own file, no Android types in the signature) and pinned HERE, off the device,
      # where the four states can simply be written down: same-generation+same-view (live);
      # superseded generation; purged node; and THE RESET COLLISION. The last one is also
      # the reasoning WidgetMapper.clearIfMine depends on (Gate 2 review, C1) — a
      # generation-only eviction lets the stale callback drop the LIVE request's
      # Disposable, leaving a request nothing can cancel, whose completion on iOS runs
      # against a FREED YGNodeRef. MUTATION: revert the guard to a generation-only check
      # and exactly the reset-collision test reddens.
      - name: JVM tests (Gradle testDebugUnitTest — assert 83 passed / 0 failed)
        working-directory: src/BlazorNative.Jni
        run: |
          .\gradlew.bat --no-daemon testDebugUnitTest
          if ($LASTEXITCODE -ne 0) { throw "gradlew testDebugUnitTest failed (exit $LASTEXITCODE)" }
          $xmls = @(Get-ChildItem build\test-results\testDebugUnitTest\*.xml -ErrorAction SilentlyContinue)
          if ($xmls.Count -eq 0) { throw "No JUnit XML results found under build\test-results\testDebugUnitTest" }
          $tests = 0; $failures = 0; $errors = 0; $skipped = 0
          foreach ($x in $xmls) {
            $suite = ([xml](Get-Content $x -Raw)).testsuite
            $tests += [int]$suite.tests; $failures += [int]$suite.failures
            $errors += [int]$suite.errors; $skipped += [int]$suite.skipped
          }
          Write-Host "JVM test totals across $($xmls.Count) suites: tests=$tests failures=$failures errors=$errors skipped=$skipped"
          if ($tests -ne 83 -or $failures -ne 0 -or $errors -ne 0 -or $skipped -ne 0) {
            throw "JVM test baseline drift: expected 83 passed / 0 failed / 0 skipped, got tests=$tests failures=$failures errors=$errors skipped=$skipped"
          }

      # ── The instrumented sources must COMPILE in the required lane ─────────
      # They need a device to RUN, but not to COMPILE — and the compile is where
      # a whole source set can silently vanish. The AGP 9 migration stopped feeding
      # `java.srcDirs` to the Kotlin compiler, so `src/androidMain/kotlin` (the ENTIRE
      # Android shell: MainActivity, WidgetMapper, YogaLayout) went uncompiled. The app
      # still "built" (nothing references MainActivity at compile time — only the
      # manifest names it) and the JVM tests still passed (they touch src/main/kotlin
      # only), so the ONLY lane that could see it was android-instrumented — which is
      # dispatch/nightly and does NOT gate PRs. It landed on main green and sat there.
      # Compiling androidTest here costs ~40s and closes that hole permanently.
      - name: Compile the instrumented sources (no device — the source sets must resolve)
        working-directory: src/BlazorNative.Jni
        run: |
          .\gradlew.bat --no-daemon compileDebugAndroidTestKotlin
          if ($LASTEXITCODE -ne 0) { throw "compileDebugAndroidTestKotlin failed (exit $LASTEXITCODE) — the instrumented sources do not compile. A device is needed to RUN them, not to COMPILE them; this gate exists because android-instrumented does not gate PRs." }

      # ── Consumer smoke (Phase 4.5 Gate 2 — the M4 DoD #7 proof) ────────────
      # Packs the five packages, restores samples/ConsumerSmoke from the local
      # feed only (+nuget.org transitives) into a clean temp cache, asserts
      # the analyzers package is live (BN0011 trip build + zero-BN clean
      # build), then mounts a Bn* component and asserts the patch set.
      - name: Consumer smoke (packages-only mount + analyzer trip)
        run: |
          .\scripts\consumer-smoke.ps1
          if ($LASTEXITCODE -ne 0) { throw "consumer-smoke.ps1 failed (exit $LASTEXITCODE)" }

      # ── Artifacts (consumed by the Gate 3 instrumented workflow) ───────────
      - name: Stage jniLibs layout (x86_64 from bionic-x64)
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "jniLibs-staging\x86_64"
          New-Item -ItemType Directory -Force $dest | Out-Null
          Copy-Item "src\BlazorNative.Runtime\bin\Release\net10.0\linux-bionic-x64\publish\BlazorNative.Runtime.so" (Join-Path $dest "libBlazorNative.Runtime.so")

      - name: Upload artifact — win-x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: BlazorNative.Runtime-win-x64
          path: src/BlazorNative.Runtime/bin/Release/net10.0/win-x64/publish/BlazorNative.Runtime.dll
          if-no-files-found: error

      - name: Upload artifact — linux-bionic-x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: BlazorNative.Runtime-linux-bionic-x64
          path: src/BlazorNative.Runtime/bin/Release/net10.0/linux-bionic-x64/publish/BlazorNative.Runtime.so
          if-no-files-found: error

      - name: Upload artifact — linux-bionic-arm64 binary
        uses: actions/upload-artifact@v7
        with:
          name: BlazorNative.Runtime-linux-bionic-arm64
          path: src/BlazorNative.Runtime/bin/Release/net10.0/linux-bionic-arm64/publish/BlazorNative.Runtime.so
          if-no-files-found: error

      - name: Upload artifact — jniLibs staging layout
        uses: actions/upload-artifact@v7
        with:
          name: jniLibs-staging
          path: ${{ runner.temp }}/jniLibs-staging
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # ios-build — THE iOS SHELL MUST COMPILE, AND A REQUIRED CHECK MUST SAY SO.
  #
  # ── WHY THIS JOB EXISTS ────────────────────────────────────────────────────
  # The AGP 9 migration proved that an assertion can be green and STRUCTURALLY
  # UNREACHABLE. `android-instrumented` asserted 111 passing tests while
  # `src/androidMain/kotlin` — MainActivity, WidgetMapper, YogaLayout, the ENTIRE
  # Android shell — was not being compiled at all, because that lane is
  # nightly/dispatch and does not gate PRs. It landed on `main` green and sat
  # there. PR #81 closed it by compiling the instrumented sources in build-test
  # (see "Compile the instrumented sources" above).
  #
  # **The iOS shell was in the same hole, and structurally deeper** (M6 final
  # audit, finding F1):
  #   · `build-test` runs on windows-latest. It contains no Apple toolchain, so
  #     NO REQUIRED CHECK COMPILED A SINGLE LINE OF SWIFT OR OBJECTIVE-C++.
  #   · `ios.yml` — the shell's only compilation — is advisory, and (until this
  #     change) had no `push` trigger and a `paths:` filter, so a PR touching only
  #     `tests/**` or `scripts/**` did not even RUN it.
  #   · Demonstrated live during the audit: Renovate merged PR #82 — Kingfisher
  #     **v8**, a MAJOR bump of the iOS image library Phase 6.3 depends on — and
  #     nothing REQUIRED the iOS lane to pass. It happened to touch an Apple path,
  #     so the lane ran and was green. Nothing made that so.
  #
  # ── WHY IT STOPS AT `build-for-testing`, AND WHY THAT IS NOT TIMIDITY ──────
  # A device is needed to RUN the tests, not to COMPILE them — the same sentence
  # `compileDebugAndroidTestKotlin` is justified by. `xcodebuild build-for-testing`
  # compiles every Swift and Objective-C++ file in BOTH targets and LINKS the app
  # AND the XCTest bundle (so a missing `blazornative_*` export, a broken Yoga
  # C-ABI signature, or a Kingfisher API that vanished in a major bump all fail
  # HERE) — without booting a simulator and without running a test.
  #
  # Simulator EXECUTION stays in `ios.yml` and stays ADVISORY, on purpose: it has
  # real flake modes (sim boot, test-host launch) that a required check must not
  # import. Compiling has none of them. This job is the honest intersection: the
  # part that cannot flake, made required.
  # ═══════════════════════════════════════════════════════════════════════════
  ios-build:
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET SDK (global.json — 10.0.3xx band)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # macos-latest drifts (Xcode, SDK, clang). Record it — assert nothing — so a
      # link failure that is really an image bump is diagnosable from one run.
      #
      # The Xcode build number is ALSO an output, because it is half of the Yoga
      # cache key: a new Xcode is a new clang, and a libyoga.a compiled under the old
      # one must not be silently reused. (`${{ env.ImageOS }}` cannot do this job —
      # the `env` context holds only workflow-declared variables, so a runner-set
      # variable evaluates to the empty string and the key degrades to a constant.)
      - name: Record toolchain (dotnet + Xcode + clang + sim SDK)
        id: toolchain
        run: |
          set -euo pipefail
          mkdir -p ios-build-out
          {
            echo "=== dotnet ==="; dotnet --version
            echo "=== runner ==="; uname -a; sw_vers || true
            echo "=== Xcode ==="; xcode-select -p; xcodebuild -version || true
            echo "=== sim SDK ==="; xcrun --sdk iphonesimulator --show-sdk-version || true
            echo "=== clang ==="; xcrun -sdk iphonesimulator clang --version || true
          } 2>&1 | tee ios-build-out/toolchain.txt
          xcode=$(xcodebuild -version | tr '\n' '-' | tr -cd '[:alnum:].-')
          [ -n "$xcode" ] || { echo "could not read the Xcode version" >&2; exit 1; }
          echo "xcode=$xcode" >> "$GITHUB_OUTPUT"
          echo "Xcode fingerprint (Yoga cache key): $xcode"

      # ── Caches ──────────────────────────────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Yoga is ~60 C++20 translation units compiled one at a time — the single
      # slowest step in the lane and a pure function of (version, toolchain). Keyed
      # on the pinned version AND the Xcode build, because a new Xcode is a new clang
      # and the .a it produced under the old one must not be reused silently. No
      # `restore-keys`: a partial-match restore is exactly the silent reuse this key
      # exists to prevent.
      - name: Cache libyoga.a (v${{ env.YOGA_VERSION }})
        id: yoga-cache
        uses: actions/cache@v6
        with:
          path: |
            src/BlazorNative.Apple/vendor/libyoga.a
            src/BlazorNative.Apple/vendor/yoga-include
          key: yoga-${{ runner.os }}-${{ steps.toolchain.outputs.xcode }}-${{ env.YOGA_VERSION }}

      - name: Cache SwiftPM (Kingfisher)
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/SPM
          key: spm-${{ runner.os }}-${{ hashFiles('src/BlazorNative.Apple/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # ── Publish the static NativeAOT archive ────────────────────────────────
      - name: Publish iossimulator-arm64 (NativeLib=Static; assert exactly 4 IL2072)
        run: |
          set -o pipefail
          # PublishAot is NOT passed on the CLI (the Phase 5.2 rule): it lives in the
          # Runtime csproj's own PropertyGroup, local and non-propagating. A CLI
          # -p:PublishAot becomes a GLOBAL property and propagates to the P2P refs
          # (Core/Renderer/Http/Components), which lack the runtime-pack bypass →
          # NETSDK1203. Same invocation as ios.yml's and as ci.yml's three publishes.
          dotnet publish src/BlazorNative.Runtime -c Release -r iossimulator-arm64 \
            -tl:off -nologo 2>&1 | tee ios-build-out/publish.log
          il2072=$(grep -c 'warning IL2072' ios-build-out/publish.log || true)
          echo "IL2072 count: $il2072"
          if [ "$il2072" -ne 4 ]; then
            grep 'warning IL2072' ios-build-out/publish.log || true
            echo "iossimulator-arm64 publish IL2072 drift: expected exactly 4, got $il2072" >&2
            exit 1
          fi

      # ── Assemble the STATIC-EMBED link inputs (the 5.2 recipe) ──────────────
      # No `nm` export assertion here: ios.yml owns that, and this job LINKS the app,
      # which is a strictly stronger statement — a missing blazornative_* export is an
      # undefined symbol at the -force_load below, and the job goes red naming it.
      - name: Stage the link inputs (runtime .a + bootstrapperdll.o + support archive)
        run: |
          set -euo pipefail
          tree_root="src/BlazorNative.Runtime/bin/Release/net10.0/iossimulator-arm64"
          archive="$tree_root/publish/BlazorNative.Runtime.a"
          [ -f "$archive" ] || archive="$tree_root/native/BlazorNative.Runtime.a"
          if [ ! -f "$archive" ]; then
            echo "No BlazorNative.Runtime.a under $tree_root (publish/ or native/)" >&2
            find src/BlazorNative.Runtime/bin -type f -name '*.a' 2>/dev/null | sort >&2 || true
            exit 1
          fi
          mkdir -p src/BlazorNative.Apple/vendor
          cp "$archive" src/BlazorNative.Apple/vendor/libBlazorNative.Runtime.a

          pack_native=$(find "$HOME/.nuget/packages/microsoft.netcore.app.runtime.nativeaot.iossimulator-arm64" \
            -type d -path '*runtimes/iossimulator-arm64/native' 2>/dev/null | sort | tail -1)
          if [ -z "$pack_native" ] || [ ! -d "$pack_native" ]; then
            echo "NativeAOT iossimulator runtime pack native dir not found" >&2; exit 1
          fi
          # libbootstrapperdll.o is DIRECT-linked (not merged): its
          # __attribute__((constructor)) must land in the app's init_array. As an
          # archive member it would be on-demand and never pulled → RuntimeInstance
          # stays NULL. This is the 5.2 load-bearing fix; do not "tidy" it into the
          # merge below.
          if [ ! -f "$pack_native/libbootstrapperdll.o" ]; then
            echo "libbootstrapperdll.o missing under $pack_native" >&2; exit 1
          fi
          cp "$pack_native/libbootstrapperdll.o" src/BlazorNative.Apple/vendor/bootstrapperdll.o

          # …and the rest, merged into ONE on-demand support archive, minus the
          # non-default GC/eventpipe variants (the app is ILC-compiled for
          # WorkstationGC with eventpipe/standalonegc DISABLED; the -enabled members
          # define the same symbols and would be ambiguously pulled).
          support=()
          for f in "$pack_native"/*.a; do
            case "$(basename "$f")" in
              libRuntime.ServerGC.a|libeventpipe-enabled.a|libstandalonegc-enabled.a) continue;;
            esac
            support+=("$f")
          done
          if [ "${#support[@]}" -eq 0 ]; then echo "No support .a under $pack_native" >&2; exit 1; fi
          xcrun libtool -static -o src/BlazorNative.Apple/vendor/libBnRuntimeSupport.a "${support[@]}"
          ls -la src/BlazorNative.Apple/vendor | tee ios-build-out/vendor.txt

      # ── Yoga from source (cache miss only) ──────────────────────────────────
      # The same recipe as ios.yml's, at the same pinned version — and the pin is
      # asserted equal to ios.yml's and to build.gradle.kts's in build-test's first
      # step, so the required compile lane and the advisory behaviour lane can never
      # be talking about different engines.
      - name: "Yoga: build libyoga.a (v${{ env.YOGA_VERSION }}) for iossimulator-arm64"
        if: steps.yoga-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/facebook/yoga/archive/refs/tags/v${YOGA_VERSION}.tar.gz" -o yoga-src.tgz
          tar xzf yoga-src.tgz
          yroot="yoga-${YOGA_VERSION}"
          [ -f "$yroot/yoga/Yoga.h" ] || { echo "Yoga.h not found under $yroot/yoga" >&2; exit 1; }
          sdk=$(xcrun --sdk iphonesimulator --show-sdk-path)
          mkdir -p yoga-obj src/BlazorNative.Apple/vendor
          count=0
          while IFS= read -r cpp; do
            obj="yoga-obj/$(echo "$cpp" | tr '/.' '__').o"
            xcrun -sdk iphonesimulator clang++ -arch arm64 -isysroot "$sdk" \
              -mios-simulator-version-min=13.0 -std=c++20 -O2 -fPIC \
              -I"$yroot" -c "$cpp" -o "$obj"
            count=$((count+1))
          done < <(find "$yroot/yoga" -name '*.cpp' | sort)
          echo "Compiled $count Yoga translation units"
          [ "$count" -gt 0 ] || { echo "no Yoga .cpp compiled" >&2; exit 1; }
          xcrun libtool -static -o src/BlazorNative.Apple/vendor/libyoga.a yoga-obj/*.o
          mkdir -p src/BlazorNative.Apple/vendor/yoga-include
          cp -R "$yroot/yoga" src/BlazorNative.Apple/vendor/yoga-include/yoga
          # Drop Yoga's bundled module.modulemap — with it present Clang's
          # explicit-module scanner tries to build a `yoga` MODULE and cannot resolve
          # the module's own headers. Removing it forces plain TEXTUAL includes via
          # HEADER_SEARCH_PATHS (the proven path; project.yml documents it).
          rm -f src/BlazorNative.Apple/vendor/yoga-include/yoga/module.modulemap

      - name: Verify libyoga.a is present and carries the Yoga C-API (cache or build)
        run: |
          set -euo pipefail
          lib=src/BlazorNative.Apple/vendor/libyoga.a
          [ -f "$lib" ] || { echo "libyoga.a is missing — the cache restored an empty tree" >&2; exit 1; }
          [ -f src/BlazorNative.Apple/vendor/yoga-include/yoga/Yoga.h ] \
            || { echo "vendor/yoga-include/yoga/Yoga.h is missing — BnYogaLayout.mm cannot compile" >&2; exit 1; }
          # Asserted, not observed — and it matters MORE on a cache hit than on a
          # build: a truncated/empty cached archive would otherwise only surface at
          # link time, far from its cause.
          ysyms=$(nm -gU "$lib" 2>/dev/null | grep -Eo '_?YGNode[A-Za-z]+' | sed 's/^_//' | sort -u || true)
          missing=()
          for s in YGNodeNew YGNodeCalculateLayout YGNodeSetMeasureFunc; do
            echo "$ysyms" | grep -qx "$s" || missing+=("$s")
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "libyoga.a is missing Yoga C-API symbols: ${missing[*]}" >&2; exit 1
          fi
          echo "SYMBOLS: the Yoga C-API entry points are present in libyoga.a."

      # ── Generate the Xcode project ──────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate BnHost.xcodeproj
        working-directory: src/BlazorNative.Apple
        run: xcodegen generate --spec project.yml 2>&1 | tee ../../ios-build-out/xcodegen.log

      # ── THE GATE ────────────────────────────────────────────────────────────
      # `build-for-testing` compiles BnHost (Swift + the two .mm files) AND
      # BnHostTests, resolves Kingfisher through SwiftPM, and LINKS both products
      # against the NativeAOT archive, the merged support archive and libyoga.a.
      #
      # `generic/platform=iOS Simulator` resolves a destination WITHOUT booting one.
      # ARCHS=arm64 is explicit because a *generic* simulator destination would
      # otherwise build every valid slice, and the three vendored archives
      # (runtime, support, yoga) are simulator-arm64 ONLY — an x86_64 slice would
      # fail to link for a reason that has nothing to do with the code under test.
      - name: xcodebuild build-for-testing (Swift + ObjC++ compile AND link — no simulator)
        working-directory: src/BlazorNative.Apple
        run: |
          set -o pipefail
          if ! xcodebuild build-for-testing \
                 -project BnHost.xcodeproj \
                 -scheme BnHost \
                 -destination 'generic/platform=iOS Simulator' \
                 -derivedDataPath "$RUNNER_TEMP/DerivedData" \
                 -clonedSourcePackagesDirPath "$RUNNER_TEMP/SPM" \
                 ARCHS=arm64 \
                 CODE_SIGNING_ALLOWED=NO \
                 2>&1 | tee ../../ios-build-out/xcodebuild-build-for-testing.log; then
            cat <<'WHY' >&2

          ══════════════════════════════════════════════════════════════════════
          THE iOS SHELL DOES NOT COMPILE, AND THIS IS A REQUIRED CHECK.

          A device is needed to RUN the iOS tests, not to COMPILE them — which is
          the whole reason this job exists. `build-test` runs on Windows and has
          no Apple toolchain; `ios.yml` is ADVISORY and does not gate a merge. So
          without this gate the Swift/Objective-C++ shell can stop compiling
          entirely and land on `main` green.

          That is not hypothetical. The AGP 9 migration did exactly this to the
          ANDROID shell: `android-instrumented` asserted 111 passing tests while
          `src/androidMain/kotlin` was not being compiled at all, because that
          lane does not gate PRs either. It merged, and it sat there.

          Fix the compile error above. Do not weaken this gate.
          ══════════════════════════════════════════════════════════════════════
          WHY
            exit 1
          fi

      # ── Prove it LINKED, rather than trusting a zero exit code ──────────────
      - name: Assert the app AND the XCTest bundle were produced
        run: |
          set -euo pipefail
          dd="$RUNNER_TEMP/DerivedData/Build/Products"
          app=$(find "$dd" -maxdepth 2 -name 'BnHost.app' -type d | head -1)
          bundle=$(find "$dd" -maxdepth 2 -name 'BnHostTests.xctest' -type d | head -1)
          echo "app    : ${app:-<none>}"
          echo "xctest : ${bundle:-<none>}"
          if [ -z "$app" ] || [ -z "$bundle" ]; then
            find "$dd" -maxdepth 3 2>/dev/null | head -50 >&2 || true
            echo "build-for-testing exited 0 but did not produce BOTH products. The XCTest bundle is the half that matters: it is the only thing that compiles BnHostTests/*.swift — the 72 assertions that ios.yml runs — so a scheme change that quietly stopped building it would leave this gate green over an uncompiled test suite." >&2
            exit 1
          fi
          # The linked binaries must actually carry the shell's symbols.
          nm -gU "$app/BnHost" 2>/dev/null | grep -q 'blazornative_init' \
            || { echo "BnHost linked without blazornative_init — the NativeAOT archive was not force_loaded" >&2; exit 1; }
          echo "LINKED: BnHost.app + BnHostTests.xctest, with the runtime archive force-loaded."

      - name: Upload — ios-build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-out
          path: ios-build-out
          if-no-files-found: warn
