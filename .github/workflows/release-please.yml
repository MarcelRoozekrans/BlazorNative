# ─────────────────────────────────────────────────────────────────────────────
# BlazorNative RELEASE-PLEASE (Phase 8.6 — the release automation).
#
# WHAT THIS WORKFLOW DOES: it opens a pull request. That is all it does.
#
# On every push to main it recomputes the next version from the conventional
# commit subjects since the last release, writes CHANGELOG.md, updates all seven
# version literals, and opens (or updates) a release PR. Merging that PR cuts the
# tag and opens a GitHub Release — AS A DRAFT.
#
# ⚠ THE RELEASE PR ARRIVES WITH ITS CHECKS NOT STARTED, AND THAT IS A STEP IN THE
#   RITUAL, NOT A BUG. This workflow opens the PR with GITHUB_TOKEN (see the token
#   comment on the step below, which explains why it is not a PAT). When a workflow
#   using GITHUB_TOKEN creates or updates a pull request, the resulting
#   `pull_request` event creates its workflow runs in an APPROVAL-REQUIRED state:
#   GitHub shows a "Approve workflows to run" banner, and someone with write access
#   must click it before build-test / android-build / ios-build start at all.
#
#   SO THE PIN THAT AUDITS THIS MACHINE — PackageVersionPinTests
#   .TheManifest_AgreesWithTheProps, which reds if release-please bumps the
#   manifest without the props — DOES NOT RUN ON THIS WORKFLOW'S PR UNTIL THAT
#   CLICK. The click starts it; it then reds a bad machine before the merge.
#
#   IF YOU DO NOTHING, NOTHING HAPPENS: the PR sits with no checks, and a required
#   check that never ran cannot be satisfied, so branch protection will not let it
#   merge. No merge, no tag, no draft, no publish. The failure direction is SAFE
#   (design UNPROVEN row U8). The ritual is in docs/GITHUB-SETUP.md, step 3.
#
# ⚠⚠ THIS WORKFLOW HAS NO `publish` JOB, NO `needs:`, NO SECOND JOB, AND IT NEVER
#    MENTIONS THE NUGET KEY. THAT IS NOT AN OVERSIGHT. DO NOT ADD ONE.
#
#    The owner's reference implementation — AdoNet.Async — has a release-please.yml
#    that carries its own publish job:
#
#        publish:
#          needs: release-please
#          if: ${{ needs.release-please.outputs.release_created }}
#          ...
#          - name: Push to NuGet
#            run: dotnet nuget push ./nupkg/*.nupkg --api-key <the key> ...
#
#    MERGING THEIR RELEASE PR PUBLISHES SIX PACKAGES. NO CLICK. Copying that file
#    into this repo — the obvious, natural move, and the one a contributor will
#    attempt, because "mirror the reference" is how every other decision in this
#    phase was made — IMPORTS AN AUTOMATIC nuget.org PUSH AND DESTROYS M8 DoD #3's
#    LAW IN ONE PASTE.
#
#    That paste does not merely get reviewed. It REDS:
#    ReleaseWorkflowPinTests.TheNugetApiKey_IsReferencedExactlyOnce_AndOnlyInReleaseYml
#    counts the key's expression across every .github/workflows/*.yml — comments
#    included — and asserts exactly one reference, in release.yml. The pin that
#    stops this was written in Phase 8.2 for an entirely different reason, and it
#    was already biting on this shape a milestone before the shape arrived.
#    (Which is also why the block above spells the push line without the key's
#    real expression: the pin counts prose too, deliberately.)
#
#    Their `-p:Version=` / `-p:PackageVersion=` on every pack is forbidden here
#    for the same family of reasons, and is likewise already pinned
#    (TheReleaseWorkflow_NeverOverridesTheVersion). They can afford it because
#    GitVersion computes their version anyway — there is no literal to
#    contradict. THIS REPO HAS A LITERAL, ON PURPOSE.
#
# THE LAW, AND WHY A DRAFT IS THE WHOLE DESIGN. `release.yml` publishes on
# `release: types: [published]`. release-please cuts the Release as a DRAFT
# (`"draft": true` in release-please-config.json). GitHub does not fire
# `published` for a draft — "Workflows are not triggered for the created,
# edited, or deleted activity types for draft releases" (Actions docs, verbatim).
# So EVERYTHING BEFORE THE OWNER'S CLICK IS AUTOMATIC AND THE CLICK ITSELF IS
# UNTOUCHED. The law holds structurally, not by promise.
#
# ─── THE CONFIG, AND WHY EVERY VALUE IS WHAT IT IS ───────────────────────────
#
# release-please-config.json cannot explain itself: release-please reads it with
# `JSON.parse` (github.ts's getFileJson), which is STRICT — a `//` comment throws
# on load. Measured, not assumed. So the justification lives here.
#
#   "release-type": "simple"      There is no `dotnet` release type. `simple`
#                                 writes CHANGELOG.md + extra-files and nothing
#                                 else — which is exactly what a .NET repo wants.
#                                 It does NOT create a version.txt: strategies/
#                                 simple.ts pushes that update with
#                                 `createIfMissing: false`, and no version.txt
#                                 exists here, so it is a no-op. Checked,
#                                 because a version.txt would be an EIGHTH,
#                                 unpinned version literal.
#
#   (no "versioning" key)         DEFAULT, and that IS the decision — Phase 8.7.
#                                 8.6 set `versioning: prerelease` to walk a
#                                 counter under `1.0.0-preview.N`. That whole
#                                 scheme is gone: the version is now pre-1.0
#                                 semver (0.x), so `versioning`, `prerelease` and
#                                 `prerelease-type` were DELETED rather than
#                                 retuned. The default strategy is
#                                 DefaultVersioningStrategy, and the two flags
#                                 below are its only knobs.
#
#   "draft": true                 ← THE LAW. The owner's click is the go.
#
#   "extra-files"                 THE SIX MIRRORS (decision 3), and every entry is
#                                 the OBJECT form `{"type":"generic","path":…}`
#                                 rather than a bare path string. THAT IS NOT
#                                 STYLE — IT IS THE FIX FOR A REAL CRASH, found by
#                                 Gate 2's dry-run and not by reading.
#
#                                 A BARE STRING DISPATCHES ON FILE EXTENSION
#                                 (strategies/base.js, the `else if` ladder). Only
#                                 the final `else` gives you the Generic
#                                 (annotation) updater. A path ending `.json` gets
#                                 CompositeUpdater(GenericJson('$.version'),
#                                 Generic) — and GenericJson.updateContent opens
#                                 with a bare `JSON.parse(content)`.
#                                 `.template.config/template.json` carries two
#                                 `//` annotations, so that parse THREW:
#
#                                   SyntaxError: Expected double-quoted property
#                                   name in JSON at position 1699 (line 48 col 42)
#
#                                 — column 42 being exactly where the `//` starts.
#                                 release-please would have crashed on every run:
#                                 no release PR, ever. (Failure direction SAFE —
#                                 U1, "no PR appears": loud, and nothing
#                                 publishes.) The other three end `.props` and
#                                 `.csproj`, match no arm, and reached the Generic
#                                 updater BY ACCIDENT OF THEIR EXTENSIONS.
#
#                                 So decision 3's "one updater kind — the Generic
#                                 (annotation) updater — everywhere" was true for
#                                 three files by luck and false for the fourth.
#                                 `{"type":"generic"}` (base.js `case 'generic'`;
#                                 schema arm 5, `required: [type, path]` — checked,
#                                 not assumed) names the updater OUTRIGHT at all
#                                 four sites, so the sentence is now true by
#                                 construction and no future rename can quietly
#                                 re-dispatch a file into a round-trip updater.
#                                 Pinned by ReleasePleaseConfigPinTests.
#
#                                 ⚠ THE LESSON ARRIVED TWICE IN ONE PHASE. Line 74
#                                 above already says release-please reads JSON with
#                                 strict `JSON.parse` — measured at Gate 1, for the
#                                 CONFIG file. The same fact was true of a SECOND
#                                 json file release-please reads, and the design
#                                 checked that `dotnet new` and TemplateDriftTests
#                                 tolerate JSONC without asking whether
#                                 release-please — the one tool that MUST write it
#                                 — does. It does not.
#
#   "bootstrap-sha"               a3fe234 — main's tip when this branch was cut
#                                 (PR #107, the M8 final audit). It answers 8.1's
#                                 third rejection reason ("conventional-commit
#                                 inference mis-bumps phase-structured history")
#                                 by drawing a line: release-please never reads a
#                                 single pre-8.6 commit. Without it, it finds no
#                                 last release (zero Releases have ever existed,
#                                 and no v<semver> tag exists) and walks all 580
#                                 commits, of which the only conventional ones are
#                                 Renovate's. Harmless but wrong-shaped; this
#                                 makes it correct rather than merely survivable.
#
#                                 ⚠ IT MUST NAME A COMMIT THAT EXISTS ON MAIN.
#                                 A SHA from a feature branch is not on main after
#                                 a squash-merge, so release-please would never
#                                 find it and would silently walk all of history.
#                                 a3fe234 is origin/main's tip today.
#
#   "bump-minor-pre-major": true  LIVE, AND IT IS THE ONE STOPPING AN ACCIDENTAL
#                                 1.0.0. At 0.x a `feat!:` bumps the MINOR
#                                 (0.1.0 -> 0.2.0), which is semver's own rule
#                                 for pre-1.0. Set it false and the next `feat!:`
#                                 computes 1.0.0 — a graduation NOBODY DECIDED,
#                                 and nuget.org has no hard delete, so it is
#                                 permanent. The reference (AdoNet.Async) sets
#                                 this true; so do we, for a reason that is ours.
#
#   "bump-patch-for-minor-pre-major": false
#                                 LIVE, AND IT DIVERGES FROM THE REFERENCE ON
#                                 PURPOSE — which is why it is written out at its
#                                 own default value rather than omitted. AdoNet.Async
#                                 sets it TRUE. True means a `feat:` at 0.x yields a
#                                 PATCH, so from 0.0.0 the first release would be
#                                 0.0.1 and never 0.1.0. Measured, not reasoned
#                                 (Phase 8.7's ladder). A contributor "mirroring the
#                                 reference" would flip this and quietly re-point the
#                                 whole scheme; the value is here so the divergence is
#                                 visible at the site.
#
# ⚠ BOTH FLAGS ARE GATED ON `version.isPreMajor` — `major < 1` (version.ts). They
# are live ONLY while this repo is 0.x. AT 1.0.0 THEY BOTH BECOME DEAD NO-OPS BY
# THEMSELVES; nothing has to be remembered. (8.6 omitted both and called them dead,
# correctly, at 1.0.0-preview.N — major 1. The 0.x move is what woke them up.)
#
# ⚠ THE LADDER, MEASURED against release-please 17.10.3's own
# DefaultVersioningStrategy (executed, not traced). From 0.1.0:
#
#     fix:    ->  0.1.1        feat:   ->  0.2.0        feat!:  ->  0.2.0
#
# `feat:` and `feat!:` AGREE at 0.x — both are a minor bump — and that is not a
# bug, it is what `bump-minor-pre-major` buys. Note what it means: THE COMMIT TYPE
# NOW MOVES THE VERSION (8.6's "the version is a counter" is dead — that was a
# property of the prerelease scheme, not of this repo). A `fix:` and a `feat:` are
# genuinely different releases now.
#
# The commitlint gate stays safely ADVISORY, but the reason CHANGED and the old one
# no longer holds: it is not that the type cannot move the version — it can. It is
# that the blast radius of a mis-typed SUBJECT at 0.x is bounded by the minor: the
# worst a wrong type does is a patch where a minor belonged, or a minor where a
# patch belonged. It can never reach 1.0.0, because `bump-minor-pre-major` is what
# decides that and no subject can flip it. (A `release-as` FOOTER in a BODY still
# sets the version outright — that is footer-check.ps1's subject, not commitlint's.)
#
# ⚠ GRADUATING TO 1.0.0 — and it is NO LONGER A TRAP. Under 8.6's prerelease scheme
# it took a `Release-As:` commit AND a config change, and stopping at the commit
# silently re-entered preview. Deleting the prerelease scheme deleted that trap: a
# `Release-As: 1.0.0` commit is now SUFFICIENT, and the two flags above deactivate
# themselves at major 1. What changes at graduation is BEHAVIOUR, not config:
# `feat!:` starts producing 2.0.0 instead of a minor. docs/GITHUB-SETUP.md carries
# the full section where the person graduating is standing.
#
# See docs/plans/2026-07-17-phase-8.6-design.md for 8.6's nine decisions; Phase 8.7
# replaced its decision 2 (the counter) with the 0.x ladder above.
# ─────────────────────────────────────────────────────────────────────────────
name: release-please

on:
  push:
    branches: [main]
  # RE-RUNNABLE ON DEMAND, and the reason is a real one that already happened.
  #
  # On its first live run (2026-07-17, the 8.6 merge) release-please created its
  # branch with the right manifest and then FAILED at the PR: "GitHub Actions is
  # not permitted to create or approve pull requests" — a repo setting, since
  # enabled. The design's U1 predicted exactly this shape ("no PR appears —
  # loud") and it failed loudly, as recorded. But with `push: main` as the only
  # trigger there was NO WAY TO RE-RUN IT: the fix could only be proven by
  # merging something else, which makes an unrelated PR the test harness for the
  # release machinery.
  #
  # A workflow whose only trigger is an event you cannot stage is a workflow you
  # cannot debug. This costs nothing (it computes and opens a PR; it publishes
  # nothing — release.yml fires on `release: published` alone) and it buys the
  # ability to answer "is release-please healthy?" without merging anything.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ONE JOB. There is no second one, and the block at the top of this file is
  # why. What this job produces is a pull request; a human merges it, and a
  # human clicks Publish on the draft it leads to.
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # The default GITHUB_TOKEN, deliberately — it can open a PR and cut a
          # draft Release, and it CANNOT publish to nuget.org, because the one
          # thing that can is a secret this workflow has never heard of.
          #
          # THE KNOWN COST, AND THE OWNER'S DECISION. This token is exactly why
          # the release PR's checks arrive APPROVAL-REQUIRED (the block at the
          # top of this file). release-please-action's own README names the
          # remedy: "You will want to configure a GitHub Actions secret with a
          # Personal Access Token if you want GitHub Actions CI checks to run on
          # Release Please PRs."
          #
          # THE PAT IS REJECTED, ON PURPOSE. It would buy automatic CI at the
          # price of a SECOND repo-scoped secret — one that expires, needs
          # rotation, and would sit next to NUGET_API_KEY in a repo whose whole
          # release law is "one secret, and it is only reachable after a human
          # click". The approve-click costs one click and expires never. It is
          # the same shape as the draft-publish click this phase already treats
          # as the go: a human gate, not a hurdle to route around.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
