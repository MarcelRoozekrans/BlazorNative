# ─────────────────────────────────────────────────────────────────────────────
# BlazorNative RELEASE-PLEASE (Phase 8.6, re-cut Phase 9.x — the release
# automation, now END TO END).
#
# WHAT THIS WORKFLOW DOES: it opens a release PR, and — when that PR is merged —
# it cuts the tag, publishes the GitHub Release, AND pushes the packages to
# nuget.org. All in ONE workflow run. Merging the release PR is the go.
#
# ⚠ WHY THE PUBLISH LIVES HERE AND NOT IN release.yml — READ THIS FIRST, BECAUSE
#   THE OBVIOUS SPLIT IS THE ONE THAT NEVER FIRES.
#
#   release.yml used to own the push, gated on `release: types: [published]`.
#   That design was structurally dead: release-please cuts the Release using the
#   default GITHUB_TOKEN (see the token comment on the action step below, and why
#   it is not a PAT), and GITHUB DOES NOT FIRE WORKFLOW TRIGGERS FOR EVENTS
#   CREATED BY GITHUB_TOKEN. This is GitHub's anti-recursion rule, verbatim from
#   the Actions docs: "events triggered by the GITHUB_TOKEN ... will not create a
#   new workflow run." So a Release cut by this workflow NEVER produced a
#   `release: published` event, release.yml NEVER auto-fired, and nothing ever
#   reached nuget.org — the tag and the Release existed, the packages did not.
#   (Proven live: v0.1.0 tag + Release existed while api.nuget.org returned
#   BlobNotFound for every package, and no release.yml run was ever triggered by
#   a `release` event — only by push/pull_request.)
#
#   A human clicking "Publish" on a draft USED to supply that event, because a
#   human's click is not a GITHUB_TOKEN action. Removing the human (the owner's
#   "auto release of everything" decision) removed the only thing that ever fired
#   the push. So the push had to move INTO this run, where no second event is
#   needed. That is exactly the shape the reference implementation (AdoNet.Async)
#   uses: a publish job in release-please.yml, gated on the action's own
#   `release_created` output, packing and pushing in the same run the tag was cut.
#
# ⚠⚠ THE KEY MOVED, IT DID NOT MULTIPLY. `secrets.NUGET_API_KEY` is referenced
#    EXACTLY ONCE in the whole repository — the `push` job's job-level `env:`
#    below — and ReleaseWorkflowPinTests reds the required build-test lane if a
#    second reference ever appears in ANY workflow (comments counted too). The
#    single-secret law is unchanged; only its address is. release.yml no longer
#    mentions the key at all: it is now the PR-time validation lane and nothing
#    more. (This block spells the secret by NAME, never in its `${{ … }}`
#    expression form, precisely because the pin counts prose too — the same
#    discipline release.yml kept.)
#
#    The reference's per-pack version override (the MSBuild Version /
#    PackageVersion properties, set on the CLI) is still forbidden here and still
#    pinned (TheReleaseWorkflow_NeverOverridesTheVersion, now retargeted at this
#    file — and, like the key, spelled in prose WITHOUT the literal `p:`-flag form
#    the pin counts). They can afford it because GitVersion computes their
#    version; THIS REPO HAS A LITERAL, ON PURPOSE, and the tag is a CLAIM the
#    validate job ASSERTS against src/Directory.Build.props — never overrides.
#
# ⚠ THE VALIDATE / PUSH SPLIT IS THE OLD release.yml DESIGN, RELOCATED WHOLE.
#   Everything provable happens in `validate`, with NO KEY in the run; only
#   `push` — which packs nothing and has no source tree — ever sees the secret.
#   THE SEVEN-PACKAGE PUSH IS NOT ATOMIC, CANNOT BE MADE ATOMIC, AND HAS NO UNDO:
#   nuget.org has no hard delete, only unlist. So front-loading every check
#   before the key is the only mitigation there is, and the push step stays the
#   smallest, dumbest thing that can work (enumerate the feed, --skip-duplicate).
#
#   Both jobs are gated on `needs.release-please.outputs.release_created`, which
#   is `'true'` ONLY on the run that merges a release PR — never on an ordinary
#   push to main (which just opens/updates the PR). So an everyday merge computes
#   a version and touches no key; only the release-PR merge publishes.
#
# ─── THE CONFIG, AND WHY EVERY VALUE IS WHAT IT IS ───────────────────────────
#
# release-please-config.json cannot explain itself: release-please reads it with
# `JSON.parse` (github.ts's getFileJson), which is STRICT — a `//` comment throws
# on load. Measured, not assumed. So the justification lives here.
#
#   "release-type": "simple"      There is no `dotnet` release type. `simple`
#                                 writes CHANGELOG.md + extra-files and nothing
#                                 else — which is exactly what a .NET repo wants.
#                                 It does NOT create a version.txt: strategies/
#                                 simple.ts pushes that update with
#                                 `createIfMissing: false`, and no version.txt
#                                 exists here, so it is a no-op. Checked,
#                                 because a version.txt would be an EIGHTH,
#                                 unpinned version literal.
#
#   (no "versioning" key)         DEFAULT, and that IS the decision — Phase 8.7.
#                                 8.6 set `versioning: prerelease` to walk a
#                                 counter under `1.0.0-preview.N`. That whole
#                                 scheme is gone: the version is now pre-1.0
#                                 semver (0.x), so `versioning`, `prerelease` and
#                                 `prerelease-type` were DELETED rather than
#                                 retuned. The default strategy is
#                                 DefaultVersioningStrategy, and the two flags
#                                 below are its only knobs.
#
#   (no "draft" key)              THE DRAFT IS GONE, AND ITS ABSENCE IS THE
#                                 DECISION. 8.6 set `"draft": true` so a human had
#                                 to click Publish — that click WAS the go, and
#                                 the whole law rested on it. "Auto release of
#                                 everything" retired the click: a merged release
#                                 PR now cuts an ORDINARY (published) Release, and
#                                 the `push` job below is what reaches nuget.org
#                                 in the SAME run. Draft vs published no longer
#                                 gates anything — the publish is `release_created`
#                                 -gated, not event-gated — so the draft would buy
#                                 only a stranded state (packages pushed, Release
#                                 still draft). It was deleted, not retuned.
#
#   "extra-files"                 THE SIX MIRRORS (decision 3), and every entry is
#                                 the OBJECT form `{"type":"generic","path":…}`
#                                 rather than a bare path string. THAT IS NOT
#                                 STYLE — IT IS THE FIX FOR A REAL CRASH, found by
#                                 Gate 2's dry-run and not by reading.
#
#                                 A BARE STRING DISPATCHES ON FILE EXTENSION
#                                 (strategies/base.js, the `else if` ladder). Only
#                                 the final `else` gives you the Generic
#                                 (annotation) updater. A path ending `.json` gets
#                                 CompositeUpdater(GenericJson('$.version'),
#                                 Generic) — and GenericJson.updateContent opens
#                                 with a bare `JSON.parse(content)`.
#                                 `.template.config/template.json` carries two
#                                 `//` annotations, so that parse THREW:
#
#                                   SyntaxError: Expected double-quoted property
#                                   name in JSON at position 1699 (line 48 col 42)
#
#                                 — column 42 being exactly where the `//` starts.
#                                 release-please would have crashed on every run:
#                                 no release PR, ever. (Failure direction SAFE —
#                                 U1, "no PR appears": loud, and nothing
#                                 publishes.) The other three end `.props` and
#                                 `.csproj`, match no arm, and reached the Generic
#                                 updater BY ACCIDENT OF THEIR EXTENSIONS.
#
#                                 So decision 3's "one updater kind — the Generic
#                                 (annotation) updater — everywhere" was true for
#                                 three files by luck and false for the fourth.
#                                 `{"type":"generic"}` (base.js `case 'generic'`;
#                                 schema arm 5, `required: [type, path]` — checked,
#                                 not assumed) names the updater OUTRIGHT at all
#                                 four sites, so the sentence is now true by
#                                 construction and no future rename can quietly
#                                 re-dispatch a file into a round-trip updater.
#                                 Pinned by PackageVersionPinTests
#                                 .EveryExtraFile_NamesTheGenericUpdaterOutright.
#
#   "bootstrap-sha"               a3fe234 — main's tip when the release machinery
#                                 was cut (PR #107, the M8 final audit). It draws
#                                 a line: release-please never reads a single
#                                 pre-8.6 commit. Without it, it finds no last
#                                 release and walks all of history, of which the
#                                 only conventional commits are Renovate's.
#                                 Harmless but wrong-shaped; this makes it correct
#                                 rather than merely survivable.
#
#                                 ⚠ IT MUST NAME A COMMIT THAT EXISTS ON MAIN.
#                                 A SHA from a feature branch is not on main after
#                                 a squash-merge, so release-please would never
#                                 find it and would silently walk all of history.
#
#   "bump-minor-pre-major": true  LIVE, AND IT IS THE ONE STOPPING AN ACCIDENTAL
#                                 1.0.0. At 0.x a `feat!:` bumps the MINOR
#                                 (0.1.0 -> 0.2.0), which is semver's own rule
#                                 for pre-1.0. Set it false and the next `feat!:`
#                                 computes 1.0.0 — a graduation NOBODY DECIDED,
#                                 and nuget.org has no hard delete, so it is
#                                 permanent. The reference (AdoNet.Async) sets
#                                 this true; so do we, for a reason that is ours.
#
#   "bump-patch-for-minor-pre-major": false
#                                 LIVE, AND IT DIVERGES FROM THE REFERENCE ON
#                                 PURPOSE — which is why it is written out at its
#                                 own default value rather than omitted. AdoNet.Async
#                                 sets it TRUE. True means a `feat:` at 0.x yields a
#                                 PATCH, so from 0.0.0 the first release would be
#                                 0.0.1 and never 0.1.0. Measured, not reasoned
#                                 (Phase 8.7's ladder). A contributor "mirroring the
#                                 reference" would flip this and quietly re-point the
#                                 whole scheme; the value is here so the divergence is
#                                 visible at the site.
#
# ⚠ BOTH FLAGS ARE GATED ON `version.isPreMajor` — `major < 1` (version.ts). They
# are live ONLY while this repo is 0.x. AT 1.0.0 THEY BOTH BECOME DEAD NO-OPS BY
# THEMSELVES; nothing has to be remembered.
#
# ⚠ THE LADDER, MEASURED against release-please 17.10.3's own
# DefaultVersioningStrategy (executed, not traced). From 0.1.0:
#
#     fix:    ->  0.1.1        feat:   ->  0.2.0        feat!:  ->  0.2.0
#
# `feat:` and `feat!:` AGREE at 0.x — both are a minor bump — and that is not a
# bug, it is what `bump-minor-pre-major` buys. THE COMMIT TYPE NOW MOVES THE
# VERSION. A `fix:` and a `feat:` are genuinely different releases now.
#
# The commitlint gate stays safely ADVISORY: the blast radius of a mis-typed
# SUBJECT at 0.x is bounded by the minor — the worst a wrong type does is a patch
# where a minor belonged, or a minor where a patch belonged. It can never reach
# 1.0.0, because `bump-minor-pre-major` decides that and no subject can flip it.
# (A `release-as` FOOTER in a BODY still sets the version outright — that is
# footer-check.ps1's subject, not commitlint's.)
#
# ⚠ GRADUATING TO 1.0.0 — a `Release-As: 1.0.0` commit is SUFFICIENT, and the two
# flags above deactivate themselves at major 1. What changes at graduation is
# BEHAVIOUR, not config: `feat!:` starts producing 2.0.0 instead of a minor.
# docs/GITHUB-SETUP.md carries the full section where the person graduating is
# standing.
#
# See docs/plans/2026-07-17-phase-8.6-design.md for 8.6's nine decisions; Phase 8.7
# replaced its decision 2 (the counter) with the 0.x ladder above; the publish
# relocation onto `release_created` is the Phase 9.x auto-publish re-cut.
# ─────────────────────────────────────────────────────────────────────────────
name: release-please

on:
  push:
    branches: [main]
  # RE-RUNNABLE ON DEMAND. On its first live run (2026-07-17) release-please
  # created its branch and then FAILED at the PR ("GitHub Actions is not
  # permitted to create or approve pull requests" — a repo setting, since
  # enabled). With `push: main` as the only trigger there was NO WAY TO RE-RUN
  # it: the fix could only be proven by merging something else. A workflow whose
  # only trigger is an event you cannot stage is a workflow you cannot debug.
  # This costs nothing on an ordinary dispatch (release_created is false, so the
  # publish jobs below skip) and buys the ability to answer "is release-please
  # healthy?" without merging anything.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # release-please — opens/updates the release PR, and (on the merge of that PR)
  # cuts the tag + publishes the Release. Its `release_created` output is the
  # gate for the two publish jobs below.
  # ───────────────────────────────────────────────────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      # 'true' ONLY on the run that merges a release PR — the one run that should
      # publish. Every ordinary push to main leaves this empty/false and the
      # validate + push jobs skip.
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # The default GITHUB_TOKEN, deliberately. THE KNOWN COST, AND THE
          # OWNER'S DECISION: this token is why the release PR's checks arrive
          # APPROVAL-REQUIRED (a human clicks "Approve workflows to run" before
          # build-test / android-build / ios-build start). release-please-action's
          # README names the remedy — a PAT — and it is REJECTED ON PURPOSE: a PAT
          # is a SECOND repo-scoped secret that expires and needs rotation, sitting
          # next to the one NUGET secret this repo's whole law is built around. The
          # approve-click costs one click and expires never.
          #
          # This token also does NOT contradict the auto-publish design. The
          # anti-recursion rule (a GITHUB_TOKEN-created Release fires no `release`
          # event) is exactly WHY the publish lives in THIS run, gated on the
          # action's own `release_created` output, rather than in a second workflow
          # waiting for an event that never comes.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ───────────────────────────────────────────────────────────────────────────
  # validate — no key, ever. If it is provable, it is proven here, BEFORE the
  # key exists in any run. Runs ONLY when a release PR was just merged.
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    # windows-latest rather than the reference's ubuntu-latest: consumer-smoke.ps1
    # is Windows-shaped (literal backslashes in its paths are filename characters
    # on Linux). THE RELEASE LANE PACKS WITH THE SAME SCRIPT THE REQUIRED
    # build-test LANE PROVES on every PR.
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      # Check out the exact commit the tag names — the one being released.
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup .NET SDK (global.json — 10.0.3xx band)
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      # ── The door's own logic, proven on every PR too ─────────────────────
      # The 9-row classifier table with NEGATIVE rows — the same self-test the
      # required lane runs. It is what makes the tag↔props assertion below
      # non-vacuous.
      - name: Classifier self-test (9 rows — negative rows included)
        run: |
          .\scripts\release-preflight.ps1 -SelfTest
          if ($LASTEXITCODE -ne 0) { throw "release-preflight -SelfTest failed (exit $LASTEXITCODE)" }

      # ── Classify THIS release's tag, and assert it against the props ──────
      # ONE namespace publishes: v<semver> -> assert tag == props, then proceed;
      # everything else REDS. THE PROPS WINS AND THE TAG IS A CLAIM — this never
      # overrides the version (no MSBuild version-property override); it verifies it.
      - name: Classify the release tag (and assert it against the props version)
        run: |
          .\scripts\release-preflight.ps1 -Tag "${{ needs.release-please.outputs.tag_name }}"
          if ($LASTEXITCODE -ne 0) { throw "the release tag was REJECTED — see the step summary. Nothing was published." }

      # ── nuget.org state — the one thing no local step can know ────────────
      # There is no `dotnet nuget push --dry-run`. The preflight carries a
      # TWO-ARM POSITIVE CONTROL so an absence scanner must prove it can SEE and
      # DISTINGUISH before its "all clear" means anything. It reds on a forgotten
      # bump BEFORE the key exists — which is what makes --skip-duplicate safe in
      # the push job.
      - name: nuget.org preflight (two control arms, then the shipped set)
        run: |
          .\scripts\release-preflight.ps1 -Preflight
          if ($LASTEXITCODE -ne 0) { throw "the nuget.org preflight FAILED — see the step summary. Nothing was published." }

      # ── Pack the bytes that will be pushed ───────────────────────────────
      # THE SAME SCRIPT build-test runs on every PR. PACK ONCE, VALIDATE THOSE
      # BYTES, PUSH THOSE BYTES: the artifact IS the hand-off; the push job
      # downloads exactly what the smoke just proved and re-packs nothing.
      - name: Pack + validate the packages (consumer-smoke.ps1 — the same script build-test runs)
        run: |
          .\scripts\consumer-smoke.ps1
          if ($LASTEXITCODE -ne 0) { throw "consumer-smoke.ps1 failed (exit $LASTEXITCODE) — nothing was published." }

      # This upload -> download hand-off is the same shape the advisory nightly
      # android-instrumented.yml (`publish-so` -> `emulator`) exercises every
      # night: upload-artifact@v7 here, download-artifact@v8 in `push`.
      - name: Upload the validated feed (the bytes push will send — it packs nothing)
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: artifacts/packages/
          if-no-files-found: error
          retention-days: 90

  # ───────────────────────────────────────────────────────────────────────────
  # push — the only job that has ever heard of the key.
  # ───────────────────────────────────────────────────────────────────────────
  push:
    needs: [release-please, validate]
    # Same release_created gate. `validate` already implies it, but naming it
    # here keeps the guard structural and independent of the needs chain.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh

    # THE ONE REFERENCE. The `secrets.NUGET_API_KEY` expression on the next line
    # is the ONLY one across .github/workflows/*.yml, and ReleaseWorkflowPinTests
    # reds the required build-test lane if a second ever appears (in ci.yml, in
    # release.yml, in the validate job above — anywhere). It is job-level rather
    # than step-level so the presence check and the push can both read it while
    # the reference stays singular.
    #
    # That pin counts COMMENTS too — which is why every comment in this file
    # spells the secret by NAME and never in its `${{ … }}` form. The strictness
    # buys a greppable one-line audit ("what can reach my key?"), written out in
    # docs/GITHUB-SETUP.md, which is not a workflow file and can quote the
    # expression safely.
    #
    # ⚠ RESIDUAL, stated rather than papered over (owner call): a repo-level
    # secret is readable by any workflow run on a branch by an actor with write
    # access. A GitHub environment with a branch restriction would scope it —
    # rejected because the owner's law is "one secret, and the release-PR merge is
    # the go", and an environment gate is a SECOND go on an action that is already
    # a deliberate merge. The mitigations that cost nothing are taken: exactly one
    # reference, one job, gated on release_created, pinned by a test.
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      # NO CHECKOUT, DELIBERATELY. This job has no source tree — so "push
      # re-packs nothing" is STRUCTURAL rather than promised: there is nothing
      # here to pack FROM. The only bytes in this job are the ones validate
      # proved and uploaded. (It is also why setup-dotnet takes an explicit band
      # here instead of global.json — there is no global.json to read, and
      # `dotnet nuget push` is a transport, not a build.)
      - name: Setup .NET SDK (10.0.x — nuget push is a transport; there is no project to build)
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Download the validated feed (these bytes were packed and proven by validate)
        uses: actions/download-artifact@v8
        with:
          name: packages
          path: artifacts/packages

      # A NAMED presence check. An absent or mistyped secret otherwise surfaces
      # as a bare 401 from a CLI, at the one moment the owner is least able to
      # debug it. The key is never echoed — only its presence and length.
      - name: Assert NUGET_API_KEY is present
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NUGET_API_KEY is unset or misnamed — the one secret this repository needs. Add it at Settings -> Secrets and variables -> Actions, named EXACTLY 'NUGET_API_KEY'. See docs/GITHUB-SETUP.md -> 'Secrets — NUGET_API_KEY, the one secret'. Nothing was published."
          }
          Write-Host "NUGET_API_KEY is present ($($env:NUGET_API_KEY.Length) chars) — not echoed."

      # ── The push ─────────────────────────────────────────────────────────
      # ENUMERATED FROM THE FEED, not from a name list (which would be the
      # shipped set's Nth copy and would then need its own pin). Ordering the
      # pushes is theatre: nuget.org accepts a package whose dependencies are not
      # yet published, and its validation and indexing are ASYNCHRONOUS (minutes).
      #
      # SYMBOLS RIDE BY ADJACENCY. The .snupkg files sit beside their .nupkg and
      # `dotnet nuget push` carries an adjacent symbol package automatically
      # (`-n|--no-symbols` is an opt-OUT). The glob is *.nupkg, which does NOT
      # match *.snupkg — no double push. That symbols actually LAND on the symbol
      # server is UNPROVEN until the first real push — recorded, not claimed.
      #
      # --skip-duplicate owns RECOVERY: three pushed, three failed -> re-run the
      # job; the three already up must not 409 the re-run. The preflight above
      # owns "you forgot to bump" — the failure --skip-duplicate would otherwise
      # MASK by pushing nothing and going green. Neither is sound alone.
      - name: dotnet nuget push (the enumerated feed — --skip-duplicate; the preflight already proved the version is free)
        run: |
          $feed = "artifacts/packages"
          $nupkgs = @(Get-ChildItem $feed -Filter *.nupkg -File)
          if ($nupkgs.Count -eq 0) {
            throw "ZERO .nupkg found in $feed — the artifact hand-off from validate is broken. Pushing nothing and going green is the failure this check exists to prevent."
          }
          Write-Host "pushing $($nupkgs.Count) packages (symbols ride adjacent):"
          $nupkgs | ForEach-Object { Write-Host "  $($_.Name)" }
          Get-ChildItem $feed -Filter *.snupkg -File | ForEach-Object { Write-Host "  (symbols) $($_.Name)" }

          dotnet nuget push $nupkgs.FullName `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet nuget push failed (exit $LASTEXITCODE). PARTIAL FAILURE IS RECOVERABLE: re-run THIS JOB from the Actions UI — --skip-duplicate makes the packages that already landed no-ops. See docs/GITHUB-SETUP.md."
          }

      - name: Summarise what was published
        run: |
          $nupkgs = @(Get-ChildItem "artifacts/packages" -Filter *.nupkg -File)
          $lines = @(
            "### ✅ Published to nuget.org",
            "",
            "Release **${{ needs.release-please.outputs.tag_name }}** — $($nupkgs.Count) packages pushed from the feed ``validate`` packed and proved.",
            ""
          )
          $lines += $nupkgs | ForEach-Object { "- ``$($_.Name)``" }
          $lines += @(
            "",
            "nuget.org validation and indexing are **asynchronous** — packages take minutes to become restorable, and a consumer restoring inside that window may see an unindexed dependency. That window is self-healing.",
            "",
            "Symbols rode adjacent to their packages; that they reached the symbol server is not asserted here (see ``docs/GITHUB-SETUP.md``)."
          )
          $lines -join "`n" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
