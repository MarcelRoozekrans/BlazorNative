# ─────────────────────────────────────────────────────────────────────────────
# BlazorNative RELEASE VALIDATION (Phase 8.2, re-cut Phase 9.x — the PR-time
# validation lane).
#
# THIS FILE NO LONGER PUBLISHES ANYTHING, AND IT NEVER MENTIONS THE NUGET KEY.
# The publish moved, whole, into release-please.yml — read that file's header for
# why (the short version: release-please cuts the Release with GITHUB_TOKEN, and
# GitHub does not fire `release: published` for a GITHUB_TOKEN-created Release, so
# a workflow waiting on that event NEVER auto-fired and nothing ever reached
# nuget.org). The push now runs in the SAME workflow run that cuts the tag, gated
# on release-please's own `release_created` output. The single `NUGET_API_KEY`
# reference lives there, in that workflow's `push` job, and NOWHERE else —
# ReleaseWorkflowPinTests reds the required build-test lane if a second reference
# appears in ANY workflow (comments counted too).
#
# WHAT THIS FILE IS NOW: the release machinery's PR-time validation lane, and
# nothing more. It runs on PRs — and on main pushes — that touch the release
# machinery or BUMP THE PROPS (i.e. the release-preparation change itself), which
# is precisely when "is this version still free on nuget.org?" is a question with
# an answer worth having. It carries NO key, packs nothing for publication, and
# uploads no feed: it exercises the door's own logic (the classifier self-test)
# and asks nuget.org for its state, so that release-please.yml's publish jobs —
# which run the SAME scripts — are proven on every relevant PR long before they
# ever run for real.
#
# WHY THIS LANE STILL EARNS ITS KEEP AFTER THE PUSH LEFT. The decisions the
# release makes — the tag classifier, the tag↔props assertion, the nuget.org
# preflight — all live in `scripts/release-preflight.ps1`, whose `-SelfTest`
# table runs here on every PR. That is what lets release-please.yml's `validate`
# job be trusted the first time it runs against a real tag: its logic was proven,
# with real negative inputs, on the PRs that led up to it. A workflow that only
# ever runs once per release is the least-exercised code in the repo; this lane
# is how its logic gets exercised continuously, with no key and no publish.
#
# ADVISORY BY DESIGN — this is NOT a required check. The three required gates keep
# their names and contexts (`build-test`, `android-build`, `ios-build`). Making
# this required would put nuget.org's availability on the critical path of every
# PR that touches the props — an outage would red a required gate on a change that
# has nothing to do with nuget.org.
#
# See docs/plans/2026-07-16-phase-8.2-design.md for the original eight decisions;
# the publish relocation onto release-please.yml's `release_created` is the Phase
# 9.x auto-publish re-cut. See docs/GITHUB-SETUP.md.
# ─────────────────────────────────────────────────────────────────────────────
name: release-validation

on:
  # THE SELF-PROVING TRIGGER (8.2 decision 4). Aimed at the moment it matters:
  # PRs that touch the release machinery — or BUMP THE PROPS, i.e. the
  # release-preparation PR itself, which is precisely when "is this version still
  # free?" is a question with an answer worth having. It does not run on the
  # other 95% of PRs, which have nothing to do with releasing.
  pull_request:
    paths:
      - .github/workflows/release.yml
      - .github/workflows/release-please.yml
      - scripts/release-preflight.ps1
      - src/Directory.Build.props

  # Re-validate on the merge commit — THE COMMIT A TAG WILL NAME. The validate
  # that matters is the one on the commit being released.
  push:
    branches: [main]
    paths:
      - .github/workflows/release.yml
      - .github/workflows/release-please.yml
      - scripts/release-preflight.ps1
      - src/Directory.Build.props

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # validate — no key, ever. It exercises the release door's logic and the
  # nuget.org preflight so release-please.yml's publish jobs are proven before
  # they ever run for real. It does NOT pack a publishable feed and does NOT
  # push anything (release-please.yml owns both).
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v7
        with:
          # The bump-detection step below diffs the props <Version> against the
          # PR base (or the push parent), so it needs both commits present.
          fetch-depth: 0

      - name: Setup .NET SDK (global.json — 10.0.3xx band)
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      # ── The door's own logic, proven on every run ────────────────────────
      # The 9-row classifier table with NEGATIVE rows. This is what makes the
      # classifier and the tag↔props assertion provable WITHOUT a Release: on a
      # PR there is no tag, so a lane that "tested" the assertion against a tag
      # derived from the props would compare the props to ITSELF — green,
      # vacuous, and exactly 8.1's headline sin. The table supplies real negative
      # inputs (`v9.9.9` vs a props of `0.1.0`) instead.
      - name: Classifier self-test (9 rows — negative rows included)
        run: |
          .\scripts\release-preflight.ps1 -SelfTest
          if ($LASTEXITCODE -ne 0) { throw "release-preflight -SelfTest failed (exit $LASTEXITCODE)" }

      # ── the preflight only BITES on a version bump ───────────────────────
      # The nuget-state check answers "is the NEW version free?" — a question
      # only a release-preparation bump asks. But this workflow's `paths:` also
      # fire it on machinery/feature PRs (they touch release-preflight.ps1 /
      # release-please.yml / release.yml) and on the machinery merge to main —
      # where the props still holds the CURRENT, already-published version. An
      # unconditional preflight there reds on that version being (correctly)
      # already out: a false positive on every such PR. So gate it — run the
      # nuget preflight ONLY when this ref changes the props <Version> vs its
      # baseline (PR: the base branch; push: the parent commit). The self-test
      # above is version-agnostic and always runs; the REAL publish-time gate is
      # release-please.yml's own preflight (release_created), untouched, which
      # still hard-checks the version at push. This step matches the comment the
      # preflight always carried ("on the PR that bumps the props").
      - name: Is the props <Version> being bumped? (the preflight only bites when it is)
        id: bump
        run: |
          $base = "${{ github.event.pull_request.base.sha || github.event.before }}"
          $bumped = 'true'  # safe default: an unknown baseline runs the preflight (today's behaviour)
          if ([string]::IsNullOrWhiteSpace($base) -or $base -match '^0{40}$') {
            Write-Host "no resolvable baseline (first push / empty before) — running the preflight (safe default)"
          } else {
            try {
              $diff = git diff "$base" HEAD -- src/Directory.Build.props 2>$null
              $bumped = if ($diff | Select-String -Pattern '(?m)^\+\s*<Version>' -Quiet) { 'true' } else { 'false' }
              Write-Host "props <Version> changed vs ${base}: $bumped"
            } catch {
              Write-Host "could not diff the props vs ${base} ($($_.Exception.Message)) — running the preflight (safe default)"
            }
          }
          "bumped=$bumped" | Out-File $env:GITHUB_OUTPUT -Append

      # ── nuget.org state — the one thing no local step can know ────────────
      # There is no `dotnet nuget push --dry-run`. The preflight carries a
      # TWO-ARM POSITIVE CONTROL — an absence scanner must prove it can SEE and
      # DISTINGUISH before its "all clear" means anything. Running it here, on the
      # PR that bumps the props, answers "is this version still free?" while there
      # is still time to change the answer. See the script. (Gated above: a PR
      # that does not bump the props is not preparing a release, and the current
      # already-published version is not a finding there.)
      - name: nuget.org preflight (two control arms, then the shipped set)
        if: steps.bump.outputs.bumped == 'true'
        run: |
          .\scripts\release-preflight.ps1 -Preflight
          if ($LASTEXITCODE -ne 0) { throw "the nuget.org preflight FAILED — see the step summary." }
