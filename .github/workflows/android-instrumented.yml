      #        deny path THROWS instead of statusing -> no completion -> the echo stays
      #        blank -> this times out and reds (the no-hang law).
      #      .cold_tap_intent_routes_to_the_notifications_page -- launch the EXACT
      #        Intent the notification's content PendingIntent wraps
      #        (AndroidShellBridge.buildTapIntent, the 5.1 launch deep link) -> onCreate
      #        parses "/notifications" -> BnNotificationsDemo mounts ("arrived:/notifications").
      #        MUTATION: drop the PendingIntent's data (route) -> onCreate mounts the
      #        default page -> this reds.
      #      .warm_tap_reroutes_the_live_session_via_navigate_host_event -- boot BnDemo
      #        (live), deliver the deep-link Intent to onNewIntent (singleTop) ->
      #        host_event("navigate","/notifications") -> .NET NavigateToAsync re-routes
      #        the LIVE session (rc 0) and the page mounts. MUTATION: typo the "navigate"
      #        name in the shell -> .NET ignores it -> rc != 0 and the page never mounts
      #        -> this reds.
      #   +2 BnNotificationsGrantedAndroidTest (POST_NOTIFICATIONS held -- GrantPermissionRule):
      #      .show_posts_a_real_notification_and_cancel_removes_it -- tap Show -> a REAL
      #        notification (id 7, title "Hello", body "A local notification") appears in
      #        NotificationManager.activeNotifications on the channel; tap Cancel -> it is
      #        gone. MUTATION: drift the channel-id literal / skip channel creation ->
      #        notify posts nothing -> the activeNotifications probe reds.
      #      .show_with_permission_held_never_prompts -- the already-granted fast path:
      #        tap Show -> "status:Granted" with ZERO permission requests raised.
      # ── Phase 9.2 Gate 2 — BIOMETRICS + SECURE STORAGE (193 -> 201, +8) ──────────
      # The SECOND reuse of the 9.0 generic ABI: op=Biometrics + op=SecureStorage ride
      # the SAME hostCallBegin slot (no struct grow, no new export -- still 80 bytes / 10
      # exports). AndroidShellBridge's real flow on the AVD: raw AndroidKeyStore
      # AES-256-GCM, the OS-key-level biometric binding, and androidx BiometricPrompt
      # against MainActivity (now a FragmentActivity). Biometrics is where the emulator is
      # LEAST like reality (adb emu finger touch injects a SYNTHETIC event; the keystore
      # is software-backed and the real system sheet is not CI-drivable), so the real
      # BiometricPrompt is bypassed via biometricGateHook -- the geolocation/notifications
      # real-dialog split, verbatim. The REAL fingerprint-sensor decrypt is owner-phone
      # territory (the design's UNPROVEN-until-hardware half). Each count mutation-verified:
      #   +3 SecureStorageAndroidTest (the keystore core, driven directly -- real crypto):
      #      .nonauth_secret_round_trips_through_the_android_keystore -- a real AES-256-GCM
      #        set -> get(value) -> delete -> NotFound through the AndroidKeyStore.
      #      .a_plain_get_of_an_auth_bound_item_authfails_the_os_key_binding -- THE SECURITY
      #        CRUX. An auth-bound key (setUserAuthenticationRequired(true)) + a stored blob;
      #        a plain get returns AuthFailed (the keystore's own KeyInfo says the key is
      #        user-auth-required and the OS would refuse the decrypt). MUTATION: drop
      #        setUserAuthenticationRequired from provisionKey -> the plain get decrypts ->
      #        Error, never AuthFailed -> this reds (verified: 1 red, this test alone).
      #      .biometric_check_reports_a_status_as_data -- canAuthenticate maps to a
      #        BiometricStatus VALUE in range (never a throw).
      #   +5 BnSecureAndroidTest (through BnSecureDemo -- the real .NET round-trip):
      #      .authenticate_via_the_prompt_seam_echoes_authenticated -- seam success ->
      #        Authenticated, echoed as DATA.
      #      .authenticate_denied_is_data_within_a_bounded_await_no_hang -- seam denial ->
      #        Cancelled within a bounded await. MUTATION: the deny path THROWS instead of
      #        statusing -> no completion -> the echo stays blank -> this times out and reds
      #        (verified: 1 red, 12.5s timeout, this test alone -- the no-hang law).
      #      .unlock_of_an_absent_secret_is_not_found_no_hang -- getWithAuth of an absent
      #        secret -> NotFound before any prompt, DATA, no hang.
      #      .unlock_of_an_auth_bound_secret_passes_a_cryptoobject_to_the_prompt_and_denial_is_authfailed
      #        -- getWithAuth of an app-global auth-bound secret inits the decrypt Cipher and
      #        hands the prompt a CryptoObject; the seam asserts it IS present (the OS-key
      #        binding on the READ side) and a denial -> AuthFailed. MUTATION: pass
      #        crypto=null to the prompt -> hasCryptoObject false -> this reds (verified: 1
      #        red, "MUST pass a CryptoObject", this test alone).
      #      .delete_echoes_ok -- delete is idempotent + permission-free -> Ok.
      # ── Phase 11.4 Gate B — THE STDERR -> LOGCAT PUMP (210 -> 213, +3) ──
      #    BnStderrPumpAndroidTest. THIS LANE IS WHERE THE ANDROID TRANSPORT IS PROVEN,
      #    and it is the only place it can be: `android.system.Os` is one of the
      #    android.jar methods the JVM unit-test lane throws "not mocked" from, so
      #    everything downstream of the syscall (line splitting, partial lines, the
      #    [BN|L|category] round trip, the unprefixed fallback) is pinned there over an
      #    in-memory stream, and only the syscall is pinned here.
      #    TWO RUNS, AND THEY SETTLED #191:
      #      f53f74a (2026-07-22) 211/212 -- the single probe failed with only
      #        `expected:<…> but was:<null>`, which could not say whether the pump or
      #        the probe was wrong.
      #      fix/191-android-pump-diagnostic 212/213 -- the new discriminator answered:
      #        state=Installed dup2Result=2 readFd=84 FileDescriptor.err=54
      #        readerThread=alive=true. The dup2 TOOK; `FileDescriptor.err` is an ART
      #        dup at fd 54, so the ORIGINAL probe wrote to the wrong descriptor. The
      #        transport works on API 34; the defect was test-side.
      #      .stderrWrites_reachTheSink_throughTheRealDup2 -- a write to an EXPLICIT
      #        descriptor 2 after install() reaches the pump's sink with the level its
      #        prefix declared. GREEN on run 2 -- this is Gate B's device proof, and it
      #        stays a strict assertEquals on the whole record. Asserted against the
      #        INJECTED SINK, deliberately, not by scraping `logcat -d`: the scrape is
      #        timing-sensitive and belongs in Phase 11.2's device runbook as an
      #        observation, not in a gate (design §8.2).
      #      .javaFileDescriptorErr_isNotTheProcessStderr (#191, +1) -- pins the TRAP that
      #        cost this issue a dispatch: on Android `FileDescriptor.err` is a dup (54,
      #        measured), keeping the ORIGINAL /dev/null description, so a write through
      #        it succeeds and reaches nothing. Asserted as a consequence, not as a
      #        number: err != 2 => the record must NOT arrive; err == 2 => it MUST. A
      #        future platform change flips the branch, not the colour. Every message
      #        still carries the dup2 result, the pipe fds and the reader thread's
      #        liveness.
      #      .install_isIdempotent -- a second install() returns false. A second dup2
      #        would re-point fd 2 at a NEW pipe and orphan the first reader, losing
      #        every line written between the two; Activity recreation re-enters
      #        onCreate, so this is a live path, not a hypothetical.
      # ── Font parity (#126, 209 -> 210, +1) ── Inter is bundled in res/font;
      #    BnFontAndroidTest asserts ResourcesCompat.getFont(R.font.inter_regular) resolves
      #    (not Typeface.DEFAULT). The resolved-typeface assertions in BnDemoAndroidTest ride
      #    existing test methods (no further count move).
      # ── Phase 9.3 Gate 2 — CAMERA PHOTO CAPTURE + FileProvider (201 -> 209, +8) ──
      # The THIRD reuse of the 9.0 generic ABI and the LAST M9 capability: op=Camera rides
      # the SAME hostCallBegin slot (no struct grow, no new export -- still 80 bytes / 10
      # exports). The image crosses as a file PATH, not bytes: the ACTION_IMAGE_CAPTURE
      # Intent path (NO runtime CAMERA permission -- the system camera app owns the sensor)
      # writes the JPEG to a FileProvider output URI; the shell downscales + normalizes EXIF
      # + re-encodes and returns {"path",...}. The real camera-app SHUTTER is not CI-drivable
      # (the emulator's is a synthetic scene, the real UI is owner-phone territory), so the
      # capture RESULT is seam-driven (cameraCaptureHook -- the geolocation/notifications/
      # biometrics real-UI split): CameraCapture writes synthetic bytes THROUGH the
      # FileProvider URI (as the camera app writes to EXTRA_OUTPUT) and delivers the result
      # through the SAME processing path, so CI asserts the FILE -> BnImage contract
      # deterministically. Each count mutation-verified (break the thing, watch the RIGHT
      # test go red):
      #   +5 CameraCaptureAndroidTest (the shell core, driven DIRECTLY -- real FileProvider +
      #      real decode/encode):
      #      .capture_writes_a_real_jpeg_through_the_fileprovider_with_bytes -- bytes written
      #        THROUGH the FileProvider content URI -> a real cache-dir JPEG with bytes; the
      #        file:// path + byte size returned. MUTATION: mis-authority the <provider> ->
      #        FileProvider.getUriForFile throws -> no file, no bytes -> this reds.
      #      .capture_downscales_to_maxdim_on_the_long_edge -- a 4000x3000 scene at maxDim
      #        1024 lands with its long edge <= 1024 (aspect preserved). MUTATION: skip the
      #        downscale -> 4000 > 1024 -> reds.
      #      .capture_normalizes_exif_baking_rotation_and_resetting_the_tag -- a landscape
      #        400x200 input tagged ROTATE_90 -> upright PORTRAIT 200x400 output pixels AND an
      #        identity EXIF tag (a re-encoded JPEG carries none), so Coil/Kingfisher do NOT
      #        double-rotate. MUTATION: skip applyExifRotation -> stays 400x200 landscape ->
      #        the "width < height" assertion reds.
      #      .prune_keeps_only_the_last_n_captures -- six captures -> prune -> 3 survive (the
      #        leak backstop). MUTATION: skip the prune -> all six remain -> reds.
      #      .check_reports_camera_availability_as_data -- the AVD's emulated back camera +
      #        the manifest <queries> for IMAGE_CAPTURE -> Captured (available), a DATA value.
      #   +3 BnCameraAndroidTest (through BnCameraDemo -- the real .NET round-trip):
      #      .take_photo_composes_a_captured_file_into_a_measured_bnimage -- THE COMPOSITION
      #        (camera -> file -> BnImage). The seam writes a 640x480 scene through the
      #        FileProvider and delivers RESULT_OK -> the shell returns the file:// path -> the
      #        demo sets it as the BnImage Src -> Coil loads the local file and the BnImage
      #        MEASURES at the demo's definite 240x320 box (the M6/M7 ledger discharge: a
      #        multi-megapixel photo cannot reflow the layout) and PAINTS it. MUTATION:
      #        mis-authority the FileProvider -> the capture errors -> the echo never reads
      #        "captured:" -> this reds.
      #      .capture_cancelled_is_data_within_a_bounded_await_no_hang -- the seam cancels ->
      #        status:Cancelled within a bounded await, no path, the BnImage stays empty.
      #        MUTATION: the cancel path THROWS instead of statusing -> no completion -> the
      #        echo stays blank -> this times out and reds (the no-hang law).
      #      .check_reports_availability_as_data -- Check -> status:Captured (available on the
      #        AVD) without launching the camera UI.
      - name: Assert instrumented baseline (213 passed / 0 failed)
        run: |
          shopt -s globstar nullglob
          xmls=(src/BlazorNative.Jni/build/outputs/androidTest-results/connected/**/*.xml)
          if [ "${#xmls[@]}" -eq 0 ]; then
            echo "No JUnit XML results found under build/outputs/androidTest-results/connected" >&2
            exit 1
          fi
          attr() { grep -o "$1=\"[0-9]*\"" "$2" | head -n 1 | grep -o '[0-9]*'; }
          tests=0; failures=0; errors=0; skipped=0
          for x in "${xmls[@]}"; do
            t=$(attr tests "$x");    tests=$((tests + ${t:-0}))
            f=$(attr failures "$x"); failures=$((failures + ${f:-0}))
            e=$(attr errors "$x");   errors=$((errors + ${e:-0}))
            s=$(attr skipped "$x");  skipped=$((skipped + ${s:-0}))
          done
          echo "Instrumented totals across ${#xmls[@]} suite(s): tests=$tests failures=$failures errors=$errors skipped=$skipped"
          if [ "$tests" -ne 213 ] || [ "$failures" -ne 0 ] || [ "$errors" -ne 0 ] || [ "$skipped" -ne 0 ]; then
            echo "Instrumented test baseline drift: expected 213 passed / 0 failed / 0 skipped, got tests=$tests failures=$failures errors=$errors skipped=$skipped" >&2
            exit 1
          fi

      - name: Upload artifact — instrumented JUnit XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-results
          path: src/BlazorNative.Jni/build/outputs/androidTest-results/
          if-no-files-found: warn

      - name: Upload artifact — logcat (failure only)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-logcat
          path: ${{ runner.temp }}/logcat.txt
          if-no-files-found: ignore
