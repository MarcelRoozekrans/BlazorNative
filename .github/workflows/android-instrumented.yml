# ─────────────────────────────────────────────────────────────────────────────
# BlazorNative instrumented suite (Phase 4.0 Gate 3) — nightly + manual.
#
# INFORMATIONAL — this workflow is NOT a required check. Emulator-on-CI has
# known flake modes (boot timeouts, adb drops); it stays advisory until a
# stability baseline exists (promotion criteria documented in
# docs/GITHUB-SETUP.md → "Branch protection").
#
# Two jobs:
#   publish-so (windows-latest) — the only toolchain we build the bionic .so
#     on (mirrors ci.yml verbatim: pinned NDK 26.3.11579264, 4 accepted
#     IL2072s, nine blazornative_* exports via llvm-readelf) → uploads the
#     linux-bionic-x64 BlazorNative.Runtime.so as an artifact.
#   emulator (ubuntu-latest, KVM) — downloads the .so, boots the API 34
#     google_apis x86_64 Pixel 6 image (mirrors the local AVD
#     blazornative-pixel6-x86_64), runs connectedAndroidTest with
#     -PciSoDir pointing at the artifact → asserts 71 passed / 0 failed.
#
# Baselines are asserted, not observed: count drift fails the job loudly.
# ─────────────────────────────────────────────────────────────────────────────
name: android-instrumented

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'   # nightly 03:00 UTC

permissions:
  contents: read

concurrency:
  group: android-instrumented-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NDK_PIN: 26.3.11579264

jobs:
  # ── Job A: publish the bionic-x64 .so on Windows (the pinned toolchain) ────
  publish-so:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK (global.json — 10.0.3xx band)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup JDK 21 (Temurin — sdkmanager)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve toolchain paths (NDK root)
        run: |
          if (-not $env:ANDROID_HOME) { throw "ANDROID_HOME is not set on the runner image" }
          "ANDROID_NDK_ROOT=$env:ANDROID_HOME\ndk\$env:NDK_PIN" | Out-File $env:GITHUB_ENV -Append

      - name: Check for pinned NDK on the runner image
        id: check-ndk
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          $present = (Test-Path $props) -and
            ((Get-Content $props -Raw) -match ('(?m)^\s*Pkg\.Revision\s*=\s*' + [regex]::Escape($env:NDK_PIN) + '\s*$'))
          "present=$present" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "NDK $env:NDK_PIN preinstalled: $present"

      - name: Cache NDK ${{ env.NDK_PIN }}
        if: steps.check-ndk.outputs.present != 'True'
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_NDK_ROOT }}
          key: ndk-${{ runner.os }}-${{ env.NDK_PIN }}

      - name: Install NDK ${{ env.NDK_PIN }} (sdkmanager, on cache miss)
        if: steps.check-ndk.outputs.present != 'True'
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          if (Test-Path $props) { Write-Host "NDK restored from cache — skipping sdkmanager"; exit 0 }
          $sdkmanager = Join-Path $env:ANDROID_HOME "cmdline-tools\latest\bin\sdkmanager.bat"
          if (-not (Test-Path $sdkmanager)) { throw "sdkmanager not found at $sdkmanager" }
          "y" | & $sdkmanager --install "ndk;$env:NDK_PIN"
          if ($LASTEXITCODE -ne 0) { throw "sdkmanager failed to install ndk;$env:NDK_PIN (exit $LASTEXITCODE)" }

      - name: Verify NDK revision pin
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          if (-not (Test-Path $props)) { throw "NDK $env:NDK_PIN missing at $env:ANDROID_NDK_ROOT" }
          $pattern = '(?m)^\s*Pkg\.Revision\s*=\s*' + [regex]::Escape($env:NDK_PIN) + '\s*$'
          if ((Get-Content $props -Raw) -notmatch $pattern) {
            throw "NDK at $env:ANDROID_NDK_ROOT is not revision $env:NDK_PIN (source.properties mismatch)"
          }
          Write-Host "NDK revision $env:NDK_PIN verified at $env:ANDROID_NDK_ROOT"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish linux-bionic-x64 (assert exactly 4 IL2072 warnings)
        run: |
          $log = Join-Path $env:RUNNER_TEMP "publish-bionic-x64.log"
          dotnet publish src/BlazorNative.Runtime -c Release -r linux-bionic-x64 -tl:off -nologo 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "linux-bionic-x64 publish failed (exit $LASTEXITCODE)" }
          $il2072 = @(Select-String -Path $log -Pattern 'warning IL2072')
          Write-Host "IL2072 count: $($il2072.Count)"
          if ($il2072.Count -ne 4) {
            $il2072 | ForEach-Object { Write-Host $_.Line }
            throw "linux-bionic-x64 publish IL2072 drift: expected exactly 4 accepted trim warnings, got $($il2072.Count)"
          }

      - name: Verify linux-bionic-x64 exports (llvm-readelf from pinned NDK)
        run: |
          $readelf = "$env:ANDROID_NDK_ROOT\toolchains\llvm\prebuilt\windows-x86_64\bin\llvm-readelf.exe"
          if (-not (Test-Path $readelf)) { throw "llvm-readelf.exe not found at $readelf" }
          $so = "src\BlazorNative.Runtime\bin\Release\net10.0\linux-bionic-x64\publish\BlazorNative.Runtime.so"
          $out = & $readelf --dyn-syms $so
          $expected = @(
            'blazornative_dispatch_event', 'blazornative_fetch_complete',
            'blazornative_host_event', 'blazornative_init', 'blazornative_mount',
            'blazornative_register_bridge', 'blazornative_register_frame_callback',
            'blazornative_shutdown', 'blazornative_version'
          )
          $actual = @($out | Select-String -Pattern '\bblazornative_\w+' | ForEach-Object { $_.Matches.Value } | Sort-Object -Unique)
          Write-Host "Dynamic symbols found ($($actual.Count)): $($actual -join ', ')"
          $diff = Compare-Object $expected $actual
          if ($diff) {
            $diff | Format-Table | Out-String | Write-Host
            throw "linux-bionic-x64 export surface drift: expected exactly the 9 blazornative_* exports"
          }

      - name: Upload artifact — linux-bionic-x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: BlazorNative.Runtime-linux-bionic-x64
          path: src/BlazorNative.Runtime/bin/Release/net10.0/linux-bionic-x64/publish/BlazorNative.Runtime.so
          if-no-files-found: error

  # ── Job B: emulator suite on ubuntu KVM against the Windows-built .so ──────
  emulator:
    runs-on: ubuntu-latest
    needs: publish-so
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21 (Temurin — Gradle daemon)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Hardware acceleration for the emulator — the documented
      # reactivecircus/android-emulator-runner KVM setup for Linux runners.
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download artifact — linux-bionic-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: BlazorNative.Runtime-linux-bionic-x64
          path: ${{ runner.temp }}/ci-so

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src/BlazorNative.Jni/**/*.gradle.kts', 'src/BlazorNative.Jni/gradle/wrapper/gradle-wrapper.properties', 'src/BlazorNative.Jni/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # gradlew is committed 100644 (Windows-first repo) — make it executable.
      - name: Make gradlew executable
        run: chmod +x src/BlazorNative.Jni/gradlew

      # Multi-line script: the runner executes lines sequentially and stops at
      # the first failure — hence the `|| touch` capture so logcat is dumped
      # even when Gradle fails, with the final `test` propagating the failure.
      - name: Instrumented tests (API 34 google_apis x86_64 Pixel 6 — mirrors local AVD blazornative-pixel6-x86_64)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          working-directory: src/BlazorNative.Jni
          script: |
            adb logcat -c || true
            # Suppress ANR/crash dialogs — a boot ANR stealing window focus would
            # deny the Android 10+ clipboard READ (ClipboardAndroidTest); this plus
            # the in-test hasWindowFocus() wait keep that lane stable on a cold AVD.
            adb shell settings put global hide_error_dialogs 1 || true
            ./gradlew --no-daemon connectedAndroidTest "-PciSoDir=${{ runner.temp }}/ci-so" || touch "${{ runner.temp }}/gradle-failed"
            adb logcat -d > "${{ runner.temp }}/logcat.txt" || true
            test ! -f "${{ runner.temp }}/gradle-failed"

      # Baseline asserted, not observed (house style): 40 through M5; Phase 6.0 adds
      # YogaSpikeAndroidTest ×1 (the Yoga flex-row + measure-callback spike proof) → 41.
      #
      # ── Phase 6.1 Gate 2 REVIEW (52 → 71, +19) ─────────────────────────────
      # The review found five holes that the 52 could not see, and each one is now a
      # test that BITES (verified by mutation — break the thing, watch it go red):
      #   +14 YogaStyleResetAndroidTest — the null-reset wire, ARM BY ARM. Gate 1
      #                                   built that path (a removed style now leaves
      #                                   on the SetStyle wire, not the prop wire) and
      #                                   NOTHING exercised it but flexGrow. It hid a
      #                                   real bug: `margin: null` reset margin to
      #                                   `auto` — which is not margin's default and
      #                                   is not inert (it re-centres the node).
      #    +2 YogaDirtyAndroidTest      — dirty-on-content-change. Both measure tests
      #                                   mount FRESH trees, so Yoga's measure cache
      #                                   was cold and markDirty could be DELETED with
      #                                   the whole suite still green. These are
      #                                   two-frame on the SAME node: delete the call
      #                                   and only these two go red.
      #    +1 YogaNodeLifecycleAndroidTest — ONE RemoveNodePatch stands for a whole
      #                                   SUBTREE (the renderer purges descendants
      #                                   .NET-side). The shell dropped one map entry
      #                                   and leaked every descendant — pinning Views,
      #                                   the Activity Context and native Yoga peers,
      #                                   once per navigation. Only the mapper's
      #                                   bookkeeping can see it; no frame can.
      #    +1 WidgetMapperTextChildOnButtonTest — removing a COLLAPSED text node used
      #                                   to detach its parent BUTTON (nodes[textId]
      #                                   IS the Button) while leaving its Yoga node
      #                                   laying out a ghost.
      #    +1 WidgetMapperSetStyleTest   — "12f" is a legal Java float and is NOT in
      #                                   the grammar: the whole string must be
      #                                   consumed (design §grammar), or Android would
      #                                   honour a value iOS's strtof/endptr rejects.
      # Also strengthened WITHOUT adding tests: BnLayoutDemoAndroidTest +
      # YogaMeasureAndroidTest gained a measure ORACLE (their relational assertions
      # all pass with a FABRICATED 80×20 measure func — the oracle does not), and the
      # demo now pins that the root column HUGS its content, which is what catches the
      # host root re-laying out top-level nodes behind Yoga's back.
      #
      # ── Phase 6.1 Gate 2 (Yoga owns placement) added 11 → 52 ────────────────
      #   +4  YogaLayoutAndroidTest    — the row's computed frames, an un-styled tree
      #                                  still stacking, a null SetStyle resetting to
      #                                  Yoga's default, padding as a YOGA property
      #                                  (children inset, view.setPadding NOT called)
      #   +3  YogaMeasureAndroidTest   — DoD #3: a long label WRAPS and its measured
      #                                  height drives its row; a short one yields a
      #                                  shorter row; and the regression guard that
      #                                  CHILDLESS `view`s get no measure func
      #   +1  YogaResizeAndroidTest    — a host resize re-solves the tree (no patch)
      #   +1  BnLayoutDemoAndroidTest  — EVERY frame of the canonical table, on the
      #                                  device (the iOS XCTest asserts the same
      #                                  numbers — that pairing IS M6 DoD #2)
      #   +1  BnDemoAndroidTest        — the un-styled tree still renders as a
      #                                  vertical stack, asserted on FRAMES now
      #   +1  WidgetMapperSetStyleTest — an unparseable layout value is logged and
      #                                  ignored (the grammar has no unit suffixes)
      # The four churned classes (WidgetMapperTest, BnDemoAndroidTest,
      # CompositionAndroidTest, WidgetMapperSetStyleTest) were REWRITTEN from type
      # pins (LinearLayout / orientation == VERTICAL) to FRAME pins; only the two
      # counts above are new methods, the rest are same-count rewrites.
      - name: Assert instrumented baseline (71 passed / 0 failed)
        run: |
          shopt -s globstar nullglob
          xmls=(src/BlazorNative.Jni/build/outputs/androidTest-results/connected/**/*.xml)
          if [ "${#xmls[@]}" -eq 0 ]; then
            echo "No JUnit XML results found under build/outputs/androidTest-results/connected" >&2
            exit 1
          fi
          attr() { grep -o "$1=\"[0-9]*\"" "$2" | head -n 1 | grep -o '[0-9]*'; }
          tests=0; failures=0; errors=0; skipped=0
          for x in "${xmls[@]}"; do
            t=$(attr tests "$x");    tests=$((tests + ${t:-0}))
            f=$(attr failures "$x"); failures=$((failures + ${f:-0}))
            e=$(attr errors "$x");   errors=$((errors + ${e:-0}))
            s=$(attr skipped "$x");  skipped=$((skipped + ${s:-0}))
          done
          echo "Instrumented totals across ${#xmls[@]} suite(s): tests=$tests failures=$failures errors=$errors skipped=$skipped"
          if [ "$tests" -ne 71 ] || [ "$failures" -ne 0 ] || [ "$errors" -ne 0 ] || [ "$skipped" -ne 0 ]; then
            echo "Instrumented test baseline drift: expected 71 passed / 0 failed / 0 skipped, got tests=$tests failures=$failures errors=$errors skipped=$skipped" >&2
            exit 1
          fi

      - name: Upload artifact — instrumented JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: src/BlazorNative.Jni/build/outputs/androidTest-results/
          if-no-files-found: warn

      - name: Upload artifact — logcat (failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-logcat
          path: ${{ runner.temp }}/logcat.txt
          if-no-files-found: ignore
