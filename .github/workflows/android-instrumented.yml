# ─────────────────────────────────────────────────────────────────────────────
# BlazorNative instrumented suite (Phase 4.0 Gate 3) — nightly + manual.
#
# INFORMATIONAL — this workflow is NOT a required check. Emulator-on-CI has
# known flake modes (boot timeouts, adb drops); it stays advisory until a
# stability baseline exists (promotion criteria documented in
# docs/GITHUB-SETUP.md → "Branch protection").
#
# Two jobs:
#   publish-so (windows-latest) — the only toolchain we build the bionic .so
#     on (mirrors ci.yml verbatim: pinned NDK 26.3.11579264, 4 accepted
#     IL2072s, nine blazornative_* exports via llvm-readelf) → uploads the
#     linux-bionic-x64 BlazorNative.Runtime.so as an artifact. The publish
#     head is samples/BlazorNative.SampleApp (Phase 8.0 decision 3); the
#     artifact NAME stays BlazorNative.Runtime.so — the csproj's
#     CanonicalizeNativeArtifactName target owns the rename.
#   emulator (ubuntu-latest, KVM) — downloads the .so, boots the API 34
#     google_apis x86_64 Pixel 6 image (mirrors the local AVD
#     blazornative-pixel6-x86_64), runs connectedAndroidTest with
#     -PciSoDir pointing at the artifact → asserts 213 passed / 0 failed.
#
# Baselines are asserted, not observed: count drift fails the job loudly.
# ─────────────────────────────────────────────────────────────────────────────
name: android-instrumented

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'   # nightly 03:00 UTC

permissions:
  contents: read

concurrency:
  group: android-instrumented-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NDK_PIN: 26.3.11579264

jobs:
  # ── Job A: publish the bionic-x64 .so on Windows (the pinned toolchain) ────
  publish-so:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET SDK (global.json — 10.0.3xx band)
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Setup JDK 21 (Temurin — sdkmanager)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve toolchain paths (NDK root)
        run: |
          if (-not $env:ANDROID_HOME) { throw "ANDROID_HOME is not set on the runner image" }
          "ANDROID_NDK_ROOT=$env:ANDROID_HOME\ndk\$env:NDK_PIN" | Out-File $env:GITHUB_ENV -Append

      - name: Check for pinned NDK on the runner image
        id: check-ndk
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          $present = (Test-Path $props) -and
            ((Get-Content $props -Raw) -match ('(?m)^\s*Pkg\.Revision\s*=\s*' + [regex]::Escape($env:NDK_PIN) + '\s*$'))
          "present=$present" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "NDK $env:NDK_PIN preinstalled: $present"

      - name: Cache NDK ${{ env.NDK_PIN }}
        if: steps.check-ndk.outputs.present != 'True'
        uses: actions/cache@v6
        with:
          path: ${{ env.ANDROID_NDK_ROOT }}
          key: ndk-${{ runner.os }}-${{ env.NDK_PIN }}

      - name: Install NDK ${{ env.NDK_PIN }} (sdkmanager, on cache miss)
        if: steps.check-ndk.outputs.present != 'True'
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          if (Test-Path $props) { Write-Host "NDK restored from cache — skipping sdkmanager"; exit 0 }
          $sdkmanager = Join-Path $env:ANDROID_HOME "cmdline-tools\latest\bin\sdkmanager.bat"
          if (-not (Test-Path $sdkmanager)) { throw "sdkmanager not found at $sdkmanager" }
          "y" | & $sdkmanager --install "ndk;$env:NDK_PIN"
          if ($LASTEXITCODE -ne 0) { throw "sdkmanager failed to install ndk;$env:NDK_PIN (exit $LASTEXITCODE)" }

      - name: Verify NDK revision pin
        run: |
          $props = Join-Path $env:ANDROID_NDK_ROOT "source.properties"
          if (-not (Test-Path $props)) { throw "NDK $env:NDK_PIN missing at $env:ANDROID_NDK_ROOT" }
          $pattern = '(?m)^\s*Pkg\.Revision\s*=\s*' + [regex]::Escape($env:NDK_PIN) + '\s*$'
          if ((Get-Content $props -Raw) -notmatch $pattern) {
            throw "NDK at $env:ANDROID_NDK_ROOT is not revision $env:NDK_PIN (source.properties mismatch)"
          }
          Write-Host "NDK revision $env:NDK_PIN verified at $env:ANDROID_NDK_ROOT"

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish linux-bionic-x64 (assert exactly 4 IL2072 warnings)
        run: |
          $log = Join-Path $env:RUNNER_TEMP "publish-bionic-x64.log"
          dotnet publish samples/BlazorNative.SampleApp -c Release -r linux-bionic-x64 -tl:off -nologo 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { throw "linux-bionic-x64 publish failed (exit $LASTEXITCODE)" }
          $il2072 = @(Select-String -Path $log -Pattern 'warning IL2072')
          Write-Host "IL2072 count: $($il2072.Count)"
          if ($il2072.Count -ne 4) {
            $il2072 | ForEach-Object { Write-Host $_.Line }
            throw "linux-bionic-x64 publish IL2072 drift: expected exactly 4 accepted trim warnings, got $($il2072.Count)"
          }

      - name: Verify linux-bionic-x64 exports (llvm-readelf from pinned NDK)
        run: |
          $readelf = "$env:ANDROID_NDK_ROOT\toolchains\llvm\prebuilt\windows-x86_64\bin\llvm-readelf.exe"
          if (-not (Test-Path $readelf)) { throw "llvm-readelf.exe not found at $readelf" }
          $so = "samples\BlazorNative.SampleApp\bin\Release\net10.0\linux-bionic-x64\publish\BlazorNative.Runtime.so"
          $out = & $readelf --dyn-syms $so
          $expected = @(
            'blazornative_dispatch_event', 'blazornative_fetch_complete',
            'blazornative_host_call_complete', 'blazornative_host_event',
            'blazornative_init', 'blazornative_mount',
            'blazornative_register_bridge', 'blazornative_register_frame_callback',
            'blazornative_shutdown', 'blazornative_version'
          )
          $actual = @($out | Select-String -Pattern '\bblazornative_\w+' | ForEach-Object { $_.Matches.Value } | Sort-Object -Unique)
          Write-Host "Dynamic symbols found ($($actual.Count)): $($actual -join ', ')"
          $diff = Compare-Object $expected $actual
          if ($diff) {
            $diff | Format-Table | Out-String | Write-Host
            throw "linux-bionic-x64 export surface drift: expected exactly the 10 blazornative_* exports"
          }

      - name: Upload artifact — linux-bionic-x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: BlazorNative.Runtime-linux-bionic-x64
          path: samples/BlazorNative.SampleApp/bin/Release/net10.0/linux-bionic-x64/publish/BlazorNative.Runtime.so
          if-no-files-found: error

      # The deep-link route resource is GENERATED by the publish above (RouteGen
      # reflects the app's registered pages) and is GITIGNORED. The emulator job
      # does a fresh checkout and has only the .so — no managed assembly to
      # regenerate it — so hand it across like the .so, or the APK ships without
      # res/raw/blazornative_routes.json and every deep link falls back to the
      # default component (M11 Phase 11.0). A real consumer build never hits this:
      # its dotnet publish + gradle share one workspace; only this CI job-split does.
      - name: Upload artifact — generated deep-link route resource
        uses: actions/upload-artifact@v7
        with:
          name: blazornative-routes-resource
          path: src/BlazorNative.Jni/src/androidMain/res/raw/blazornative_routes.json
          if-no-files-found: error

  # ── Job B: emulator suite on ubuntu KVM against the Windows-built .so ──────
  emulator:
    runs-on: ubuntu-latest
    needs: publish-so
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Setup JDK 21 (Temurin — Gradle daemon)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # Hardware acceleration for the emulator — the documented
      # reactivecircus/android-emulator-runner KVM setup for Linux runners.
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download artifact — linux-bionic-x64 binary
        uses: actions/download-artifact@v8
        with:
          name: BlazorNative.Runtime-linux-bionic-x64
          path: ${{ runner.temp }}/ci-so

      # Place the generated route resource into res/raw BEFORE gradle assembles
      # the APK (see the upload comment in the publish job). Without it,
      # MainActivity's getIdentifier returns 0 and deep links fall back.
      - name: Download artifact — generated deep-link route resource
        uses: actions/download-artifact@v8
        with:
          name: blazornative-routes-resource
          path: src/BlazorNative.Jni/src/androidMain/res/raw

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src/BlazorNative.Jni/**/*.gradle.kts', 'src/BlazorNative.Jni/gradle/wrapper/gradle-wrapper.properties', 'src/BlazorNative.Jni/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # gradlew is committed 100644 (Windows-first repo) — make it executable.
      - name: Make gradlew executable
        run: chmod +x src/BlazorNative.Jni/gradlew

      # Multi-line script: the runner executes lines sequentially and stops at
      # the first failure — hence the `|| touch` capture so logcat is dumped
      # even when Gradle fails, with the final `test` propagating the failure.
      - name: Instrumented tests (API 34 google_apis x86_64 Pixel 6 — mirrors local AVD blazornative-pixel6-x86_64)
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          working-directory: src/BlazorNative.Jni
          script: |
            adb logcat -c || true
            # Suppress ANR/crash dialogs — a boot ANR stealing window focus would
            # deny the Android 10+ clipboard READ (ClipboardAndroidTest); this plus
            # the in-test hasWindowFocus() wait keep that lane stable on a cold AVD.
            adb shell settings put global hide_error_dialogs 1 || true
            ./gradlew --no-daemon connectedAndroidTest "-PciSoDir=${{ runner.temp }}/ci-so" || touch "${{ runner.temp }}/gradle-failed"
            adb logcat -d > "${{ runner.temp }}/logcat.txt" || true
            test ! -f "${{ runner.temp }}/gradle-failed"

      # Baseline asserted, not observed (house style): 40 through M5; Phase 6.0 adds
      # YogaSpikeAndroidTest ×1 (the Yoga flex-row + measure-callback spike proof) → 41.
      #
      # ── Phase 6.3 Gate 2 — URL IMAGES, via Coil (96 → 107, +11) ────────────
      # `image` was the LAST stubbed leaf: it made an ImageView and measured ZERO,
      # because no shell had a source-loading path. Coil now drives one, wired to the
      # normative parity contract (design §"The parity contract") — which iOS mirrors
      # with Kingfisher and asserts THE SAME FRAMES. Each count verified by MUTATION
      # (break the thing, watch the RIGHT test go red — the Gate 2 report has the
      # transcript):
      #    +7 WidgetMapperImageTest      — the contract, row by row. The two measurement
      #                                   paths (intrinsic → 0×0 then the NATURAL size;
      #                                   definite → those numbers ALWAYS, Yoga never
      #                                   calling the measure func at all); failure
      #                                   (0×0, reserves nothing, no retry); `src` →
      #                                   null (THE SECOND REFLOW DIRECTION — the
      #                                   siblings move back UP; the renderer emits it
      #                                   today and no shell had been told what it
      #                                   means); and CANCELLATION on a `Src` change and
      #                                   on node removal, each proven to cancel a
      #                                   request that had REACHED the fixture server
      #                                   (cancelling one that never started proves
      #                                   nothing). Cancellation is MEMORY SAFETY, not
      #                                   hygiene: on iOS a completion into a purged
      #                                   node touches a freed YGNodeRef.
      #    +3 BnImageDemoAndroidTest     — the /image page's TWO frame tables, before
      #                                   the bytes and after, gated on ALL THREE of
      #                                   Coil's per-node TERMINAL callbacks (the
      #                                   synchronization gate, non-negotiable #6). It
      #                                   is not ceremony: two of the three cases assert
      #                                   that NOTHING MOVED, so a suite that reads the
      #                                   AFTER table straight after mount passes both
      #                                   having fetched nothing — and a device with
      #                                   cleartext BLOCKED passes both too, because a
      #                                   blocked load is INDISTINGUISHABLE from the 404
      #                                   the failure case expects. Hence also: the
      #                                   outcomes are asserted (2 SUCCESS + 1 ERROR,
      #                                   against the URLs the WIRE carried), the
      #                                   intrinsic image is asserted POSITIVELY against
      #                                   the DECODED FIXTURE's own pixel count, and one
      #                                   test does nothing but VERIFY the cleartext
      #                                   inheritance (src/debug/…/network_security_
      #                                   config.xml, Phase 3.1) rather than assume it.
      #    +1 BnScrollDemoImageAndroidTest — an image INSIDE a scrolled, re-parented
      #                                   subtree under the synthetic content node — and
      #                                   every number of BnScrollDemo's 6.2 frame table
      #                                   re-asserted UNCHANGED with the bytes loaded
      #                                   (non-negotiable #2: if one of them moves, the
      #                                   change is wrong). BnScrollDemoAndroidTest,
      #                                   which stands up no fixture server, pins the
      #                                   other half — a FAILED load moves nothing
      #                                   either.
      # CI never touches the public internet: the fixtures are served IN-PROCESS from a
      # loopback ServerSocket (ImageFixtureServer), the failing case is a real 404 from
      # it, and the PNGs are generated in code so the fixture contract (0 < Wi ≤ 300;
      # Hi > 0; (Wfixed,Hfixed) ≠ (200,120)) is a fact of the source, asserted on the
      # DECODED bytes before any frame is read.
      #
      # ── Phase 6.2 Gate 2 REVIEW (86 → 96, +10) ─────────────────────────────
      # The engine was right; every finding was a guard that did not bite, a false
      # causal story, or a rule Gate 3 was about to hand-copy unpinned. Each count is
      # verified by MUTATION (break the thing, watch the RIGHT test go red):
      #    +9 WidgetMapperScrollTest      —
      #       ・THE BLOCKER: the definite-height diagnostic's second condition was
      #         "at LEAST as tall as its content" where the design says EXACTLY, so it
      #         warned on the ordinary "nothing to scroll YET" shape (a list still
      #         loading; M7's virtualized list on its first under-full frame) with a
      #         message that stated a falsehood and prescribed a fix already applied.
      #         Both halves of the conjunction were individually DELETABLE with the
      #         suite green. Three tests now pin them: a flex-sized viewport over 800
      #         of content (no warning), over 100 of content (no warning — this is the
      #         one that reddens if the equality is reverted to `>=`), and an explicit
      #         Height that HAPPENS to equal its content (no warning — pins the first
      #         condition, which nothing reached before).
      #       ・AND THE TEST FOUND A REAL BUG IN THE RECOMMENDED SHAPE: `Grow="1"`
      #         ALONE DOES NOT BOUND A VIEWPORT — flexBasis stays `auto`, so the basis
      #         is the CONTENT's height, the free space is NEGATIVE, flexGrow only
      #         distributes POSITIVE free space, and the negative goes to the shrink
      #         pass where Yoga's flexShrink default of 0 refuses it. The phase's own
      #         mechanism, one level up. Every doc in the phase recommended it. Use
      #         Height, or Grow + Basis="0" (CSS's `flex: 1`). The diagnostic fires on
      #         the broken shape — correctly — and one test pins that it does.
      #       ・THE SECOND FALSE CAUSAL STORY, corrected: the onMeasure UNSPECIFIED
      #         fallback is NOT "what makes the page scroll" (applyFrame is the last
      #         word on the content's frame either way). It protects the scroll
      #         OFFSET: ScrollView.onLayout ends with scrollTo(mScrollX, mScrollY),
      #         re-clamping against the content child's just-laid-out height on EVERY
      #         layout it takes part in — so a broken fallback snaps a scrolled page
      #         back to the top on any re-render. ANDROID-SPECIFIC (UIScrollView does
      #         neither); Gate 3 must NOT copy it.
      #       ・the index-mapping rule was pinned FRONT-ONLY: + a mid-list insert (the
      #         "silent skew" the non-negotiable is named after), + removal of a scroll
      #         node's child (the symmetric direction), + the text-collapse × scroll
      #         interaction (also the only MEASURED leaf inside a scroll anywhere).
      #       ・+ the diagnostics bookkeeping is EVICTED with its node: ids restart at
      #         1 after a reset, so a stale warn-once key silenced the next scroll node
      #         to inherit the id.
      #    +1 YogaNodeLifecycleAndroidTest — removing a WRAPPER around the scroll. The
      #         shipped test removed the scroll node itself; NAVIGATION NEVER DOES THAT
      #         (BnScrollDemo's scroll lives in a root BnColumn, so the real patch names
      #         the column). The one path the app actually takes was the one nothing
      #         asserted.
      #
      # ── Phase 6.2 Gate 2 — REAL SCROLLING (71 → 86, +15) ───────────────────
      # The `scroll` NodeType stops being a stub. A scroll node is a VIEWPORT whose
      # wire children live one level deeper than the wire says — under a SYNTHETIC
      # content node the shell creates and the renderer never hears about, whose
      # computed height IS the content size. Each count below was verified by
      # MUTATION (break the thing, watch the RIGHT test go red — see the Gate 2
      # report in the conclusion):
      #    +4 YogaScrollNodeAndroidTest  — THE MECHANISM, in Yoga alone, before any
      #                                   widget exists. The content node computes to
      #                                   800; it STILL computes to 800 with
      #                                   `overflow: visible` (so the flag is NOT what
      #                                   produces it — Yoga's flexShrink default of 0
      #                                   is, and the design's original claim was
      #                                   wrong); `flexShrink: 1` collapses it to 200;
      #                                   and an auto-height scroll node HUGS its
      #                                   content (the definite-height warning is
      #                                   written against that answer).
      #    +8 WidgetMapperScrollTest     — the ScrollView + the synthetic content view;
      #                                   wire children parented into the CONTENT view
      #                                   in both trees (append AND at an index — the
      #                                   second index-mapping rule after 6.1's text
      #                                   collapse); the UNSPECIFIED-spec measure
      #                                   boundary ScrollView actually uses; and the two
      #                                   scroll-node diagnostics (container styles
      #                                   ignored-and-logged; the definite-height
      #                                   warning) plus the negative that the WORKING
      #                                   case warns about nothing.
      #    +2 BnScrollDemoAndroidTest    — the canonical frame table (BnScrollDemo.razor's
      #                                   header) on the device, AND the load-bearing
      #                                   half: drive the scroll position and assert the
      #                                   rows MOVE. At offset 600 row 7 is PARTIALLY
      #                                   visible (its bottom 40dp), rows 8 and 9 fully.
      #                                   The iOS XCTest (Gate 3) asserts the same
      #                                   numbers — that pairing IS DoD #4.
      #    +1 YogaNodeLifecycleAndroidTest — one RemoveNodePatch now stands for a
      #                                   subtree containing a node NO PATCH EVER NAMES.
      #                                   Miss the synthetic content node and Android
      #                                   leaks a View, its rows and the Activity
      #                                   Context once per navigation; iOS is left with
      #                                   a dangling YGNodeRef.
      #
      # ── Phase 6.1 Gate 2 REVIEW (52 → 71, +19) ─────────────────────────────
      # The review found five holes that the 52 could not see, and each one is now a
      # test that BITES (verified by mutation — break the thing, watch it go red):
      #   +14 YogaStyleResetAndroidTest — the null-reset wire, ARM BY ARM. Gate 1
      #                                   built that path (a removed style now leaves
      #                                   on the SetStyle wire, not the prop wire) and
      #                                   NOTHING exercised it but flexGrow. It hid a
      #                                   real bug: `margin: null` reset margin to
      #                                   `auto` — which is not margin's default and
      #                                   is not inert (it re-centres the node).
      #    +2 YogaDirtyAndroidTest      — dirty-on-content-change. Both measure tests
      #                                   mount FRESH trees, so Yoga's measure cache
      #                                   was cold and markDirty could be DELETED with
      #                                   the whole suite still green. These are
      #                                   two-frame on the SAME node: delete the call
      #                                   and only these two go red.
      #    +1 YogaNodeLifecycleAndroidTest — ONE RemoveNodePatch stands for a whole
      #                                   SUBTREE (the renderer purges descendants
      #                                   .NET-side). The shell dropped one map entry
      #                                   and leaked every descendant — pinning Views,
      #                                   the Activity Context and native Yoga peers,
      #                                   once per navigation. Only the mapper's
      #                                   bookkeeping can see it; no frame can.
      #    +1 WidgetMapperTextChildOnButtonTest — removing a COLLAPSED text node used
      #                                   to detach its parent BUTTON (nodes[textId]
      #                                   IS the Button) while leaving its Yoga node
      #                                   laying out a ghost.
      #    +1 WidgetMapperSetStyleTest   — "12f" is a legal Java float and is NOT in
      #                                   the grammar: the whole string must be
      #                                   consumed (design §grammar), or Android would
      #                                   honour a value iOS's strtof/endptr rejects.
      # Also strengthened WITHOUT adding tests: BnLayoutDemoAndroidTest +
      # YogaMeasureAndroidTest gained a measure ORACLE (their relational assertions
      # all pass with a FABRICATED 80×20 measure func — the oracle does not), and the
      # demo now pins that the root column HUGS its content, which is what catches the
      # host root re-laying out top-level nodes behind Yoga's back.
      #
      # ── Phase 6.1 Gate 2 (Yoga owns placement) added 11 → 52 ────────────────
      #   +4  YogaLayoutAndroidTest    — the row's computed frames, an un-styled tree
      #                                  still stacking, a null SetStyle resetting to
      #                                  Yoga's default, padding as a YOGA property
      #                                  (children inset, view.setPadding NOT called)
      #   +3  YogaMeasureAndroidTest   — DoD #3: a long label WRAPS and its measured
      #                                  height drives its row; a short one yields a
      #                                  shorter row; and the regression guard that
      #                                  CHILDLESS `view`s get no measure func
      #   +1  YogaResizeAndroidTest    — a host resize re-solves the tree (no patch)
      #   +1  BnLayoutDemoAndroidTest  — EVERY frame of the canonical table, on the
      #                                  device (the iOS XCTest asserts the same
      #                                  numbers — that pairing IS M6 DoD #2)
      #   +1  BnDemoAndroidTest        — the un-styled tree still renders as a
      #                                  vertical stack, asserted on FRAMES now
      #   +1  WidgetMapperSetStyleTest — an unparseable layout value is logged and
      #                                  ignored (the grammar has no unit suffixes)
      # The four churned classes (WidgetMapperTest, BnDemoAndroidTest,
      # CompositionAndroidTest, WidgetMapperSetStyleTest) were REWRITTEN from type
      # pins (LinearLayout / orientation == VERTICAL) to FRAME pins; only the two
      # counts above are new methods, the rest are same-count rewrites.
      # ── Phase 6.3 Gate 2 REVIEW (107 → 109, +2) ────────────────────────────
      # Both findings were LATENT — CI was green at 107 — and both are TWO-SHELL
      # LANDMINES that Gate 3 would have copied verbatim into Kingfisher, where two of
      # them end at a freed YGNodeRef (non-negotiable #4). Each count mutation-verified:
      #    +1 BnImageDemoAndroidTest
      #       .the_second_mount_with_a_WARM_cache_completes_inside_applyBatch
      #       THE PATH EVERY OTHER TEST CLEARS AWAY. Coil 2 dispatches on
      #       Dispatchers.Main.immediate and the shell enqueues from `UpdateProp("src")`,
      #       which runs ON THE MAIN THREAD INSIDE applyBatch — so a MEMORY-CACHE HIT runs
      #       the whole request (onSuccess → setImage → markDirty → re-solve) TO COMPLETION
      #       INSIDE enqueue(). Every existing test calls clearCoilCaches() in @Before, so
      #       this was unexercised. It hid two bugs: (a) resolveLayout()'s `finally` set
      #       applyingBatch = false FOR THE REST OF THE BATCH — the 3.2/4.2 re-entrancy
      #       guard is a plain boolean and this was its first RE-ENTRANT caller — and Yoga
      #       re-solved mid-batch against a half-applied tree and again at CommitFrame (TWO
      #       reflows, where the contract says ONE); (b) the already-completed Disposable
      #       was recorded as in-flight and never removed, so inFlightImageCount — an
      #       invariant THREE tests assert — never returned to 0. MUTATION: revert either
      #       fix and this test reddens (the leak first: 2 stale entries, one per cached
      #       image). KINGFISHER'S setImage CALLS ITS completionHandler SYNCHRONOUSLY ON A
      #       MEMORY HIT TOO — Gate 3 inherits this verbatim, and the design says so.
